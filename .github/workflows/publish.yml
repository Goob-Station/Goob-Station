name: Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "target fork:"
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest # AltHub Space
    environment: ${{ inputs.target }}
    # AltHub Space -> start
    env:
      ROBUST_CDN_URL: ${{ vars.ROBUST_CDN_URL }}
      FORK_ID: ${{ vars.FORK_ID }}
    # AltHub Space -> end

    steps:
    - name: Validate target/branch combination
      shell: bash
      run: |
        echo "Selected target: ${{ inputs.target }}"
        echo "Selected ref: ${{ github.ref_name }}"

        if [[ "${{ inputs.target }}" == "production" && "${{ github.ref_name }}" != "master" ]]; then
          echo "Production publish is allowed only from master"
          exit 1
        fi

        # AltHub Space -> start
        if [[ -z "${ROBUST_CDN_URL}" ]]; then
          echo "ROBUST_CDN_URL environment variable is not set for environment '${{ inputs.target }}'"
          exit 1
        fi

        if [[ -z "${FORK_ID}" ]]; then
          echo "FORK_ID environment variable is not set for environment '${{ inputs.target }}'"
          exit 1
        fi
        # AltHub Space -> end

    - name: Fail if we are attempting to run on the master branch
      if: ${{GITHUB.REF_NAME == 'master' && github.repository == 'space-wizards/space-station-14'}}
      run: exit 1

    - name: Check .NET Installation
      id: check-dotnet
      run: |
        if dotnet --info > /dev/null 2>&1; then
          echo "skip=true" >> $GITHUB_ENV
        else
          echo "skip=false" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v4.2.2 # AltHub Space
      with:
        submodules: 'recursive'
    - name: Setup .NET Core
      if: env.skip == 'false'
      uses: actions/setup-dotnet@v4.1.0 # AltHub Space
      with:
        dotnet-version: 9.0.x

    # AltHub Space -> start
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'RobustToolbox/Directory.Packages.props', '**/*.csproj', 'global.json', 'nuget.config') }}
    # AltHub Space -> end

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      # AltHub Space
      run: dotnet run --project Content.Packaging --configuration Release --no-build server --platform linux-x64

    - name: Package client
      # AltHub Space
      run: dotnet run --project Content.Packaging --configuration Release --no-build client --no-wipe-release

    - name: Publish version
      run: Tools/publish_multi_request.py
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}

    - name: Publish changelog (Discord)
      run: Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ github.token }}
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}

#    - name: Publish changelog (RSS)
#      run: Tools/actions_changelog_rss.py
#      env:
#        CHANGELOG_RSS_KEY: ${{ secrets.CHANGELOG_RSS_KEY }}
