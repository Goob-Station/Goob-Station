name: "Labels: Approved"

on:
  pull_request_review:
    types: [submitted]

jobs:
  update_review_labels:
    # pull_request_review on fork PRs gets a read-only token, so label writes are
    # only reliable for branches opened from this repository.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.review.author_association)
    permissions:
      issues: write
      pull-requests: read # AltHub Space
    runs-on: ubuntu-latest
    steps:
    # AltHub Space -> start
    - uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const reviewState = context.payload.review?.state;

          let labelsToAdd = [];
          let labelsToRemove = [];

          if (reviewState === "approved") {
            labelsToAdd = ["S: Approved"];
            labelsToRemove = ["S: Needs Review", "S: Awaiting Changes"];
          } else if (reviewState === "changes_requested") {
            labelsToAdd = ["S: Awaiting Changes"];
            labelsToRemove = ["S: Needs Review", "S: Approved"];
          } else {
            console.log(`Skipping unsupported review state: ${reviewState}`);
            return;
          }

          await github.rest.issues.addLabels({
            owner,
            repo,
            issue_number,
            labels: labelsToAdd,
          });

          for (const name of labelsToRemove) {
            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
          }
    # AltHub Space -> end
