name: "Labels: Approved"

on:
  pull_request_review:
    types: [submitted]

jobs:
  update_review_labels:
    # pull_request_review on fork PRs gets a read-only token, so label writes are
    # only reliable for branches opened from this repository.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.review.author_association)
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
    - if: github.event.review.state == 'approved'
      uses: actions-ecosystem/action-add-labels@v1
      with:
        labels: "S: Approved"
    - if: github.event.review.state == 'approved'
      uses: actions-ecosystem/action-remove-labels@v1
      with:
        labels: "S: Needs Review, S: Awaiting Changes"
    - if: github.event.review.state == 'changes_requested'
      uses: actions-ecosystem/action-add-labels@v1
      with:
        labels: "S: Awaiting Changes"
    - if: github.event.review.state == 'changes_requested'
      uses: actions-ecosystem/action-remove-labels@v1
      with:
        labels: "S: Needs Review, S: Approved"
