name: Update REUSE Headers

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  update_headers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write # AltHub Space
    steps:
      - name: Checkout trusted base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-repo
          persist-credentials: false

      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-repo
          token: ${{ github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get Changed Files and PR Info
        id: changed_files
        env:
           PR_BODY: ${{ github.event.pull_request.body }}
           GH_TOKEN: ${{ github.token }}
           GH_REPO: ${{ github.repository }}
           PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -e # Exit script on first error

          echo "Fetching files for PR #${PR_NUMBER} in repo ${GH_REPO}"

          PR_FILES_JSON=$(curl -s -f -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GH_REPO}/pulls/${PR_NUMBER}/files")

          if [ $? -ne 0 ]; then
            echo "Error fetching PR files from GitHub API."
            exit 1
          fi
          
          if ! echo "$PR_FILES_JSON" | jq -e . > /dev/null; then
             echo "Warning: Received empty or invalid JSON from GitHub API for PR files."
             PR_FILES="" # Set PR_FILES to empty to avoid errors below
          else
             PR_FILES=$(echo "$PR_FILES_JSON" | jq -r '.[] | select(.filename != null) | "\(.status) \(.filename)"')
          fi

          if [ -z "$PR_FILES" ]; then
            echo "No files found in PR."
            ADDED_FILES=""
            MODIFIED_FILES=""
          else
            ADDED_FILES=$(echo "$PR_FILES" | grep "^added" | grep -E '\.(cs|ya?ml)$' | sed 's/^added //' | xargs) || true
            MODIFIED_FILES=$(echo "$PR_FILES" | grep "^modified" | grep -E '\.(cs|ya?ml)$' | sed 's/^modified //' | xargs) || true
          fi

          echo "Added Files: $ADDED_FILES"
          echo "Modified Files: $MODIFIED_FILES"

          echo "Checking PR body for license..."
          if grep -q "LICENSE: MIT" <<< "$PR_BODY"; then
            PR_LICENSE=mit
            echo "License specified in PR: MIT"
          elif grep -q "LICENSE: AGPL" <<< "$PR_BODY"; then
            PR_LICENSE=agpl
            echo "License specified in PR: AGPL"
          elif grep -q "LICENSE: MPL" <<< "$PR_BODY"; then
            PR_LICENSE=mpl
            echo "License specified in PR: MPL"
          else
            # AltHub Space -> start
            PR_LICENSE=mit
            echo "No license specified in PR, using default: MIT"
            # AltHub Space -> end
          fi

          echo "added_files=$ADDED_FILES" >> "$GITHUB_OUTPUT"
          echo "modified_files=$MODIFIED_FILES" >> "$GITHUB_OUTPUT"
          echo "pr_license=$PR_LICENSE" >> "$GITHUB_OUTPUT"

      - name: Run REUSE Header Update Script
        run: |
          python "${{ github.workspace }}/base-repo/Tools/update_pr_reuse_headers.py" \
            --repo-path "${{ github.workspace }}/pr-repo" \
            --files-added ${{ steps.changed_files.outputs.added_files }} \
            --files-modified ${{ steps.changed_files.outputs.modified_files }} \
            --pr-license ${{ steps.changed_files.outputs.pr_license }} \
            --pr-base-sha ${{ github.event.pull_request.base.sha }} \
            --pr-head-sha ${{ github.event.pull_request.head.sha }}
      - name: Build REUSE suggestion report
        id: report
        shell: bash
        working-directory: ${{ github.workspace }}/pr-repo
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "## REUSE header suggestions"
              echo
              echo "No REUSE header changes required."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git diff --name-only --diff-filter=ACMRT > "${{ github.workspace }}/reuse-header-files.txt"
          git diff --binary --unified=3 > "${{ github.workspace }}/reuse-headers.patch"

          {
            echo "<!-- reuse-header-suggestions -->"
            echo "## REUSE header suggestions"
            echo
            echo "Inline review suggestions will be added where GitHub can anchor them to the PR diff."
            echo
            echo "The workflow found missing REUSE/SPDX headers in these files:"
            sed 's/^/- `/' "${{ github.workspace }}/reuse-header-files.txt" | sed 's/$/`/'
            echo
            echo "<details><summary>Patch preview</summary>"
            echo
            echo '```diff'
            sed -n '1,120p' "${{ github.workspace }}/reuse-headers.patch"
            patch_lines=$(wc -l < "${{ github.workspace }}/reuse-headers.patch")
            if [ "$patch_lines" -gt 120 ]; then
              echo '...'
              echo
              echo "_Patch preview truncated. Download the workflow artifact for the full patch._"
            fi
            echo '```'
            echo
            echo "</details>"
          } > "${{ github.workspace }}/reuse-comment.md"

          cat "${{ github.workspace }}/reuse-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload REUSE patch artifact
        if: steps.report.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reuse-header-suggestions-pr-${{ github.event.pull_request.number }}
          path: |
            ${{ github.workspace }}/reuse-headers.patch
            ${{ github.workspace }}/reuse-header-files.txt
          if-no-files-found: error

      # AltHub Space -> start
      - name: Update REUSE inline review suggestions
        uses: actions/github-script@v7
        env:
          PR_REPO_PATH: ${{ github.workspace }}/pr-repo
          REUSE_FILES_PATH: ${{ github.workspace }}/reuse-header-files.txt
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const cp = require("child_process");

            const markerPrefix = "<!-- reuse-header-inline-suggestion:";
            const prRepoPath = process.env.PR_REPO_PATH;
            const reuseFilesPath = process.env.REUSE_FILES_PATH;
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            const parseManagedPath = (body) => {
              const match = body?.match(/<!-- reuse-header-inline-suggestion:(.+?) -->/);
              return match?.[1];
            };

            const isTopOfFileDiff = (pullFile) => {
              if (!pullFile) {
                return false;
              }

              if (pullFile.status === "added") {
                return true;
              }

              const patch = pullFile.patch ?? "";
              return /^@@ -0,0 \+1(?:,|\b)/m.test(patch) || /^@@ -1(?:,|\b)/m.test(patch);
            };

            const readTargetFiles = () => {
              if (!fs.existsSync(reuseFilesPath)) {
                return [];
              }

              return fs
                .readFileSync(reuseFilesPath, "utf8")
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean);
            };

            const buildSuggestion = (filePath) => {
              const absolutePath = path.join(prRepoPath, filePath);

              if (!fs.existsSync(absolutePath)) {
                return null;
              }

              const updated = fs.readFileSync(absolutePath, "utf8");
              const original = cp.execFileSync(
                "git",
                ["show", `HEAD:${filePath}`],
                { cwd: prRepoPath, encoding: "utf8" }
              );

              if (!updated.endsWith(original)) {
                return null;
              }

              const originalFirstLine = original.split(/\r?\n/, 1)[0];
              if (!originalFirstLine) {
                return null;
              }

              const insertedPrefix = updated.slice(0, updated.length - original.length);
              if (!insertedPrefix) {
                return null;
              }

              return [
                `${markerPrefix}${filePath} -->`,
                "REUSE/SPDX header suggestion. You can apply it directly.",
                "",
                "```suggestion",
                `${insertedPrefix}${originalFirstLine}`,
                "```",
              ].join("\n");
            };

            const targetFiles = readTargetFiles();
            const pullFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const pullFileMap = new Map(pullFiles.map(file => [file.filename, file]));

            const desiredSuggestions = [];
            const skippedFiles = [];

            for (const filePath of targetFiles) {
              const pullFile = pullFileMap.get(filePath);

              if (!isTopOfFileDiff(pullFile)) {
                skippedFiles.push(`${filePath} (top of file is not part of the PR diff)`);
                continue;
              }

              const body = buildSuggestion(filePath);
              if (!body) {
                skippedFiles.push(`${filePath} (change is not a simple top-of-file insertion)`);
                continue;
              }

              desiredSuggestions.push({
                filePath,
                body,
              });
            }

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const managedComments = reviewComments.filter(comment =>
              comment.user?.type === "Bot" && comment.body?.includes(markerPrefix)
            );

            const existingByPath = new Map();
            for (const comment of managedComments) {
              const managedPath = parseManagedPath(comment.body);
              if (managedPath) {
                existingByPath.set(managedPath, comment);
              }
            }

            for (const suggestion of desiredSuggestions) {
              const existing = existingByPath.get(suggestion.filePath);

              if (existing) {
                await github.rest.pulls.updateReviewComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: suggestion.body,
                });
                existingByPath.delete(suggestion.filePath);
                continue;
              }

              await github.rest.pulls.createReviewComment({
                owner,
                repo,
                pull_number,
                commit_id,
                path: suggestion.filePath,
                line: 1,
                side: "RIGHT",
                body: suggestion.body,
              });
            }

            for (const staleComment of existingByPath.values()) {
              await github.rest.pulls.deleteReviewComment({
                owner,
                repo,
                comment_id: staleComment.id,
              });
            }

            console.log(`Created or updated ${desiredSuggestions.length} inline REUSE suggestions.`);
            if (skippedFiles.length > 0) {
              console.log("Skipped inline suggestions for:");
              for (const skipped of skippedFiles) {
                console.log(`- ${skipped}`);
              }
            }
      # AltHub Space -> end

      - name: Update REUSE suggestion comment
        if: steps.report.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ github.workspace }}/reuse-comment.md
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- reuse-header-suggestions -->";
            const body = fs.readFileSync(process.env.COMMENT_PATH, "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Remove stale REUSE suggestion comment
        if: steps.report.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- reuse-header-suggestions -->";
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id,
              });
            }
