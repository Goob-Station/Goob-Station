- proto: Paper
  entities:
  - uid: 240
    components:
    - type: Transform
      pos: 7.297844,-8.474901
      parent: 1
    - type: Paper
      content: >
        Бортовой журнал — День 3

        Перед Блюспейс-скачком к точке выполнения миссии экипаж услышал взрыв в левом нижнем крыле. Техническая неисправность или снаряд врага — неизвестно, но разницы уже нет. Отменить скачок не удалось — нас закинуло на низкую суборбитальную траекторию относительно планеты... Мы попытались совершить мягкую посадку, но едва не угодили в озеро лавы — с трудом приземлились на базальтовый островок. Практически все двигатели корабля повреждены, РИТЭГ сломан. У нас есть несколько запасных плат — вряд ли получится починить РИТЭГ, но попробовать соорудить импровизированный радиационный коллектор можно. Припасов хватит от силы на пять дней, нужно поспешить и попытаться наладить контакт с местным... населением? Или странниками — разницы нет, главное раздобыть детали для починки двигателей и системы электропитания.
  - uid: 262
    components:
    - type: Transform
      pos: 15.9523325,-5.1882668
      parent: 1
    - type: Paper
      content: >-
        Бортовой журнал — День 5

        Мы пока не удалялись далеко от шаттла. Прочитав некоторую информацию об этой планете, узнали, что здесь обитает огромное количество агрессивной фауны. Еда заканчивается, но нам повезло — в относительной близости от шаттла мы нашли труп шахтёра. Он сильно обгорел, видимо, неудачно упал в озеро лавы неподалёку. Выбраться ему удалось, но с такими ожогами долго не проживёшь... Припасов у него не было, но был крушитель и немного руды — весьма удобно для расчистки бесконечных пещер на этой планете. К сожалению, нам негде переплавить руду, может, позже что-нибудь найдём. Правый верхний отсек пострадал меньше всего — мы решили сосредоточиться на его ремонте, пусть он станет нашим пристанищем. Найти воду здесь крайне сложно, но, возможно, мы хотя бы сможем починить факс и вызвать помощь.
  - uid: 265
    components:
    - type: Transform
      pos: 2.9535875,-3.5435472
      parent: 1
    - type: Paper
      content: >-
        Бортовой дневник - день 6

        При работе с кустарным радиационным коллектором Джонни получил удар током из-за короткого замыкания. Бедняга не выжил — изоли не выдержали. Нас осталось двое. Скорее всего, смысла оставаться здесь нет — нужно собраться в поход, может, удастся кого-то найти.

        Покойся с миром, Джонни.
