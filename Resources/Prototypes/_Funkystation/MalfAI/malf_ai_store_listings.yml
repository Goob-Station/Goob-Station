# Malf AI shop listings

- type: listing
  id: MalfAiViewport
  name: malfai-listing-viewport-name
  description: malfai-listing-viewport-desc
  categories:
  - MalfAI
  - MalfAIDeception
  cost:
    CPU: 25
  icon:
    sprite: Interface/Actions/actions_malf_ai.rsi
    state: malfai_placeviewport
  productAction: ActionMalfAiSetViewport
  productEvent: !type:ActionPurchaseCompanionEvent
    companionActions:
      - ActionMalfAiOpenViewport
  conditions:
  - !type:ListingLimitedStockCondition
    stock: 1

