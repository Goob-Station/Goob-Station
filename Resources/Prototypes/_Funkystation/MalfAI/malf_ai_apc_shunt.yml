# Component kit applied to an APC while a Malf AI is shunted into it.
# Mirrors the AI core: locked holder slot (intellicard interaction only),
# the AiHeld registry applied to the contained brain, and AI vision around the APC.
- type: entity
  id: MalfAiApcShuntKit
  categories: [ HideSpawnMenu ]
  components:
  - type: StationAiHolder
    slot:
      name: station-ai-mind-slot
      locked: false
      disableEject: true
      whitelist:
        tags:
        - StationAi
  - type: ContainerComp
    proto: AiHeld
    container: station_ai_mind_slot
  - type: StationAiVision
