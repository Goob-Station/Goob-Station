# Basic actions always available to Malf AI

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiOpenStore
  name: Open CPU Store
  description: Open your CPU upgrade store to spend accumulated CPU on abilities.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_shop
    itemIconStyle: BigAction
    priority: -20
  - type: InstantAction
    event: !type:OpenMalfAiStoreActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiOpenBorgsUi
  name: Manage Borgs
  description: Open the borg management window to view, control, and set laws for borgs on the station.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_borgs
    itemIconStyle: BigAction
    priority: -10
  - type: InstantAction
    event: !type:OpenMalfAiBorgsUiActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiSetViewport
  name: Set Viewport
  description: Place your remote viewport anchor at the targeted location.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_placeviewport
    itemIconStyle: BigAction
    priority: -5
    useDelay: 30
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: WorldTargetAction
    event: !type:MalfAiSetViewportActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiOpenViewport
  name: Open Viewport
  description: Open the remote viewport window at your placed anchor location.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_openviewport
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiOpenViewportActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiReturnToCore
  name: Return to Core
  description: Return your consciousness to the AI core from your current location.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_returntocore
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiReturnToCoreActionEvent

# Purchasable abilities

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiDoomsday
  name: Initiate Doomsday
  description: Begin the 7-minute doomsday countdown. When it expires, the station will be destroyed.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_doomsday
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiDoomsdayActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiShuntToApc
  name: Shunt to APC
  description: Transfer your consciousness into a targeted APC, allowing you to move freely on the station.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_shunttoapc
    itemIconStyle: BigAction
    priority: -5
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: EntityTargetAction
    event: !type:MalfAiShuntToApcActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiVoiceModulator
  name: Voice Modulator
  description: Change your displayed voice name to impersonate others.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_voicemodulator
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiVoiceModulatorActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiOverloadMachine
  name: Overload Machine
  description: Overload a targeted machine, causing it to explode violently.
  components:
  - type: MalfAiAction # blocked while carded
  - type: LimitedCharges
    maxCharges: 2
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_overloadmachine
    itemIconStyle: BigAction
    priority: -5
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: WorldTargetAction
    event: !type:MalfAiOverloadMachineActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiHijackMech
  name: Hijack Mech
  description: Take control of a targeted mech for 2 minutes, ejecting its pilot.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_mech
    itemIconStyle: BigAction
    priority: -5
    useDelay: 600 # 10 min cooldown
    checkCanInteract: false
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: EntityTargetAction
    event: !type:MalfAiHijackMechActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiOverrideMachine
  name: Override Machine
  description: Remotely emag a targeted bot or device, subverting its safety protocols (e.g. medibots start injecting poison).
  components:
  - type: MalfAiAction # blocked while carded
  - type: LimitedCharges
    maxCharges: 2
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_overridemachine
    itemIconStyle: BigAction
    priority: -5
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: WorldTargetAction
    event: !type:MalfAiOverrideMachineActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiDetonateRCDs
  name: Detonate RCDs
  description: Trigger all RCDs on the station to explode after 5 seconds.
  components:
  - type: MalfAiAction # blocked while carded
  - type: LimitedCharges
    maxCharges: 1
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_detonatercd
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiDetonateRcdsActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiLockdownGrid
  name: Lockdown Grid
  description: Bolt all doors on the station grid for 30 seconds.
  components:
  - type: MalfAiAction # blocked while carded
  - type: LimitedCharges
    maxCharges: 1
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_lockdowngrid
    itemIconStyle: BigAction
    priority: -5
  - type: InstantAction
    event: !type:MalfAiLockdownGridActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiGyroscope
  name: Gyroscope
  description: Use your core's gyroscope to rapidly move to an adjacent tile, damaging anything in the way.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_gyroscope
    itemIconStyle: BigAction
    priority: -5
    useDelay: 3
  - type: TargetAction
    checkCanAccess: false
    range: 5
  - type: WorldTargetAction
    event: !type:MalfAiGyroscopeActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiRoboticsFactory
  name: Robotics Override
  description: Override the robotics fabricator to produce combat borgs.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_bg_factory
    itemIconStyle: BigAction
    priority: -5
  - type: TargetAction
    checkCanAccess: false
    range: 99999
  - type: WorldTargetAction
    event: !type:MalfAiRoboticsFactoryActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiToggleCameraUpgrade
  name: Camera X-Ray Upgrade
  description: Enhances your camera feed with x-ray vision within 6 tiles of each camera.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_cameraupgrade
    itemIconStyle: BigAction
    priority: -6
  - type: InstantAction
    event: !type:MalfAiToggleCameraUpgradeActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiToggleCameraMicrophones
  name: Camera Microphones
  description: Allows you to hear conversations that take place near cameras.
  components:
  - type: MalfAiAction # blocked while carded
  - type: Action
    icon:
      sprite: Interface/Actions/actions_malf_ai.rsi
      state: malfai_cameramic
    itemIconStyle: BigAction
    priority: -6
  - type: InstantAction
    event: !type:MalfAiToggleCameraMicrophonesActionEvent

# Mirror mech pilot actions for the hijacking AI: the mech entity itself fails the
# usual interaction/consciousness blockers, so these are mental actions instead.
- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiMechCycle
  name: Cycle
  description: Cycles currently selected equipment
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_cycle_equip_on
  - type: InstantAction
    event: !type:MechToggleEquipmentEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiMechUi
  name: Control Panel
  description: Opens the control panel for the mech
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_view_stats
  - type: InstantAction
    event: !type:MechOpenUiEvent
