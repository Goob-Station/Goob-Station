# Mirror mech pilot actions for the hijacking AI: the mech entity itself fails the
# usual interaction/consciousness blockers, so these are mental actions instead.
- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiMechCycle
  name: Cycle
  description: Cycles currently selected equipment
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_cycle_equip_on
  - type: InstantAction
    event: !type:MechToggleEquipmentEvent

- type: entity
  parent: BaseMentalAction
  id: ActionMalfAiMechUi
  name: Control Panel
  description: Opens the control panel for the mech
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_view_stats
  - type: InstantAction
    event: !type:MechOpenUiEvent
