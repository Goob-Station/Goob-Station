- type: entity
  id: ExperimentalSyndicateTeleporter
  parent: [BaseItem, BaseSyndicateContraband]
  name: téléporteur syndical expérimental
  description: Un appareil à recharge automatique qui téléporte l'utilisateur vers l'avant. En cas de téléportation dans un mur, utilise la téléportation d'urgence. Ou désintègre l'utilisateur s'il n'a plus de charges.
  components:
  - type: Sprite
    sprite: /Textures/_White/Objects/Devices/experimentalsyndicateteleporter.rsi
    layers:
    - state: icon
  - type: ExperimentalTeleporter
  - type: LimitedCharges
    maxCharges: 4
  - type: AutoRecharge
    rechargeDuration: 10
