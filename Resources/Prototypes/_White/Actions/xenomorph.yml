# Tail lash action
- type: entity
  id: ActionTailLash
  parent: BaseAction
  name: Coup de queue
  description: Frappez votre adversaire avec votre queue.
  components:
  - type: Action
    useDelay: 11
    itemIconStyle: BigAction
    icon: { sprite : _White/Interface/Actions/xenomorph.rsi, state: tail_attack }
  - type: TargetAction
    range: 10
  - type: WorldTargetAction
    event: !type:TailLashActionEvent

