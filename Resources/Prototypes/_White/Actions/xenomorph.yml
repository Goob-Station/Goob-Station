- type: entity # Goobstation - new action
  id: ActionSpawnResinDoor
  parent: BaseAction
  name: Construire une porte en résine (75)
  description: Sécrétez de la résine malléable et résistante.
  components:
  - type: Action
    useDelay: 2
    itemIconStyle: BigAction
    icon: { sprite :  _RMC14/Structures/Xenos/xeno_resin_door.rsi, state: resin }
  - type: TargetAction
    range: 2
  - type: WorldTargetAction
    event: !type:PlaceTileEntityEvent
      entity: ResinDoor
      length: 2
      blockedCollisionMask:
      - TableMask
      blockedCollisionLayer:
      - TableLayer
      - BulletImpassable
  - type: PlasmaCostAction
    plasmaCost: 75

