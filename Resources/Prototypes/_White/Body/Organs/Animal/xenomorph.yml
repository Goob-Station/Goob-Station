- type: entity
  parent: BaseItem
  id: BaseXenomorphOrgan
  abstract: true
  components:
  - type: Sprite
    sprite: _White/Mobs/Species/Xenomorph/organs.rsi
  - type: Organ
  - type: Food
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: SulfuricAcid
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 3
        - ReagentId: SulfuricAcid
          Quantity: 2
  - type: FlavorProfile
    flavors:
    - people
  - type: Tag
    tags:
    - Meat

- type: entity
  parent: [BaseXenomorphOrgan, OrganHumanBrain]
  id: OrganXenomorphBrain
  name: cerveau xénomorphe
  description: Nous comprenons à peine le cerveau des animaux terrestres. Qui sait ce que nous pourrions trouver dans le cerveau d'une espèce aussi évoluée ?
  components:
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: SulfuricAcid
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5

- type: entity
  parent: [BaseXenomorphOrgan, OrganHumanEyes]
  id: OrganXenomorphEyes
  name: yeux xénomorphes
  description: Il s'avère qu'ils en avaient bien après tout !
  components: # Goobstation - eyes give you xeno vision
  - type: Organ
    onAdd:
    - type: ThermalVision
      toggleAction: ToggleThermalVisionXenomorph
      color: white
      drawOverlay: false
      lightRadius: 10
      strength: 0
      noise: 0
      tint: 3, 3, 3

- type: entity
  parent: [BaseXenomorphOrgan, OrganHumanTongue]
  id: OrganXenomorphTongue
  name: langue xénomorphe
  description: Selon les principaux xénobiologistes, l'avantage évolutif d'avoir une deuxième bouche dans la bouche est « que ça a l'air stylé ».

- type: entity
  parent: [BaseXenomorphOrgan, OrganReptilianStomach]
  id: OrganXenomorphStomach
  name: estomac xénomorphe
  description: Ses parois sont capables de se dilater et de se contracter considérablement avec une force énorme.
  # TODO port xeno devouring

- type: entity
  parent: [BaseXenomorphOrgan, OrganHumanLiver]
  id: OrganXenomorphLiver
  name: foie xénomorphe
  description: Un foie ayant appartenu à un alien tueur ; on ne sait pas ce qu'il mangeait.
  components:
  - type: Metabolizer
    metabolizerTypes: [Xenomorph]
    groups:
    - id: Poison
      rateModifier: 1

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphAcidGland
  name: glande à acide
  description: Un réservoir spécialisé contenant de l'acide. Le mélange corrosif obtenu peut faire fondre la plupart des matériaux connus.
  components:
  - type: Sprite
    state: acid_gland
  - type: Organ
    slotId: acid_gland
    onAdd:
    - type: XenomorphAcid
      damagePerSecond:
        types:
          Caustic: 20
          Heat: 20 # Goobstation
  # <Goobstation>
  - type: AcidGland
  # - type: OrganActions
  #   actions:
  #   - ActionAcid
  # </Goobstation> commented until acid if fixed

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphNeurotoxinGland
  name: glande à neurotoxine
  description: Un réservoir spécialisé contenant de la neurotoxine. Il est composé de nombreux tubes microscopiques remplis d'un liquide transparent.
  components:
  - type: Sprite
    state: neurotoxin_gland
  - type: Organ
    slotId: neurotoxin_gland
    onAdd:
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: 0.75
    - type: PlasmaAmmoProvider
      fireCost: 55
      proto: BulletNeurotoxin
    - type: Gun
      fireRate: 0.75
      useKey: false
      selectedMode: FullAuto
      availableModes:
      - FullAuto
      soundGunshot: /Audio/Weapons/Xeno/alien_spitacid.ogg
  - type: NeurotoxinGland # Goobstation

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphEggSack
  name: sac à œufs
  description: Conçu pour produire et stocker des œufs contenant des facehuggers, la taille gigantesque de cet organe permet à la reine xénomorphe de pondre des milliers d'œufs en peu de temps.
  components:
  - type: Sprite
    sprite: _White/Mobs/Species/Xenomorph/organs.rsi
    state: egg_sack
  - type: Organ
    slotId: egg_sack
  # <Goobstation>
  - type: EggSack
  - type: OrganActions
    actions:
    - ActionSpawnXenomorphEgg
  # </Goobstation>

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphResinSpinner
  name: fileur de résine
  description: Conçu pour la production et l'isolation de biopolymère semblable à de la résine.
  components:
  - type: Sprite
    state: resin_spinner
  - type: Organ
    slotId: resin_spinner
  # <Goobstation>
  - type: ResinSpinner
  - type: OrganActions
    actions:
    - ActionSpawnWallResin
    - ActionSpawnResinDoor
    - ActionSpawnResinNest
  # </Goobstation>

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphHiveNode
  name: nœud de ruche
  description: L'organe central des xénomorphes, assurant la communication avec l'esprit collectif.
  components:
  - type: Sprite
    state: hive_node
  - type: Organ
    slotId: hive_node
    onAdd: # Omu start
      - type: FacehuggerImmune
      - type: Access # Goobstation - xeno doors
        enabled: true
        groups:
          - XenomorphAccess # Omu end
  - type: HiveNode
    # TODO: Organ should give XenoHivemind language and Xeno faction

- type: entity
  parent: BaseXenomorphOrgan
  id: OrganXenomorphPlasmaVessel
  name: vaisseau plasma
  description: Un réservoir contenant du plasma concentré et très actif — la principale source d'énergie et de matière première pour les armes biologiques du xénomorphe.
  components:
  - type: Sprite
    state: plasma_vessel
  - type: Organ
    slotId: plasma_vessel
    onAdd:
    - type: PlasmaVessel
  # <Goobstation>
  - type: PlasmaVessel # just used for whitelist, shouldn't do anything funny
  - type: OrganActions
    actions:
    - ActionTransferPlasma
    - ActionSpawnResinWeedNode
  # </Goobstation>

- type: entity
  parent: OrganXenomorphPlasmaVessel
  id: OrganXenomorphPlasmaVesselLarge
  name: grand vaisseau plasma
  components:
  - type: Sprite
    state: plasma_vessel_large
  - type: Organ
    onAdd:
    - type: PlasmaVessel
      maxPlasma: 500
      plasma: 200
      plasmaPerSecondOffWeed: 0.75
      plasmaPerSecondOnWeed: 7.5

- type: entity
  parent: OrganXenomorphPlasmaVesselLarge
  id: OrganXenomorphPlasmaVesselLargeQueen
  components:
  - type: Organ
    onAdd:
    - type: PlasmaVessel
      maxPlasma: 500
      plasma: 200
      plasmaPerSecondOffWeed: 1
      plasmaPerSecondOnWeed: 10

- type: entity
  parent: OrganXenomorphPlasmaVessel
  id: OrganXenomorphPlasmaVesselSmall
  name: petit vaisseau plasma
  components:
  - type: Sprite
    state: plasma_vessel_small
  - type: Organ
    onAdd:
    - type: PlasmaVessel
      maxPlasma: 150
      plasma: 100
      plasmaPerSecondOffWeed: 0.25
      plasmaPerSecondOnWeed: 2.5

- type: entity
  parent: OrganXenomorphPlasmaVessel
  id: OrganXenomorphPlasmaVesselTiny
  name: minuscule vaisseau plasma
  components:
  - type: Sprite
    state: plasma_vessel_tiny
  - type: Organ
    onAdd:
    - type: PlasmaVessel
      maxPlasma: 100
  - type: OrganActions # Goobstation - larba cant spread weeds, only transfer
    actions:
    - ActionTransferPlasma
