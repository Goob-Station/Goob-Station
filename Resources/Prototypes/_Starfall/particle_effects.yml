- type: particleEffect
  id: SfFireContinuous
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: dot
  shader: unshaded
  colorOverLifetime:
    - time: 0.0
      color: "#FCE6B6FF"
    - time: 0.2
      color: "#FBAF4DFF"
    - time: 0.5
      color: "#FD6B1CFF"
    - time: 0.8
      color: "#CC220088"
    - time: 1.0
      color: "#40000000"
  alphaOverLifetime:
    - time: 0.0
      value: 0.0
    - time: 0.05
      value: 1.0
    - time: 0.7
      value: 1.0
    - time: 1.0
      value: 0.0
  emissionRate: 10
  maxCount: 100
  particleSize: 1
  burst: false
  duration: 0
  gravity: -0.25 # negative values float up
  drag: 0.1
  noiseStrength: 0.15
  noiseFrequency: 0.8
  spreadAngle: 60
  emitAngle: 0
  shape:
    type: CircleFill
    radius: 0.3

