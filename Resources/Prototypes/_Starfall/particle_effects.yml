- type: particleEffect
  id: SfWeldingSparks
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: curl
  shader: unshaded
  colorOverLifetime:
    - time: 0.0
      color: "#FFFFFFFF"
    - time: 0.1
      color: "#FFEE88FF"
    - time: 0.5
      color: "#FF8800BB"
    - time: 1.0
      color: "#FF220000"
  lifetime: 0.3
  lifetimeVariance: 0.25
  speed: 2.5
  speedVariance: 1.5
  particleSize: 0.8
  stretchFactor: 0.5
  emissionRate: 18
  maxCount: 30
  burst: false
  duration: 0
  gravity: 5.0
  drag: 0.02
  spreadAngle: 90
  emitAngle: 0
  shape:
    type: CircleFill
    radius: 0.1

- type: particleEffect
  id: SfGibMist
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: soft_dot_big
  startColor: "#FFFFFFFF" #Gets changed by GibParticleSystem's ColorOverride to match the victim's blood color.
  endColor: "#FFFFFF00"
  alphaOverLifetime:
    - time: 0.0
      value: 1
    - time: 0.08
      value: 1
    - time: 0.5
      value: 0.6
    - time: 1.0
      value: 0.0
  sizeOverLifetime:
    - time: 0.0
      value: 0.3
    - time: 0.2
      value: 1.2
    - time: 1.0
      value: 2.0
  lifetime: 1.4
  lifetimeVariance: 0.4
  speed: 1
  speedVariance: 1.2
  particleSize: 0.5
  sizeVariance: 0.3
  emissionRate: 0
  maxCount: 55
  burst: true
  gravity: 1
  drag: 0.85
  noiseStrength: 0.5
  noiseFrequency: 0.9
  spreadAngle: 60
  emitAngle: 0
  startRotation: 0
  startRotationVariance: 60
  rotationSpeed: 1
  rotationSpeedVariance: 45
  shape:
    type: CircleFill
    radius: 0.2

