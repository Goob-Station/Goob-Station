- type: entity
  parent: BaseAction
  id: ActionEatMouse
  name: Manger une Souris
  description: Mangez la souris dans votre main, gagnant des nutriments et une charge de boule de poils.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: Nyanotrasen/Icons/verbiconfangs.png
  - type: InstantAction
    event: !type:EatMouseActionEvent

- type: entity
  parent: BaseAction
  id: ActionHairball
  name: Cracher une Boule de Poils
  description: Purgez une partie de votre flux chimique et obtenez une superbe boule de poils à lancer sur les gens.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: { sprite: Nyanotrasen/Objects/Specific/Species/felinid.rsi, state: icon }
    useDelay: 30
  - type: InstantAction
    event: !type:HairballActionEvent
