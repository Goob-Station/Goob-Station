- type: entity
  parent: BaseAction
  id: ActionHarpyPlayMidi
  name: Jouer du MIDI
  description: Chantez à perdre haleine ! Faites un clic droit sur vous-même pour choisir un instrument.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    icon: _DV/Interface/Actions/harpy_sing.png
  - type: InstantAction
    event: !type:OpenUiActionEvent
      key: enum.InstrumentUiKey.Key

- type: entity
  parent: BaseAction
  id: ActionSyrinxChangeVoiceMask
  name: Définir le nom
  description: Changez le nom que les autres entendent.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _DV/Interface/Actions/harpy_syrinx.png
    itemIconStyle: BigAction
  - type: InstantAction
    event: !type:VoiceMaskSetNameEvent

- type: entity
  parent: BaseAction
  id: ActionToggleFlight
  name: Voler
  description: Utilisez vos ailes pour voler. Réduisez au silence les accusations d'oiseau incapable de voler.
  components:
  - type: Action
    checkCanInteract: false
    icon: { sprite: _EinsteinEngines/Interface/Actions/flight.rsi, state: flight_off }
    iconOn: { sprite : _EinsteinEngines/Interface/Actions/flight.rsi, state: flight_on }
  - type: InstantAction
    event: !type:ToggleFlightEvent
