- type: entity
  parent: BaseAction
  id: ActionCosmicSiphon
  name: Siphonner l'Entropie
  description: Siphonnez silencieusement l'entropie de votre cible, lui infligeant quelques dégâts au passage.
  components:
  - type: Action
    useDelay: 15
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: siphon
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    whitelist:
      components:
        - HumanoidAppearance
    blacklist:
      components:
      - CosmicCult
    event: !type:EventCosmicSiphon {}

- type: entity
  parent: BaseAction
  id: ActionCosmicBlank
  name: Dévier la Subjectivité
  description: Déviez l'esprit de votre cible hors de son corps vers les ténèbres cosmiques, le rendant temporairement sans conscience.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 120
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: blank
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    canTargetSelf: true
    whitelist:
      components:
        - HumanoidAppearance
    blacklist:
      components:
      - CosmicCult
    event: !type:EventCosmicBlank {}

- type: entity
  parent: BaseAction
  id: ActionCosmicPlaceMonument
  name: Appeler le Monument
  description: Faites surgir le Monument dans l'espace réel. Gardez-le caché et à l'abri des non-cultistes !
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 999
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: monument
  - type: ConfirmableAction
    popup: cosmicability-monument-spawn-confirm
    primeTime: 10 #increased to give you more time to figure out where you want to put it
  - type: InstantAction
    event: !type:EventCosmicPlaceMonument {}
  - type: MonumentPlacementPreview
    tier: 1

- type: entity
  parent: BaseAction
  id: ActionCosmicMoveMonument
  name: Déplacer le Monument
  description: Votre œuvre est impérative, et la fin est inévitable. Assurez-vous qu'elle s'accomplisse sous votre surveillance.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 600
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: monument-relocate
  - type: ConfirmableAction
    popup: cosmicability-monument-move-confirm
    primeTime: 10 #increased to give you more time to figure out where you want to put it
  - type: InstantAction
    event: !type:EventCosmicMoveMonument
  - type: MonumentPlacementPreview
    tier: 1

- type: entity
  parent: BaseAction
  id: ActionCosmicReturn
  name: Retourner
  description: Dissipez votre projection astrale et retournez dans votre corps.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 0
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: return
  - type: InstantAction
    event: !type:EventCosmicReturn {}

- type: entity
  parent: BaseAction
  id: ActionCosmicLapse
  name: Défaillance Aberrante
  description: Faites défaillir la forme corporelle de votre cible, la rendant temporairement immuable, impénétrable et figée sur place.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 24
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: lapse
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    canTargetSelf: true
    whitelist:
      components:
        - HumanoidAppearance
    event: !type:EventCosmicLapse {}

- type: entity
  parent: BaseAction
  id: ActionCosmicGlare
  name: Regard du Néant
  description: Émettez une horrible impulsion de lumière cosmique, ralentissant et désorientant tout le monde autour de vous.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: glare
  - type: InstantAction
    event: !type:EventCosmicGlare {}

- type: entity
  parent: BaseAction
  id: ActionCosmicIngress
  name: Forcer l'Entrée
  description: Utilisez une décharge de pouvoir concentrée pour forcer l'ouverture d'une porte sécurisée.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 5
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: ingress
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    whitelist:
      components:
        - Door
    event: !type:EventCosmicIngress {}

- type: entity
  parent: BaseAction
  id: ActionCosmicImposition
  name: Imposition du Vide
  description: Vous annulez tout dommage entrant pendant un court moment.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 60
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: entropic
  - type: InstantAction
    event: !type:EventCosmicImposition {}

- type: entity
  parent: BaseAction
  id: ActionCosmicNova
  name: Nova Astrale
  description: Lancez une grande et perturbatrice déflagration d'énergie astrale.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 30
    raiseOnUser: true
    itemIconStyle: NoItem
    icon:
      sprite: _DV/CosmicCult/Icons/cosmiccult_abilities.rsi
      state: nova
  - type: TargetAction
    range: 60
  - type: WorldTargetAction
    event: !type:EventCosmicNova {}

