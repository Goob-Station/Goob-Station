- type: entity
  parent: BaseAction
  id: ActionOpenRadioImplant
  name: Ouvrir l'implant radio
  description: Ouvre le compartiment de la clé bluespace de l'implant radio intégré dans votre crâne.
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Clothing/Ears/Headsets/base.rsi
      state: icon
  - type: InstantAction
    event: !type:OpenStorageImplantEvent

- type: entity
  parent: BaseAction
  id: ActionOpenMouthStorage
  name: Ouvrir le stockage des joues
  description: Vous permet de stocker des objets dans vos joues.
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -10
    icon: _DV/Interface/Actions/mouthStorageOpen.png
  - type: InstantAction
    event: !type:OpenStorageImplantEvent

- type: entity
  parent: BaseAction
  id: ActionToggleSneakMode
  name: Basculer le mode furtif
  description: Rampez sous les tables.
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 3
    icon:
      sprite: Structures/Furniture/Tables/generic.rsi
      state: full
  - type: InstantAction
    event: !type:ToggleCrawlingStateEvent

- type: entity
  id: ActionChitzite
  name: Cracher un Chitzite
  description: Purgez l'excès d'accumulation radioactive de votre corps et obtenez une cool pierre de danger.
  components:
  - type: Action
    enabled: false
    icon:
      sprite: _DV/Objects/Specific/Species/chitinid.rsi
      state: chitzite
    useDelay: 120
  - type: InstantAction
    event: !type:CoughItemActionEvent
