- type: entity
  name: dendrite d'ascendant
  parent: BaseAnimalOrgan
  id: AscendedDendrite
  description: Un faisceau de tissu semi-éphémère extrait de l'enveloppe qui s'effiloche d'un ascendant astral. Une faible lumière maligne pulse en son sein.
  components:
  - type: RogueAscendedDendrite
  - type: Item
    size: Normal
  - type: Edible
  - type: FlavorProfile
    flavors:
      - entropic
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/ascendantorgan.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Entropy
          Quantity: 10

- type: entity
  id: CosmicCultLawBoard
  parent: BaseElectronics
  name: plaquette de lois malignes
  description: Un étrange circuit électronique, conçu pour être inséré dans une console de téléchargement de lois pour IA. Ses circuits sont entrelacés de filaments dendritiques fantomatiques qui frémissent d'eux-mêmes.
  components:
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/lawboard.rsi
    state: icon
  - type: SiliconLawProvider
    lawUploadSound: /Audio/_DV/CosmicCult/antag_cosmic_briefing.ogg
    subverted: true
    laws: CosmicCultLaws
