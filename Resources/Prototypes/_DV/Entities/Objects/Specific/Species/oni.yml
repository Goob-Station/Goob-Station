- type: entity
  parent: FlaskBase
  id: DrinkOniGourd
  name: gourde à saké
  description: Un récipient traditionnel utilisé par les oni. On dit qu'il est rempli du meilleur saké.
  components:
  - type: Sprite
    state: icon
    sprite: _DV/Objects/Specific/Species/Oni/gourd.rsi
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Sake
          Quantity: 50
  - type: SolutionRegeneration
    solution: drink
    generated:
      reagents:
      - ReagentId: Sake
        Quantity: 2
    duration: 10

- type: entity
  parent: DrinkOniGourd
  id: BeastBloodGourd
  name: gourde de sang de bête
  description: Une gourde modifiée par Cybersun, celle-ci produit un mélange puissant de stimulants et d'alcool connu sous le nom de sang de bête.
  components:
  - type: Sprite
    state: icon
    sprite: _DV/Objects/Specific/Species/Oni/cybergourd.rsi
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: BeastBlood
          Quantity: 50
  - type: SolutionRegeneration
    solution: drink
    generated:
      reagents:
      - ReagentId: BeastBlood
        Quantity: 2
    duration: 10
