- type: entity
  parent: BaseItem
  id: TapeRecorder
  name: magnétophone
  description: Tout ce qui est dit dans cet appareil pourra et sera utilisé contre vous devant un tribunal de droit spatial.
  components:
  - type: Sprite
    sprite: _DV/Objects/Devices/tape_recorder.rsi
    layers:
    - state: empty
    - state: idle
      map: ["tape"]
      visible: false
  - type: Item
    size: Small
  - type: TapeRecorder
  - type: ActiveListener
    range: 4
  - type: UseDelay
    delay: 1
  - type: Speech
  - type: ItemSlots
    slots:
      cassette_tape:
        priority: 4
        whitelist:
          components:
          - FitsInTapeRecorder
  - type: ContainerContainer
    containers:
      cassette_tape: !type:ContainerSlot
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.TapeRecorderVisuals.Mode:
        tape:
          Stopped: { state: "idle" }
          Playing: { state: "playing" }
          Recording: { state: "recording" }
          Rewinding: { state: "rewinding" }
      enum.TapeRecorderVisuals.TapeInserted:
        tape:
          True: { visible: true }
          False: { visible: false }
  - type: ActivatableUI
    key: enum.TapeRecorderUIKey.Key
    inHandsOnly: true
    requireActiveHand: false
  - type: UserInterface
    interfaces:
      enum.TapeRecorderUIKey.Key:
        type: TapeRecorderBoundUserInterface

- type: entity
  parent: TapeRecorder
  id: TapeRecorderFilled
  suffix: Rempli
  components:
  - type: ContainerFill
    containers:
      cassette_tape:
      - CassetteTape

- type: entity
  parent: BaseItem
  id: CassetteTape
  name: cassette
  description: Une bande magnétique pouvant contenir jusqu'à deux minutes de contenu de chaque côté.
  components:
  - type: Sprite
    sprite: _DV/Objects/Devices/cassette_tapes.rsi
    layers:
    - state: tape_greyscale
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: tape_ribbonoverlay
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: Item
    size: Tiny
  - type: Damageable
  - type: TapeCassette
    maxCapacity: 180
    repairWhitelist:
      tags:
      - Screwdriver
      - Write
  - type: FitsInTapeRecorder
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.Base:
        tape_greyscale: Rainbow

- type: entity
  suffix: Entretien avec Garry Smosh
  parent: CassetteTape
  id: CassetteTapeInterview
  components:
  - type: Label
    currentLabel: Entretien avec Garry Smosh
  - type: TapeCassette
    recordedData:
      - timestamp: 2
        name: Phil Dervin
        message: "Il est 11h43, les personnes présentes dans la pièce sont Phil Dervin, Détective première classe, l'officier Belview et Grarry Smosh, suspect d'une intrusion en zone sécurisée, quatre agressions, deux vols et 85 troubles à l'ordre public."
      - timestamp: 6
        name: Phil Dervin
        message: "Monsieur Smosh, comprenez-vous les charges qui vous sont reprochées ?"
      - timestamp: 14
        name: Grarry Smosh
        message: "J'en ai rien à faire de ce que vous dites, j'ai rien fait."
      - timestamp: 18
        name: Phil Dervin
        message: "Monsieur, vous avez été pris en flagrant délit dans la chambre du Capitaine. En pleine tentative de vol de sa réserve de whisky, qui plus est."
      - timestamp: 23
        name: Phil Dervin
        message: "Vous avez de la chance qu'il ne vous ait pas tiré dessus pour ça."
      - timestamp: 28
        name: Grarry Smosh
        message: "J'ai vu aucun panneau disant que je pouvais pas être là."
      - timestamp: 34
        name: Phil Dervin
        message: "La chambre du Capitaine ? Je ne pense pas qu'on ait besoin d'un panneau pour dire aux gens de rester dehors - c'est du bon sens."
      - timestamp: 38
        name: Phil Dervin
        message: "Bref, ce n'est pas le sujet, même si ce n'était pas une zone interdite, il y a toujours la question des objets à accès restreint trouvés sur vous et la tentative de fuite lors de l'arrestation."
      - timestamp: 42
        name: Grarry Smosh
        message: "J'ai rien fait du tout."
      - timestamp: 46
        name: Officer Belview
        message: "Vous avez semé 3 officiers, volé une matraque paralysante et battu Ian avec. Le Chef du Personnel était très mécontent de cette dernière partie."
      - timestamp: 50
        name: Grarry Smosh
        message: "Qui parmi vous a donné un désactivateur au Chef du Personnel ?"
      - timestamp: 54
        name: Phil Dervin
        message: "C'est le Gardien, et c'était une bonne idée, non ?"
      - timestamp: 58
        name: Officer Belview
        message: "Je dirais que oui."
