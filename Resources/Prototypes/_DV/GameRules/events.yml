- type: entity
  id: MothroachSpawn
  parent: BaseGameRule
  components:
  - type: StationEvent
    earliestStart: 15
    minimumPlayers: 15
    weight: 4
    duration: 30
    eventType: Neutral
  - type: GameRule
    chaosScore: 40
 #- type: PrecognitionResult
 #  message: psionic-power-precognition-mothroach-spawn-result-message
  - type: VentCrittersRule
    table: !type:GroupSelector
      children:
      - id: MobMothroach
      - id: MobMothroachMustard # Goob-Mothroaches-Start
      - id: MobMothroachLeopard
      - id: MobMothroachCecropia
      - id: MobMothroachLunar
        weight: 0.02 # Goob-Mothroaches-End

- type: entity
  parent: BaseGameRule
  id: MalignRiftSpawn
  components:
  - type: StationEvent
    earliestStart: 15
    minimumPlayers: 15
    weight: 0.4 #this should be rare to throw people off, otherwise it happens every shift
    eventType: Neutral
    startAnnouncement: cosmiccult-announce-tier2-warning
    startAnnouncementColor: "#cae8e8"
    startAudio:
      path: /Audio/_DV/CosmicCult/tier2.ogg
  - type: GameRule
    chaosScore: -50
  - type: RandomMultipleSpawnRule
    prototype: CosmicMalignRift
    minAmount: 1
    maxAmount: 3
