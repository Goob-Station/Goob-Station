# Goobstation here is everything ClothingUniformFoldableBase and Sprites. Take ours here if upstreaming im lazy cant be bothered to webedit comment all this.
# White Jumpskirt
- type: entity
  parent: [ClothingUniformSkirtBase, ClothingUniformFoldableBase]
  id: ClothingUniformJumpskirtColorWhite
  name: unijupe blanche
  description: Une unijupe générique blanche sans enseigne de rang.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Uniforms/Jumpskirt/color/color.rsi
    layers:
    - state: icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Clothing
    sprite: _Goobstation/Clothing/Uniforms/Jumpskirt/color/white.rsi


