- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackDuffel
  name: sac de sport
  description: Un grand sac de sport pour transporter des affaires supplémentaires.
  components:
  - type: Sprite
    sprite: Clothing/Back/Duffels/duffel.rsi
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,7,4
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: HeldSpeedModifier

