- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesFlippers
  name: palmes
  description: Une paire de palmes en caoutchouc qui améliorent les performances de natation lorsqu'on les porte.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/flippers.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/flippers.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesLeather
  name: chaussures en cuir
  description: Une paire de chaussures très élégantes, confectionnées en cuir de qualité.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/leather.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/leather.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesSlippers
  name: chaussons
  description: Tout doux !
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/slippers.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/slippers.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoeSlippersDuck
  name: chaussons canards
  description: Vous aimeriez bien qu'elles fassent des "coin-coin" quand on marche. Mais c'est tant mieux qu'elles ne le fassent pas.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/duck-slippers.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/duck-slippers.rsi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepDuck # Goobstation - quack
      params:
        variation: 0.07
  - type: WaddleWhenWorn # Goobstation
    tumbleIntensity: 10 # smaller than clown shoes
  - type: Construction
    graph: ClothingShoeSlippersDuck
    node: shoes

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoeSlippersLizard
  name: chaussons peluche lézard
  description : Une adorable paire de chaussons représentant un homme-lézard. Associez-les à d'autres vêtements verts et vous serez le membre d'équipage le plus cool de la station !
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/lizard-slippers.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/lizard-slippers.rsi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepLizardSlippers # Goobstation - weh
      params:
        variation: 0.02
  - type: WaddleWhenWorn # Goobstation
    tumbleIntensity: 10 # smaller than clown shoes
  - type: Construction
    graph: ClothingShoeSlippersLizard
    node: shoes
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: JuiceThatMakesYouWeh
        Quantity: 60
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Fiber
          Quantity: 20
        - ReagentId: JuiceThatMakesYouWeh
          Quantity: 20

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesTourist
  name: chaussures de touriste
  description: Ces sandales bon marché n'ont pas l'air très confortables.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/tourist.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/tourist.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesDameDane
  name: Chaussures de yakuza
  description: At last...
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/damedaneshoes.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/damedaneshoes.rsi

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesSnakeskinBoots
  name: Bottes en peau de serpent
  description: Des bottes en peau de serpent haut de gamme, tout le monde autour de vous vous enviera.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/snakeskin.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/snakeskin.rsi
  - type: NoSlip

- type: entity
  parent: [ClothingShoesBase, PowerCellSlotSmallItem, BaseToggleClothing]
  id: ClothingShoesBootsSpeed
  name: bottes de vitesse
  description: Des bottes high-tech tissées à partir de fibres quantiques, capables de transformer l'électricité en vitesse pure !
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/speedboots.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Shoes/Boots/speedboots.rsi
  - type: ToggleClothing
    action: ActionToggleSpeedBoots
  - type: ClothingSpeedModifier
    walkModifier: 1.5
    sprintModifier: 1.5
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: StaticPrice
    price: 500
  - type: PowerCellDraw
    drawRate: 20 #Goob
  - type: ToggleCellDraw
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
  - type: Tag
    tags: []
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 375
      Plastic: 250
      Silver: 125
  - type: ModifyStandingUpTime
    multiplier: 3

- type: entity
  parent: BaseAction
  id: ActionToggleSpeedBoots
  name: Activer/désactiver les bottes de vitesse
  description: Permet d'activer ou de désactiver vos bottes de vitesse.
  components:
  - type: Action
    itemIconStyle: BigItem
  - type: InstantAction
    event: !type:ToggleActionEvent

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesBootsMoon
  name: moon boots
  description: Bottes anti-gravité spéciales, conçues à partir d'un mélange exclusif de gel de roche lunaire. Expédiées depuis les Pays-Bas.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/moonboots.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/moonboots.rsi
  - type: AntiGravityClothing
  - type: StaticPrice
    price: 75
  - type: Tag
    tags: [ ]
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 150

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesBootsJump
  name: bottes de saut
  description: Des bottes high-tech qui vous donnent l'incroyable capacité de SAUTER ! Avec ces bottes, vous pouvez sauter par-dessus la lave, les gouffres et les substances chimiques étranges qui jonchent le sol !
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
  - type: JumpAbility
    jumpDistance: 4
    jumpSound: /Audio/Effects/stealthoff.ogg
  - type: ActionGrant
    actions:
    - ActionGravityJump
  - type: ItemActionGrant
    actions:
    - ActionGravityJump
    activeIfWorn: true
    restrictedSlots:
    - FEET
  - type: StaticPrice
    price: 220
  - type: Tag
    tags: []
