- type: entity
  abstract: true
  parent: BaseItem
  id: BaseHypospray
  components:
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: Spillable
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Appearance

- type: entity
  parent: [BaseHypospray, BaseGrandTheftContraband]
  id: Hypospray
  name: hypospray
  description: A sterile injector for rapid administration of drugs to patients.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    layers:
    - state: hypo
      map: ["enum.SolutionContainerLayers.Base"]
    - state: hypo_fill1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 30
  - type: RefillableSolution
    solution: hypospray
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: Tag
    tags:
    - HighRiskItem
  - type: StealTarget
    stealGroup: Hypospray
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypo_fill
    solutionName: hypospray

- type: entity
  parent: [BaseHypospray, BaseSyndicateContraband]
  id: SyndiHypo
  name: gorlex hypospray
  description: A sterile injector for rapid administration of drugs. Reverse-engineered from Nanotrasen designs, Cybersun produces these in limited quantities for Gorlex Marauders' corpsmen.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/syndihypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: Objects/Specific/Medical/syndihypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 20
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: hypo_fill
    solutionName: hypospray

- type: entity
  parent: BaseHypospray
  id: BorgHypo
  name: borghypo
  description: A sterile injector for rapid administration of drugs to patients. This integrated model is specialized for use by medical borgs.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    layers:
    - state: borghypo
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: borghypo_fill1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: RefillableSolution
    solution: hypospray
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: borghypo_fill
    solutionName: hypospray
  - type: UseDelay
    delay: 0.5

- type: entity
  parent: BaseHypospray
  id: JetInjector
  name: jet injector
  description: A sterile injector for convenient administration of drugs to patients.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/jetinjector.rsi
    layers:
    - state: jetinjector_base
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: jetinjector_filled1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    sprite: Objects/Specific/Medical/jetinjector.rsi
  - type: UseDelay
    delay: 1.5
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 15
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: jetinjector_filled
    solutionName: hypospray
  - type: Injector
    solutionName: hypospray
    currentTransferAmount: null # Inject everything on injection.
    activeModeProtoId: JetInjectorDynamicMode
    allowedModes:
    - JetInjectorDynamicMode
    - JetInjectorInjectMode

- type: entity
  parent: JetInjector
  id: AdvancedJetInjector
  name: advanced jet injector
  description: A pristine, fashionable, high quality injector. Allows for a faster injection, with a slightly larger capacity.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/advanced_jetinjector.rsi
    layers:
    - state: jetinjector_base
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: jetinjector_filled1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    sprite: Objects/Specific/Medical/advanced_jetinjector.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 20
  - type: SolutionContainerVisuals
    maxFillLevels: 4
  - type: Injector
    activeModeProtoId: AdvancedJetInjectorDynamicMode
    allowedModes:
    - AdvancedJetInjectorDynamicMode
    - AdvancedJetInjectorInjectMode

- type: entity
  parent: SyndiHypo
  id: AdminHypo
  name: experimental hypospray
  suffix: Admeme
  description: The ultimate application of bluespace technology and rapid chemical administration.
  components:
    - type: SolutionContainerManager
      solutions:
        hypospray:
          maxVol: 3000
    - type: UseDelay
      delay: 0.0

- type: entity
  parent: BaseHypospray
  id: ChemicalMedipen
  name: chemical medipen
  description: A single-dose, non-refillable medipen.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: firstaid
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: Item
    sprite: Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#439822"
      - state: base-colorB-inhand-left
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#439822"
      - state: base-colorB-inhand-right
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20 # Goobstation
  - type: ExaminableSolution
    solution: pen
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: firstaid_empty
  - type: PhysicalComposition
    materialComposition:
      Plastic: 25
  - type: SpaceGarbage
  - type: StaticPrice
    price: 75 # These are limited supply items.
  - type: Tag
    tags:
    - Medipen
  - type: TrashOnSolutionEmpty
    solution: pen
  - type: CosmicTransmutable # DeltaV - cosmic cult
    transmutesTo: CosmicMedipen
    requiredGlyphType: CosmicGlyphBlades # Well I mean it DOES have a needle in it

- type: entity
  parent: ChemicalMedipen
  id: EmergencyMedipen
  name: emergency medipen
  description: A rapid and safe way to heal minor damage, stop bleeding, and stabilize patients for personnel without advanced medical knowledge. # goobstation
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: medipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: medipen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15 # Goobstation
        reagents:
        - ReagentId: Epinephrine # Goobstation
          Quantity: 5
        - ReagentId: Atropine # Goobstation
          Quantity: 5
        - ReagentId: TranexamicAcid # Goobstation
          Quantity: 5
  - type: Tag
    tags:
    - Medipen
    - EmergencyMedipen
    - Trash

- type: entity
  parent: ChemicalMedipen
  id: AntiPoisonMedipen
  name: poison auto-injector
  description: A rapid dose of anti-poison. Causes extreme stress when mixed with other medications.
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#573d9e"
      - state: base-colorB-inhand-left
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#573d9e"
      - state: base-colorB-inhand-right
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: penacid
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: penacid_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15
        reagents:
        - ReagentId: Monover
          Quantity: 15
       # - ReagentId: Epinephrine
       #   Quantity: 5

