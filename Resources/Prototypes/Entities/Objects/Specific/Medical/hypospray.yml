- type: entity
  name: hypospray
  parent: [BaseItem, BaseGrandTheftContraband]
  description: Un injecteur stérile pour l'administration rapide de médicaments aux patients.
  id: Hypospray
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 30
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: Tag
    tags:
    - HighRiskItem
  - type: StealTarget
    stealGroup: Hypospray
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypo_fill
    solutionName: hypospray

- type: entity
  name: hypospray Gorlex
  parent: BaseItem
  description: En utilisant des plans rétro-ingéniés de NT, Cybersun les a produits en quantités limitées pour les opérateurs des Maraudeurs Gorlex.
  id: SyndiHypo
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/syndihypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: Objects/Specific/Medical/syndihypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 20
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.25
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: hypo_fill
    solutionName: hypospray

- type: entity
  name: borghypo
  parent: BaseItem
  description: Un injecteur stérile pour l'administration rapide de médicaments aux patients. A cheaper and more specialised version for medical borgs.
  id: BorgHypo
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: borghypo
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.5

- type: entity
  name: hypospray expérimental
  suffix: Admeme
  parent: SyndiHypo
  description: L'application ultime de la technologie bluespace pour l'administration rapide de produits chimiques.
  id: AdminHypo
  components:
    - type: SolutionContainerManager
      solutions:
        hypospray:
          maxVol: 3000
    - type: UseDelay
      delay: 0.0

- type: entity
  name: médipen chimique
  parent: BaseItem
  description: Un injecteur stérile pour l'administration rapide de médicaments aux patients. Celui-ci ne peut pas être rechargé.
  id: ChemicalMedipen
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: firstaid
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: Item
    sprite: Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#439822"
      - state: base-colorB-inhand-left
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#439822"
      - state: base-colorB-inhand-right
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20 # Goobstation
  - type: ExaminableSolution
    solution: pen
    exactVolume: true
  - type: Hypospray
    solutionName: pen
    transferAmount: 20 # Goobstation
    onlyAffectsMobs: false
    injectOnly: true
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: firstaid_empty
  - type: PhysicalComposition
    materialComposition:
      Plastic: 25
  - type: SpaceGarbage
  - type: StaticPrice
    price: 75 # These are limited supply items.
  - type: Tag
    tags:
    - Medipen
  - type: TrashOnSolutionEmpty
    solution: pen

- type: entity
  name: médipen d'urgence
  parent: ChemicalMedipen
  id: EmergencyMedipen
  description: Un moyen rapide et sûr de soigner les blessures mineures, arrêter les saignements et stabiliser les patients pour le personnel sans formation médicale avancée. # goobstation
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: medipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: medipen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15 # Goobstation
        reagents:
        - ReagentId: Epinephrine # Goobstation
          Quantity: 5
        - ReagentId: Atropine # Goobstation
          Quantity: 5
        - ReagentId: TranexamicAcid # Goobstation
          Quantity: 5
  - type: Tag
    tags:
    - Medipen
    - EmergencyMedipen
    - Trash

- type: entity
  name: auto-injecteur antipoison
  parent: ChemicalMedipen
  id: AntiPoisonMedipen
  description: Une dose rapide d'antipoison. Provoque un stress extrême lorsqu'il est mélangé à d'autres médicaments.
