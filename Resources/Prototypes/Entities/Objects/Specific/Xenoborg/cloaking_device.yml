- type: entity
  parent: [ BaseItem, BaseXenoborgContraband ]
  id: CloakingDevice
  name: dispositif de camouflage
  description: Un dispositif permettant aux Xénoborgs de devenir invisibles.
  components:
  - type: Sprite
    sprite: Objects/Specific/Research/anomalyscanner.rsi
    state: icon
  - type: ItemToggle
  - type: ComponentToggler
    parent: true
    components:
    - type: Stealth
      minVisibility: 0.1
      lastVisibility: 0.1
      thermalsImmune: true # Goobstation
  - type: PowerCellDraw
    drawRate: 3.6 # 100 seconds
  - type: ToggleCellDraw
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmallNuclear
        disableEject: true
        swap: false

- type: entity
  parent: CloakingDevice
  id: SuperCloakingDevice
  name: super dispositif de camouflage
  description: Un dispositif permettant aux Xénoborgs de devenir véritablement invisibles.
  components:
  - type: ComponentToggler
    parent: true
    components:
    - type: Stealth
      minVisibility: -1
      lastVisibility: -1
  - type: PowerCellDraw
    drawRate: 12 # 30 seconds
