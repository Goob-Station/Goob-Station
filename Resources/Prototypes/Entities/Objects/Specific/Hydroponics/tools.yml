- type: entity
  name: mini binette
  parent: BaseItem
  id: HydroponicsToolMiniHoe
  description: Utilisée pour enlever les mauvaises herbes ou se gratter le dos.
  components:
  - type: Tag
    tags:
    - Hoe
    - BotanyHoe
  - type: Sprite
    sprite: Objects/Tools/Hydroponics/hoe.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 135
    swingLeft: true
    damage:
      types:
        Slash: 6
  - type: Item
    sprite: Objects/Tools/Hydroponics/hoe.rsi
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  name: sécateur
  parent: BaseItem
  id: HydroponicsToolClippers
  description: Un outil utilisé pour prélever des échantillons sur les plantes.
  components:
  - type: Tag
    tags:
    - PlantSampleTaker
    - HydroponicsToolClippers # Einstein Engines
  - type: Sprite
    sprite: Objects/Tools/Hydroponics/clippers.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 90
    damage:
      types:
        Slash: 7
  - type: Item
    sprite: Objects/Tools/Hydroponics/clippers.rsi
    storedRotation: -90
  - type: Retractor # Shitmed: Same as wirecutters
    speed: 0.35
  - type: Hemostat
    speed: 0.6
  - type: SurgeryTool # Shitmed
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor2.ogg
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  # Goobstation changes
  - type: Tool
    qualities:
    - Cutting
    useSound:
      path: /Audio/Items/wirecutter.ogg
    speedModifier: 0.25    

- type: entity
  name: faux
  parent: BaseItem
  id: HydroponicsToolScythe
  description: Une lame tranchante et courbée sur un long manche en fibremetal, cet outil facilite la récolte de ce que vous semez.
  components:
  - type: Sharp
  - type: Sprite
    sprite: Objects/Tools/Hydroponics/scythe.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 135
    damage:
      types:
        Slash: 10
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Tools/Hydroponics/scythe.rsi
    slots:
    - back
  - type: StaticPrice
    price: 40
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Plastic: 100

- type: entity
  name: hachette
  parent: BaseItem
  id: HydroponicsToolHatchet
  description: Une lame de hache très tranchante sur un court manche en fibremetal. Elle a une longue histoire de découpe, mais est désormais utilisée pour couper du bois.
  components:
  - type: Tag
    tags:
    - BotanyHatchet
  - type: Sharp
  - type: Sprite
    sprite: Objects/Tools/Hydroponics/hatchet.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 135
    swingLeft: true
    damage:
      types:
        Slash: 8
        Piercing: 2
  - type: Item
    sprite: Objects/Tools/Hydroponics/hatchet.rsi
  - type: BoneSaw # Shitmed
    speed: 0.35
  - type: SurgeryTool # Shitmed
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/saw.ogg
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  name: bêche
  parent: BaseItem
  id: HydroponicsToolSpade
  description: Un petit outil pour creuser et déplacer de la terre.
  components:
  - type: Tag
    tags:
    - BotanyShovel
  - type: Sprite
    sprite: Objects/Tools/Hydroponics/spade.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 45
    damage:
      types:
        Blunt: 8
        Piercing: 2 # I guess you can stab it into them?
    soundHit:
      collection: MetalThud
  - type: Item
    sprite: Objects/Tools/Hydroponics/spade.rsi
  - type: Shovel
    speedModifier: 0.75 # slower at digging than a full-sized shovel
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  name: sac à plantes
  id: PlantBag
  parent: BaseStorageItem
  description: Un sac permettant aux botanistes de transporter facilement leurs grandes récoltes.
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/Equipment/plant_bag.rsi
    state: icon
  - type: Item
    storedRotation: -90
  - type: Clothing
    quickEquip: false
    slots:
    - belt
  - type: Storage
    grid:
    - 0,0,7,4
    maxItemSize: Small
    quickInsert: true
    areaInsert: true
    whitelist:
      components:
        - Produce
        - Seed
  - type: Dumpable
  - type: RelayInteractionStorage # Goobstation
    whitelist:
      components:
      - ProduceMaterialExtractor
