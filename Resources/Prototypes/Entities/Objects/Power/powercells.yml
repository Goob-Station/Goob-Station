- type: entity
  id: BasePowerCell
  abstract: true
  parent: BaseItem
  components:
  - type: Item
    storedRotation: -90
  - type: Battery
    pricePerJoule: 0.15
  - type: PowerCell
  - type: Explosive
    explosionType: Default
    maxIntensity: 200
    intensitySlope: 1.5
  - type: Sprite
    sprite: Objects/Power/power_cells.rsi
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Tag
    tags:
      - PowerCell
      - DroneUsable # Goobstation
  - type: Appearance
  - type: PowerCellVisuals
  - type: Riggable
  - type: StealTarget #Goobstation - IPC steal
    stealGroup: Battery
  - type: BatteryDrinkerSource # Goobstation - Energycrit
    maxAmount: 360

- type: entity
  name: pile à pomme de terre
  description: Quelqu'un a planté deux clous et du fil dans une grosse pomme de terre. Ça fournit quand même un peu de charge, d'une façon ou d'une autre.
  id: PowerCellPotato
  parent: BasePowerCell
  components:
  - type: Sprite
    layers:
    - state: potato
  - type: Battery
    maxCharge: 70
    startingCharge: 70
  - type: Tag
    tags:
      - PotatoBattery
      - DroneUsable # Goobstation
  - type: Construction
    graph: PowerCellPotato
    node: potatobattery
  - type: PowerSupplier # goob start - potato power!
    supplyRate: 30
    supplyRampRate: 500
    supplyRampTolerance: 500
    voltage: Apc
    enabled: true
  - type: NodeContainer
    examinable: true
    nodes:
      output:
        !type:CableDeviceNode
        nodeGroupID: Apc
  - type: PowerMonitoringDevice
    group: Generator
    loadNode: output
    sprite: Structures/Power/power.rsi
    state: generator
  - type: Anchorable # goob end
  - type: HitscanBatteryAmmoProvider # goob edit - svalinn buff fix
    proto: MediumOverchargedLaser # hot potato
    fireCost: 70

- type: entity
  name: cellule d'énergie à faible capacité
  description: Une cellule d'énergie rechargeable. C'est le modèle le moins cher que l'on puisse trouver.
  id: PowerCellSmall
  suffix: Full
  parent: BasePowerCell
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: small
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 360
    startingCharge: 360
  - type: Tag
    tags:
      - PowerCellSmall
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Plastic: 12
      Steel: 12
    chemicalComposition:
      Zinc: 5
  - type: HitscanBatteryAmmoProvider # goob edit - svalinn buff fix
    proto: RedLightLaser
    fireCost: 45 # 8 shots

- type: entity
  id: PowerCellSmallPrinted
  suffix: Empty
  parent: PowerCellSmall
  components:
  - type: Sprite
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: small
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
        visible: false
  - type: Battery
    maxCharge: 360
    startingCharge: 0

- type: entity
  parent: PowerCellSmall
  id: PowerCellSmallNuclear
  name: cellule d'énergie nucléaire à faible capacité
  description: Une cellule d'énergie à recharge autonome, conçue pour une vitesse de recharge rapide au détriment de la capacité.
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 36 # 10 seconds to recharge
    autoRechargePause: true
    autoRechargePauseTime: 30

- type: entity
  name: cellule d'énergie à capacité moyenne
  description: Une cellule d'énergie rechargeable. C'est la version populaire et fiable.
  id: PowerCellMedium
  suffix: Full
  parent: BasePowerCell
