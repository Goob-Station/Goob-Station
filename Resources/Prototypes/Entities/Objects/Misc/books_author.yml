  description: Le livre est un petit livre de poche en bon état, avec une illustration d'Ian le corgi et de la colonie de pingouins en couverture. Le titre, « Ian et Robert's Antarctic Adventure », est écrit en lettres blanches et grasses sur fond bleu. La quatrième de couverture présente un bref résumé de l'histoire, mettant en avant les thèmes de l'humilité, de la résilience et de la beauté de la nature.
