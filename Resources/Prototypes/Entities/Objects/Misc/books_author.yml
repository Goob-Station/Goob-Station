- type: entity
  parent: BookBase
  id: BookNarsieLegend
  name: la légende de Nar'Sie
  description: Le livre est un vieux tome relié de cuir, orné de gravures complexes sur la couverture. Les pages sont jaunies et fragiles avec l'âge, l'encre du texte ayant pâli par endroits. Il semble avoir été beaucoup lu et chéri, avec des pages cornées et des annotations griffonnées dans les marges. Malgré son apparence usée, le livre dégage toujours une impression de puissance mystique et d'émerveillement, laissant entrevoir les secrets et les connaissances contenus dans ses pages.
  components:
    - type: Sprite
      sprite: Objects/Misc/books.rsi
      layers:
      - state: paper
      - state: cover_old
        color: "#a6161d"
      - state: decor_bottom
        color: "#6e1022"
      - state: decor_wingette
        color: "#4a101b"
      - state: icon_pentagramm
        color: "#911129"
      - state: detail_bookmark
        color: red 
    - type: Paper
      content: book-text-narsielegend

- type: entity
  parent: BookBase
  id: BookTruth
  name: explorer différentes perspectives philosophiques sur la vérité et la complexité du mensonge
  description: Un livre explorant les différentes perspectives philosophiques sur la vérité et le mensonge, à la couverture usée, avec des plis et des marques témoignant d'une utilisation fréquente et d'une réflexion approfondie. Le dos montre des signes d'usure d'avoir été retiré de l'étagère maintes et maintes fois. Les pages elles-mêmes sont remplies de soulignements, de notes dans les marges et de passages surlignés au fil des lecteurs qui se confrontent aux nuances et aux complexités du sujet.
  components:
    - type: Sprite
      sprite: Objects/Misc/books.rsi
      layers:
      - state: paper
      - state: cover_strong
        color: "#c9752a"
      - state: decor_diagonal
        color: "#cf792d"
      - state: decor_wingette_circle
        color: gold
      - state: icon_question
      - state: detail_bookmark
        color: "#cf792d"
    - type: Paper
      content: book-text-truth

- type: entity
  parent: BookBase
  id: BookWorld
  name: façonner l'état du monde - jeu de forces et de choix
  description: Le livre est un bel ouvrage relié, bien conservé, avec un design simple et élégant sur la couverture représentant un monde en mouvement. Les pages sont nettes et propres, sans trace d'usure, suggérant qu'il a été bien entretenu et précieux pour son précédent propriétaire. Le texte est imprimé dans une police claire et lisible, et les chapitres sont organisés de manière logique et facile à suivre, le rendant accessible aux lecteurs de tous niveaux.
  components:
    - type: Sprite
      sprite: Objects/Misc/books.rsi
      layers:
      - state: paper
      - state: cover_base
        color: "#215e9e"
      - state: icon_planet
      - state: icon_text
      - state: detail_bookmark
        color: "#2dab24"
    - type: Paper
      content: book-text-world

