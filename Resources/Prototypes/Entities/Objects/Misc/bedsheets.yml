- type: entity
  parent: BaseItem
  id: BedsheetBase
  name: drap de lit
  abstract: true
  description: Un drap de lit en lin étonnamment doux.
  placement:
    mode: SnapgridCenter
    snap:
    - Bed
  components:
  - type: Sprite
    sprite: Objects/Misc/bedsheets.rsi
    noRot: true
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: true
    slots:
    - neck
  - type: Butcherable #Goob start
    butcherDelay: 1.0
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 3
  - type: PhysicalComposition
    materialComposition:
      Cloth: 150 #Goob end
  - type: StaticPrice
    price: 100
  - type: Tag
    tags:
    - Recyclable #Goobstation
    - Bedsheet

