- type: entity
  id: MagazinePistolSubMachineGunTopMounted
  name: chargeur de WT550 (.35 auto montage supérieur)
  parent: [ BaseItem, BaseSecurityContraband ]
  description: Chargeur d'alimentation par le dessus non conventionnel de 30 cartouches pour le PM WT550. Destiné aux munitions cinétiques polyvalentes.
  components:
  - type: Tag
    tags:
      - MagazinePistolSubMachineGunTopMounted
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: CartridgePistol
    whitelist:
      tags:
      - CartridgePistol
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Pistol/smg_mag_top_mounted.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-unshaded-1
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container

- type: entity
  id: MagazinePistolSubMachineGunTopMountedEmpty
  name: chargeur de WT550 (.35 auto montage supérieur universel)
  parent: MagazinePistolSubMachineGunTopMounted
  description: Chargeur d'alimentation par le dessus non conventionnel de 30 cartouches pour le PM WT550.
  components:
  - type: BallisticAmmoProvider
    proto: null

- type: entity
  id: MagazinePistol
  name: chargeur de pistolet (.35 auto)
  parent: BaseMagazinePistol
  description: Chargeur simple rangée de 12 cartouches pour pistolets. Destiné aux munitions cinétiques polyvalentes. #goobstation
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistol
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

