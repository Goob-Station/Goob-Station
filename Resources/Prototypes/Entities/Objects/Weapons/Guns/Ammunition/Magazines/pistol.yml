- type: entity
  id: MagazinePistolIncendiary
  name: chargeur de pistolet (.35 auto incendiaire)
  parent: MagazinePistol
  description: Chargeur simple rangée de 12 cartouches pour pistolets. Destiné aux munitions incendiaires à auto-allumage. #goobstation
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolIncendiary
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#ff6e52"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#ff6e52"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#ff6e52"

