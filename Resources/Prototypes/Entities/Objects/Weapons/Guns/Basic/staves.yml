- type: entity
  name: bâton de guérison
  parent: WeaponStaffBase
  id: WeaponStaffHealing
  description: Un artefact qui projette des éclairs de magie régénératrice capables de guérir toutes sortes d'affections et même de ressusciter les morts. Ses effets sont inversés sur les morts-vivants. # Goobstation
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/healing.rsi # Goobstation
    layers:
    - state: healing
  - type: Item
    heldPrefix: healing
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileHealingBolt
    capacity: 6 # Goob edit
    count: 6 # Goob edit
  - type: RechargeBasicEntityAmmo # Goobstation
    rechargeCooldown: 8
  - type: PacifismAllowedGun

- type: entity
  name: bâton de création de portes
  parent: WeaponStaffBase
  id: WeaponStaffPolymorphDoor
  description: Un artefact qui projette des éclairs de magie transformatrice capables de créer des portes dans les murs. # Goob station
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/door.rsi # Goobstation
    layers:
    - state: door
  - type: Item
    heldPrefix: door
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_door.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltDoor
    capacity: 10
    count: 10
  - type: RechargeBasicEntityAmmo # Goobstation
    rechargeCooldown: 2