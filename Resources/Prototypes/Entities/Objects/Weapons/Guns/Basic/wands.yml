- type: entity
  parent: WeaponWandBase
  id: WeaponWandPolymorphBase
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: poly
    - state: poly-effect
      map: ["effect"]
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_animation.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCarp
    capacity: 5

- type: entity
  name: baguette de métamorphose en carpe
  parent: WeaponWandPolymorphBase
  id: WeaponWandPolymorphCarp
  description: Pour quand vous avez besoin d'un filet de carpe rapidement et que le clown a l'air bien juteux.
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCarp
    capacity: 5
    count: 5

- type: entity
  name: baguette de métamorphose en singe
  parent: WeaponWandPolymorphBase
  id: WeaponWandPolymorphMonkey
  description: Pour quand vous avez besoin d'un ami singe.
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltMonkey
    capacity: 5
    count: 5

- type: entity
  name: baguette de boule de feu
  parent: WeaponWandBase
  id: WeaponWandFireball
  description: Énormes boules de feu !
  components:
  - type: Sprite
    layers:
    - state: fire
    - state: fire-effect
      map: ["effect"]
  - type: Gun
    fireRate: 0.25
    soundGunshot:
      path: /Audio/Magic/fireball.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileFireball
    capacity: 5
    count: 5

- type: entity
  name: bâton du casier # Goob edit
  description: Un artefact qui expelle des décharges encapsulantes, qui neutralisent vos ennemis. # Goob edit
  parent: WeaponStaffBase # Goob edit
  id: WeaponWandLocker
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/locker.rsi # Goobstation
    layers:
    - state: locker
      map: ["base"]
    - state: locker-effect
      map: ["effect"]
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_animation.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileLocker
    capacity: 6 # Goob edit
    count: 6 # Goob edit
  - type: Item
    inhandVisuals:
      left:
      - state: locker-inhand-left
      right:
      - state: locker-inhand-right
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        effect:
          True: { visible: False }
          False: { visible: True }
        base:
          True: { visible: True }
          False: { visible: False }
  - type: RechargeBasicEntityAmmo # Goobstation
    rechargeCooldown: 4

- type: entity
  name: baguette magique de mort instantanée
  parent: WeaponWandBase
  id: WeaponWandDeath
  description: Seuls les meilleurs éléments de l'équipe de R&D des Magiciens de l'Espace ont uni leurs forces pour créer cette petite merveille.
  components:
  - type: Sprite
    layers:
    - state: death
    - state: death-effect
      map: ["effect"]
  - type: Gun
    soundGunshot:
      path: /Audio/_Goobstation/Wizard/wandodeath.ogg # Goob edit
  - type: BasicEntityAmmoProvider
    proto: ProjectileDeathBolt # Goob edit
    capacity: 3
    count: 3

- type: entity
  name: baguette d'entrée
  parent: WeaponWandBase
  id: WeaponWandPolymorphDoor
  description: Pour quand vous avez besoin d'une sortie.
  components:
  - type: Sprite
    layers:
    - state: door
    - state: door-effect
      map: ["effect"]
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_door.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltDoor
    capacity: 10
    count: 10

- type: entity
  name: baguette de cluwnage
  parent: WeaponWandPolymorphBase
  id: WeaponWandCluwne
  description: Aggravez leur situation en les transformant en cluwne.
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCluwne
    capacity: 3
    count: 3

- type: entity
  parent: WeaponWandPolymorphBase
  id: WeaponWandPolymorphBread
  name: baguette de pain magique
  description: Changez tous vos amis en pain ! Votre patron ! Vos ennemis ! Votre chien ! Changez tout en pain !
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltBread
    capacity: 10
    count: 10