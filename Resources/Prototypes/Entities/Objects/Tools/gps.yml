- type: entity
  name: système de positionnement mondial
  parent: BaseItem
  id: HandheldGPSBasic
  description: Aide les spationautes perdus à se repérer dans les planètes depuis 2016.
  components:
  - type: Sprite
    sprite: Objects/Devices/gps.rsi
    layers:
    - state: icon
    - state: active
  - type: Item
    sprite: Objects/Devices/gps.rsi
  - type: GPS # Goob Station - what if gps didnt suck doo doo balls
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 200
      Glass: 75
  - type: Tag
    tags:
    - GPS
  - type: ActivatableUI
    key: enum.GpsUiKey.Key # Goob Station - what if gps didnt suck doo doo balls
    inHandsOnly: true
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.GpsUiKey.Key: # Goob Station - what if gps didnt suck doo doo balls
        type: GpsBoundUserInterface

- type: entity #why does this exist? Well, "global positioning system" is too long to fit in the cyborg's hand slot.
  name: GPS intégré
  parent: HandheldGPSBasic
  id: BorgHandheldGPSBasic
  description: Un système de positionnement mondial miniaturisé pour une utilisation dans les unités cyborg.
