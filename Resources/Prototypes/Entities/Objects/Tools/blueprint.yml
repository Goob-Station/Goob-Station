- type: entity
  parent: BaseItem
  id: BaseBlueprint
  name: plan
  description: Un plan pour une machine. Il peut être inséré dans un autolathe.
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Tools/blueprint.rsi
    state: icon
  - type: Item
    size: Normal
    shape:
    - 0,0,2,0
    storedSprite:
      sprite: Objects/Tools/blueprint.rsi
      state: storage
  - type: Blueprint
  - type: StaticPrice
    price: 1000
  - type: Tag
    tags:
    - BlueprintAutolathe

- type: entity
  parent: BaseBlueprint
  id: BlueprintFulton
  name: plan de fulton
  description: Un plan avec le schéma d'un fulton. Il peut être inséré dans un autolathe.
  components:
  - type: Blueprint
    providedRecipes:
    - Fulton
    - FultonBeacon

- type: entity
  parent: BaseBlueprint
  id: BlueprintSeismicCharge
  name: plan de charge sismique
  description: Un plan avec le schéma d'une charge sismique. Il peut être inséré dans un autolathe.
  components:
  - type: Blueprint
    providedRecipes:
    - SeismicCharge

- type: entity
  parent: BaseBlueprint
  id: BlueprintDoubleEmergencyTank
  name: plan de réservoir d'urgence double
  description: Un plan avec le schéma d'un réservoir d'urgence double. Il peut être inséré dans un autolathe.
  components:
  - type: Blueprint
    providedRecipes:
    - DoubleEmergencyOxygenTank
    - DoubleEmergencyNitrogenTank
    - DoubleEmergencyWaterVaporTank
