- type: entity
  parent: MarkerBase
  id: PlaqueAtmos
  name: générateur de plaque atmos
  suffix: Spawner
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: Structures/Wallmounts/signs.rsi
      state: atmosplaque
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: PlaqueAtmosZUM
        weight: 1
      - id: PlaqueAtmosFEA
        weight: 9
      - id: PlaqueAtmosZAS
        weight: 45
      - id: PlaqueAtmosLINDA
        weight: 45
    offset: 0.0

# individual plaques aren't placeable. you will not defy the randomness.

- type: entity
  parent: BaseSign
  id: PlaqueAtmosFEA
  name: plaque de la division Atmosphérique FEA
  description: Cette plaque commémore la chute de la division Atmos FEA. Pour tous les hommes carbonisés, sonnés et brisés qui y ont péri.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: atmosplaque

- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosLINDA
  name: plaque de la division Atmosphérique LINDA
  description: Cette plaque commémore la chute de la division Atmos LINDA. Pour tous les hommes carbonisés, sonnés et brisés qui y ont péri.
  categories: [ HideSpawnMenu ]

- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosZAS
  name: plaque de la division Atmosphérique ZAS
  description: Cette plaque commémore la chute de la division Atmos ZAS. Pour tous les hommes carbonisés, sonnés et brisés qui y ont péri.
  categories: [ HideSpawnMenu ]

# If you get the ZUM plaque it means your round will be blessed with good engineering luck.
- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosZUM
  name: plaque de la division Atmosphérique ZUM
  description: Cette plaque commémore l'essor de la division Atmos ZUM. Puissent-ils porter le flambeau laissé par les divisions Atmos ZAS, LINDA et FEA.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: zumosplaque
