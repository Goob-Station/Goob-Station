- type: entity
  id: StatueVenusRed
  parent: BaseStructure
  name: statue d'une demoiselle pure
  suffix: Rouge
  description: Une ancienne statue de marbre. Le sujet est représenté avec une tresse jusqu'au sol et tient une boîte à outils rouge.
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Decoration/statues.rsi
    state: venus_red
    drawdepth: Mobs
    offset: "0.0,0.5"

