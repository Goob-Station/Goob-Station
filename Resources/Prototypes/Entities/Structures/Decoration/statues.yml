- type: entity
  id: StatueBananiumClown
  parent: BaseStructure
  name: statue du sauveur en bananium
  description: Une statue en bananium. Elle représente le retour du sauveur qui se lèvera et mènera les clowns vers le grand honk.
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Decoration/statues.rsi
    state: bananium_clown
    drawdepth: Mobs
    offset: "0.0,0.5"
  - type: Construction
    graph: BananiumStatueClown
    node: bananiumStatue