- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobHydrakin
  name: Urist McHydra
  abstract: true
  components:
  - type: UserInterface # Mono
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.SurgeryUIKey.Key: # Shitmed
        type: SurgeryBui
  - type: Hunger
  - type: Icon
    sprite: _Obelisk/Mobs/Species/Hydrakin/parts.rsi
    state: full
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Hydrakin
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 5
  - type: Bloodstream
    bloodReagent: AmmoniaBlood
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Body
    prototype: Hydrakin
    requiredLegs: 2
  - type: Temperature
    coldDamageThreshold: 10 # Mono - Absurd cold resistance
    heatDamageThreshold: 330 # no. just no. suffer.
    coldDamage:
      types:
        Cold : 0.01 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      90: 0.9
      40: 0.75
      10: 0.6
  - type: HumanoidAppearance
    species: Hydrakin
  - type: ThermalRegulator #Todo, implement hydrakin thermal movement generation
  - type: PressureProtection
    lowPressureMultiplier: 1.2
  - type: Inventory
    speciesId: hydrakin
    templateId: hydrakin
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Obelisk/Mobs/Species/Hydrakin/displacement.rsi
            state: jumpsuit
      gloves:
        sizeMaps:
          32:
            sprite: _Obelisk/Mobs/Species/Hydrakin/displacement.rsi
            state: gloves
      shoes:
        sizeMaps:
          32:
            sprite: _Obelisk/Mobs/Species/Hydrakin/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: _Obelisk/Mobs/Species/Hydrakin/displacement.rsi
            state: head
  - type: Carriable # Frontier: Carrying system from nyanotrasen.
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
  - type: Vocal
    sounds:
      Male: UnisexHydrakin
      Female: UnisexHydrakin
      Unsexed: UnisexHydrakin
  - type: TypingIndicator
    proto: robot
  - type: Hydrakin
    buildup: 2
    maxTemperature: 350

- type: entity
  parent: BaseSpeciesDummy
  id: MobHydrakinDummy
  categories: [ HideSpawnMenu ]
  components:
  # - type: HumanoidAppearance
  #   species: Hydrakin
  - type: Inventory
    speciesId: hydrakin
