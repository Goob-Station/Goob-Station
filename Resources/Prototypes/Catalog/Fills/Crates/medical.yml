- type: entity
  id: CrateMedicalSupplies
  parent: CrateMedical
  name: caisse de fournitures médicales
  description: Fournitures médicales de base.
  components:
  - type: StorageFill
    contents:
      - id: MedkitFilled
        amount: 2
      - id: Gauze
        amount: 2
      - id: Bloodpack
        amount: 2
      - id: BoxLatexGloves
      - id: BoxSterileMask
      - id: BoxMouthSwab

- type: entity
  id: CrateChemistrySupplies
  parent: CrateMedical
  name: caisse de fournitures de chimie
  description: Fournitures de chimie de base.
  components:
  - type: StorageFill
    contents:
      - id: BoxSyringe
      - id: BoxBeaker
      - id: BoxPillCanister
      - id: Dropper
        amount: 2
      - id: BoxBottle
        amount: 2

- type: entity
  id: CrateChemistryVials
  parent: CrateMedical
  name: caisse de flacons
  description: Caisse remplie d'une boîte de flacons.
  components:
  - type: StorageFill
    contents:
      - id: BoxVial

- type: entity
  id: CrateMindShieldImplants
  parent: CrateMedical
  name: caisse d'implants MindShield
  description: Caisse remplie de 3 implants MindShield.
  components:
  - type: StorageFill
    contents:
      - id: MindShieldImplanter
        amount: 3

- type: entity
  id: CrateMedicalSurgery
  parent: CrateSurgery
  name: caisse de fournitures chirurgicales
  description: Instruments chirurgicaux.
  components:
  - type: StorageFill
    contents:
      - id: Scalpel
      - id: Retractor
      - id: Cautery
      - id: Drill
      - id: SawElectric # Shitmed Change
      - id: Hemostat
      - id: ClothingMaskSterile
      # Shitmed Change
      - id: BoneGel
      - id: MedicalStitches
      - id: BoxLatexGloves
      - id: BoxSterileMask
      - id: NitrousOxideTankFilled # Goobstation
      - id: ClothingMaskBreath # Goobstation

- type: entity
  id: CrateMedicalScrubs
  parent: CrateMedical
  name: caisse de tenues médicales
  description: Vêtements médicaux.
  components:
  - type: StorageFill
    contents:
      - id: UniformScrubsColorGreen
      - id: UniformScrubsColorPurple
      - id: UniformScrubsColorBlue
      - id: ClothingHeadHatSurgcapBlue
      - id: ClothingHeadHatSurgcapPurple
      - id: ClothingHeadHatSurgcapGreen
      - id: ClothingMaskSterile
        amount: 3

