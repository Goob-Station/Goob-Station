- type: entity
  id: CrateEngineeringSolar
  parent: CrateEngineering
  name: caisse d'assemblages solaires
  description: Un kit avec des panneaux solaires en kit et du verre pour construire dix panneaux solaires.
  components:
  - type: StorageFill
    contents:
      - id: SolarAssemblyFlatpack
        amount: 10
      - id: SheetGlass10
        amount: 2

- type: entity
  id: CrateEngineeringShuttle
  parent: CrateEngineeringSecure
  name: caisse d'alimentation de navette
  description: Une caisse contenant tout le nécessaire pour alimenter une navette en énergie.
  components:
  - type: StorageFill
    contents:
      - id: WallmountSubstationElectronics
      - id: WallmountGeneratorAPUElectronics
      - id: HandheldGPSBasic
      - id: InflatableDoorStack1

- type: entity
  id: CrateEngineeringTeslaGenerator
  parent: CrateEngineeringSecure
  name: caisse de générateur Tesla
  description: Un générateur Tesla. Que Dieu vous vienne en aide.
  components:
  - type: StorageFill
    contents:
      - id: TeslaGeneratorFlatpack

- type: entity
  id: CrateEngineeringTeslaCoil
  parent: CrateEngineeringSecure
  name: caisse de bobines Tesla
  description: Bobine Tesla. Attire la foudre et en génère de l'énergie.
  components:
  - type: StorageFill
    contents:
      - id: TeslaCoilFlatpack

- type: entity
  id: CrateEngineeringTeslaGroundingRod
  parent: CrateEngineeringSecure
  name: caisse de tiges de mise à la terre Tesla
  description: Tige de mise à la terre, idéale pour la protection contre la foudre.
  components:
  - type: StorageFill
    contents:
      - id: TeslaGroundingRodFlatpack