# AME

- type: entity
  id: CrateEngineeringAMEShielding
  parent: CrateEngineeringSecure
  name: caisse de réacteur antimatière emballé
  description: 9 pièces pour le corps principal d'un réacteur antimatière, ou pour en agrandir un existant.
  components:
  - type: StorageFill
    contents:
      - id: AmePartFlatpack
        amount: 9

- type: entity
  id: CrateEngineeringAMEJar
  parent: CrateEngineeringSecure
  name: caisse de jarres de confinement antimatière
  description: 3 jarres d'antimatière pour alimenter un réacteur antimatière.
  components:
  - type: StorageFill
    contents:
      - id: AmeJar
        amount: 3

- type: entity
  id: CrateEngineeringAMEControl
  parent: CrateEngineeringSecure
  name: caisse d'unités de contrôle antimatière
  description: L'unité de contrôle d'un réacteur antimatière.
  components:
  - type: StorageFill
    contents:
      - id: AmeControllerUnanchored

# Singularity

- type: entity
  id: CrateEngineeringSingularityEmitter
  parent: CrateEngineeringSecure
  name: caisse d'émetteurs
  description: Un émetteur, idéal pour les moteurs à singularité.
  components:
  - type: StorageFill
    contents:
      - id: EmitterFlatpack

- type: entity
  id: CrateEngineeringSingularityCollector
  parent: CrateEngineeringSecure
  name: caisse de collecteurs de radiation
  description: Un collecteur de radiation, idéal pour les moteurs à singularité. Le plasma est inclus.
  components:
  - type: StorageFill
    contents:
      - id: RadiationCollectorFlatpack
      - id: PlasmaTankFilled

- type: entity
  id: CrateEngineeringSingularityContainment
  parent: CrateEngineeringSecure
  name: caisse de générateurs de champ de confinement
  description: Un générateur de champ de confinement, qui maintient la singularité sous contrôle.
  components:
  - type: StorageFill
    contents:
      - id: ContainmentFieldGeneratorFlatpack

- type: entity
  id: CrateEngineeringSingularityGenerator
  parent: CrateEngineeringSecure
  name: caisse de générateurs de singularité
  description: Un générateur de singularité, la mère de la bête.
  components:
  - type: StorageFill
    contents:
      - id: SingularityGeneratorFlatpack

# Particle Accelerator

- type: entity
  id: CrateEngineeringParticleAccelerator
  parent: CrateEngineeringSecure
  name: caisse de cartes d'accélérateur de particules
  description: Complexe à configurer, mais très gratifiant. Contient les cartes pour tous les composants de l'accélérateur de particules.
  components:
  - type: StorageFill
    contents:
      - id: MachineParticleAcceleratorEndCapCircuitboard
      - id: MachineParticleAcceleratorEmitterStarboardCircuitboard
      - id: MachineParticleAcceleratorEmitterForeCircuitboard
      - id: MachineParticleAcceleratorEmitterPortCircuitboard
      - id: MachineParticleAcceleratorFuelChamberCircuitboard
      - id: MachineParticleAcceleratorPowerBoxCircuitboard
      - id: ParticleAcceleratorComputerCircuitboard

