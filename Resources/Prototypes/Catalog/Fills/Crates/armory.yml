- type: entity
  id: CrateArmorySMG
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse de pistolets-mitrailleurs
  description: Contient deux pistolets-mitrailleurs avec quatre chargeurs. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
      - id: WeaponSubMachineGunWt550
        amount: 2
      - id: MagazinePistolSubMachineGunTopMounted
        amount: 4

- type: entity
  id: CrateArmoryShotgun
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse de fusils à pompe
  description: Pour quand l'ennemi doit absolument être criblé de plomb. Contient deux fusils de combat Enforcer et des cartouches standard. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
      - id: WeaponShotgunEnforcer
        amount: 2
      - id: BoxLethalshot
        amount: 4

- type: entity
  id: CrateTrackingImplants
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: implants de localisation
  description: Contient quelques injecteurs d'implants de localisation. Idéal pour les prisonniers que vous souhaitez relâcher tout en continuant à surveiller.
  components:
  - type: StorageFill
    contents:
      - id: TrackingImplanter
        amount: 5

- type: entity
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  id: CrateTrainingBombs
  name: bombes d'entraînement
  description: Contient trois bombes d'entraînement à faible rendement pour apprendre le déminage et l'élimination sécurisée des explosifs, combinaison EOD non incluse. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
    - id: TrainingBomb
      amount: 3

- type: entity
  id: CrateArmoryLaser
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse de lasers
  description: Contient trois fusils laser réglementaires. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
      - id: WeaponLaserCarbine
        amount: 3

- type: entity
  id: CrateArmoryPistols
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse de pistolets
  description: Contient deux pistolets NT standard avec quatre chargeurs. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
    - id: WeaponPistolMk58
      amount: 2
    - id: MagazinePistol
      amount: 4

- type: entity
  id: CrateSecurityRiot
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse SWAT
  description: Contient deux ensembles d'armures antiémeutes, casques, boucliers et enforcers chargés de balles en caoutchouc. Des munitions supplémentaires sont incluses. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
    - id: ClothingOuterArmorRiot
      amount: 2
    - id: ClothingHeadHelmetRiot
      amount: 2
    - id: WeaponShotgunEnforcerRubber
      amount: 2
    - id: BoxBeanbag
      amount: 2
    - id: RiotShield
      amount: 2

- type: entity
  id: CrateArmoryRifle
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  name: caisse de fusils
  description: Contient deux fusils d'assaut de haute puissance avec quatre chargeurs. Nécessite l'accès à l'armurerie pour l'ouvrir.
  components:
  - type: StorageFill
    contents:
    - id: WeaponRifleLecter
      amount: 2
    - id: MagazineRifle
      amount: 4
