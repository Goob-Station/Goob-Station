- type: entity
  id: CrateEmergencyExplosive
  parent: CrateSecgear
  name: caisse de combinaison de démineur
  description: La science est devenue folle ? Un bip derrière le sas ? Achetez maintenant et devenez le héros que la station mé... je veux dire dont elle a besoin ! (le temps n'est pas inclus)
  components:
  - type: StorageFill
    contents:
      - id: ClothingHeadHelmetBombSuit
      - id: ClothingMaskGas
      - id: Screwdriver
      - id: Wirecutter
      - id: Multitool
      - id: ClothingOuterSuitBomb

- type: entity
  id: CrateEmergencyFire
  parent: CrateGenericSteel
  name: caisse de lutte contre l'incendie
  description: Vous seul pouvez prévenir les incendies de la station. Équipez-vous de deux combinaisons de pompier, masques à gaz, lampes de poche, grands réservoirs d'oxygène, extincteurs et casques de chantier !
  components:
  - type: StorageFill
    contents:
      - id: FlashlightLantern
        amount: 2
      - id: FireExtinguisher
        amount: 2
      - id: ClothingHeadHatHardhatRed
        amount: 2
      - id: ClothingMaskGas
        amount: 2
      - id: ClothingOuterSuitFire
        amount: 2
      - id: OxygenTankFilled
        amount: 2

- type: entity
  id: CrateEmergencyInternals
  parent: CrateInternals
  name: caisse de respirateurs
  description: Maîtrisez votre énergie vitale et contrôlez votre respiration avec 3 masques respiratoires, des combinaisons d'urgence et de grands réservoirs d'air.
  components:
  - type: StorageFill
    contents:
      - id: ClothingMaskGas
        amount: 3
      - id: ClothingMaskBreath
        amount: 3
      - id: OxygenTankFilled
        amount: 3
      - id: NitrogenTankFilled
        amount: 3
      - id: ClothingOuterSuitEmergency
        amount: 3

- type: entity
  id: CrateEmergencyInternalsLarge
  parent: CrateInternals
  name: caisse de respirateurs (grande)
  description: Maîtrisez votre énergie vitale et contrôlez votre respiration avec 6 masques respiratoires, des combinaisons d'urgence et de grands réservoirs d'air.
  components:
    - type: StorageFill
      contents:
        - id: ClothingMaskGas
          amount: 6
        - id: ClothingMaskBreath
          amount: 6
        - id: OxygenTankFilled
          amount: 6
        - id: NitrogenTankFilled
          amount: 6
        - id: ClothingOuterSuitEmergency
          amount: 6

- type: entity
  id: CrateNitrogenInternals
  parent: CrateInternals
  name: caisse de respirateurs (azote)
  description: Contient quatre masques respiratoires et quatre grands réservoirs d'azote. Destiné aux Slimepersonnes et aux Vox.
  components:
  - type: StorageFill
    contents:
      - id: ClothingMaskGas
        amount: 2
      - id: ClothingMaskBreath
        amount: 2
      - id: NitrogenTankFilled
        amount: 4

- type: entity
  id: CrateEmergencyRadiation
  parent: CrateRadiation
  name: caisse de protection contre les radiations
  description: Survivez à l'Apocalypse Nucléaire et au Moteur Supermatière avec deux ensembles de combinaisons anti-radiation. Chaque ensemble contient un casque, une combinaison et un compteur Geiger. On vous ajoute même une bouteille de vodka et des verres, vu l'espérance de vie des gens qui commandent ça.
  components:
  - type: StorageFill
    contents:
      - id: ClothingOuterSuitRad
        amount: 2
      - id: GeigerCounter
        amount: 2
      - id: DrinkVodkaBottleFull
      - id: DrinkShotGlass
        amount: 2

- type: entity
  id: CrateEmergencyInflatablewall
  parent: CratePlastic
  name: caisse de murs gonflables
  description: Trois piles de murs gonflables pour quand les murs métalliques de la station refusent de retenir l'atmosphère.
  components:
  - type: StorageFill
    contents:
      - id: BoxInflatable

- type: entity
  id: CrateGenericBiosuit
  parent: CratePlastic
  name: caisse de combinaisons biologiques d'urgence
  description: Contient 2 combinaisons biologiques pour qu'aucune maladie ne vous détourne de ce que vous faites là.
  components:
  - type: StorageFill
    contents:
      - id: ClothingOuterBioGeneral
        amount: 2
      - id: ClothingHeadHatHoodBioGeneral
        amount: 2
      - id: ClothingMaskGas
        amount: 2