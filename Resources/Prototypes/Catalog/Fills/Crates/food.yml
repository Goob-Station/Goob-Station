- type: entity
  id: CrateFoodPizza
  parent: CratePlastic
  name: livraison de pizza d'urgence
  description: Aidez à mettre fin à la faim sur la station en distribuant des pizzas aux départements sous-financés ! Comprend 4 pizzas.
  components:
  - type: StorageFill
    contents:
    - id: FoodBoxPizzaFilled
      amount: 3
    - id: FoodBoxPizzaCotton
    - id: LidSalami
      prob: 0.01

- type: entity
  id: CrateFoodPizzaLarge
  parent: CratePlastic
  name: livraison de pizza catastrophe
  description: Dans l'ultime cas où tout a échoué, trouvez du réconfort dans le fait que plus de pizza résout tout. Comprend 16 pizzas.
  components:
