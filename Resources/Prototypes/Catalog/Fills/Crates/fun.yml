- type: entity
  id: CratePlants
  parent: CrateGenericSteel
  name: caisse de plantes
  description: Un assortiment de plantes en pot pour égayer votre station !
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: AllPottedPlantsTable
        rolls: !type:ConstantNumberSelector
          value: 5

- type: entity
  id: CrateFunPlushie
  parent: CrateGenericSteel
  name: caisse de peluches
  description: Un tas de douces peluches. Lancez-les partout et demandez-vous ensuite comment vous allez expliquer cet achat à NT.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: AllPlushiesTable
        rolls: !type:ConstantNumberSelector
          value: 10

- type: entity
  id: CrateFunLizardPlushieBulk
  parent: CrateGenericSteel
  name: caisse de peluches lézard en gros
  description: Un tas de douces peluches lézard. Lancez-les partout et demandez-vous ensuite comment vous allez expliquer cet achat à NT.
  components:
