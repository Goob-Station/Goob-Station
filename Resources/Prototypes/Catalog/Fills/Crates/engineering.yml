- type: entity
  id: CrateEngineeringGear
  parent: CrateEngineering
  name: caisse d'équipements de génie
  description: Diverses pièces d'équipement de génie.
  components:
  - type: StorageFill
    contents:
      - id: ClothingBeltUtility
        amount: 2
      - id: ClothingEyesGlassesMeson
        amount: 2
      - id: ClothingHeadHatHardhatYellow
        amount: 2
      - id: ClothingHeadHatWelding
        amount: 2
      - id: ClothingOuterVestHazard
        amount: 3
      - id: ClothingHandsGlovesColorYellow
        amount: 2

- type: entity
  id: CrateEngineeringToolbox
  parent: CrateEngineering
  name: caisse de boîtes à outils
  description: Deux boîtes à outils mécaniques et deux électriques.
  components:
  - type: StorageFill
    contents:
      - id: ToolboxMechanicalFilled
        amount: 2
      - id: ToolboxElectricalFilled
        amount: 2

