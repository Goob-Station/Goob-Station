    - id: IngotSilver

- type: entity
  id: CrateMaterialCardboard
  parent: CrateGenericSteel
  name: caisse de carton
  description: 90 pièces de carton.
  components:
  - type: StorageFill
    contents:
      - id: MaterialCardboard
        amount: 3

- type: entity
  id: CrateMaterialPaper
  parent: CrateGenericSteel
