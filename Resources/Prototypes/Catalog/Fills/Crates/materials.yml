- type: entity
  id: CrateMaterialGlass
  parent: CrateGenericSteel
  name: caisse de plaques de verre
  description: 90 plaques de verre, emballées avec soin.
  components:
  - type: StorageFill
    contents:
      - id: SheetGlass
        amount: 3

- type: entity
  id: CrateMaterialSteel
  parent: CrateGenericSteel
  name: caisse de plaques d'acier
  description: 90 plaques d'acier.
  components:
  - type: StorageFill
    contents:
      - id: SheetSteel
        amount: 3

- type: entity
  id: CrateMaterialTextiles
  parent: CrateGenericSteel
  name: caisse de textiles
  description: 60 pièces de tissu et 30 pièces de durafibre.
  components:
  - type: StorageFill
    contents:
      - id: MaterialCloth
        amount: 2
      - id: MaterialDurathread

- type: entity
  id: CrateMaterialPlastic
