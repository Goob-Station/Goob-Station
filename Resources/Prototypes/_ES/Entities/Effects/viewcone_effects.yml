# Effects spawned when certain things happen
# that only appear to viewcone users when out of vision.

- type: entity
  id: ESBaseViewconeEffect
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: ESViewconeOccludable
    inverted: true
  - type: Sprite
    sprite: _ES/Effects/viewcone_effects.rsi
    drawdepth: Effects
    noRot: true
    color: '#FFFFFF00' # 0 alpha by default, will get overriden by setalpha overlay
    loop: false
  - type: Transform
    anchored: true
  - type: TimedDespawn
    lifetime: 3.0

- type: entity
  id: ESViewconeEffectFootstep
  parent: ESBaseViewconeEffect
  components:
  - type: Sprite
    state: footstep
  - type: TimedDespawn
    lifetime: 1.4

- type: entity
  id: ESViewconeEffectAttack
  parent: ESBaseViewconeEffect
  components:
  - type: Sprite
    state: attack
  - type: TimedDespawn
    lifetime: 1.4

- type: entity
  id: ESViewconeEffectForcefield
  parent: ESBaseViewconeEffect
  components:
  - type: Sprite
    state: forcefield
  - type: TimedDespawn
    lifetime: 0.6

- type: entity
  id: ESViewconeEffectGunfire
  parent: ESBaseViewconeEffect
  components:
  - type: Sprite
    state: gunfire
  - type: TimedDespawn
    lifetime: 1.2

- type: entity
  id: ESViewconeEffectTalk
  parent: ESBaseViewconeEffect
  components:
  - type: Sprite
    state: talk
  - type: TimedDespawn
    lifetime: 1.4
