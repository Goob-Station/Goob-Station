- type: entity
  id: BaseCyberneticOrgan
  parent: BaseHumanOrgan
  abstract: true
  components:
  - type: Cybernetics
  - type: Sprite
    sprite: _Shitmed/Mobs/Species/Misc/Cybernetics/organs.rsi
  - type: Tag
    tags:
    - Organ

# Eyes

- type: entity
  parent: BaseCyberneticOrgan
  id: BasicCyberneticEyes
  name: yeux cybernétiques
  description: Une paire d'yeux cybernétiques qui améliorent votre vision et vous protègent des dommages oculaires.
  components:
  - type: Cybernetics
  - type: Sprite
    sprite: _Shitmed/Mobs/Species/Misc/Cybernetics/organs.rsi
    state: eyes
  - type: Organ
    intCap: 21
    integrity: 21
    integrityThresholds:
      Normal: 21
      Damaged: 11
      Destroyed: 0
    slotId: eyes
    onAdd:
    - type: FlashImmunity
    - type: EyeProtection
  - type: Tag
    tags:
    - Eyes
  - type: Eyes

- type: entity
  parent: BasicCyberneticEyes
  id: SecurityCyberneticEyes
  name: yeux cybernétiques de sécurité
  description: Une paire d'yeux cybernétiques qui améliorent votre vision, dotée d'un SecHUD intégré.
  components:
  - type: Sprite
    state: eyes-sechud
  - type: Organ
    onAdd:
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons
    - type: FlashImmunity
    - type: EyeProtection

- type: entity
  parent: BasicCyberneticEyes
  id: MedicalCyberneticEyes
  name: yeux cybernétiques medhud
  description: Une paire d'yeux cybernétiques qui améliorent votre vision, dotée d'un MedHUD intégré.
  components:
  - type: Sprite
    state: eyes-medhud
  - type: Organ
    onAdd:
    - type: ShowHealthBars
      damageContainers:
      - Biological
    - type: ShowHealthIcons
      damageContainers:
      - Biological

- type: entity
  parent: BasicCyberneticEyes
  id: DiagnosticCyberneticEyes
  name: yeux cybernétiques de diagnostic
  description: Une paire d'yeux cybernétiques qui améliorent votre vision, dotée d'un HUD de diagnostic intégré.
  components:
  - type: Sprite
    state: eyes-diagnostic
  - type: Organ
    onAdd:
    - type: ShowHealthBars
      damageContainers:
      - Inorganic
      - Silicon
      - SiliconRadiation
    - type: ShowHealthIcons
      damageContainers:
      - Inorganic
      - Silicon
      - SiliconRadiation

# Heart

- type: entity
  parent: BaseCyberneticOrgan
  id: BasicCyberneticHeart
  name: cœur cybernétique
  description: Un cœur finement réglé qui ralentit l'absorption des médicaments tout en accélérant l'absorption des poisons et des narcotiques, résultant en des effets affaiblis.
  components:
  - type: Sprite
    state: heart-on
  - type: Heart
  - type: Organ
    intCap: 25
    integrity: 25
    integrityThresholds:
      Normal: 25
      Damaged: 9
      Destroyed: 0
    slotId: heart
    onAdd:
    - type: StaminaModifier
      modifier: 1.35
  - type: Metabolizer
    maxPoisonsProcessable: 2
    metabolizerTypes: [ Cybernetic ]
    groups:
    - id: Medicine
      rateModifier: 0.7
    - id: Poison
      rateModifier: 1.4
    - id: Narcotic
      rateModifier: 1.2
  - type: Tag
    tags:
    - Organ
    - Heart
  - type: Item
    size: Small
    heldPrefix: heart

- type: entity
  parent: BasicCyberneticHeart
  id: UpgradedCyberneticHeart
  name: cœur cybernétique amélioré
  description: Un cœur circulatoire de nouvelle génération qui diffuse lentement les médicaments dans le corps offrant une bien meilleure guérison tout en accélérant fortement et affaiblissant les toxines et les narcotiques.
  components:
  - type: Sprite
    state: heart-u-on
  - type: Organ
    intCap: 32
    integrity: 32
    integrityThresholds:
      Normal: 32
      Damaged: 9
      Destroyed: 0
    slotId: heart
    onAdd:
    - type: StaminaModifier
      modifier: 1.7
  - type: Metabolizer
    maxPoisonsProcessable: 2
    metabolizerTypes: [ Cybernetic ]
    groups:
    - id: Medicine
      rateModifier: 0.4
    - id: Poison
      rateModifier: 2.8
    - id: Narcotic
      rateModifier: 1.6

# Liver

- type: entity
  parent: BaseCyberneticOrgan
  id: BasicCyberneticLiver
  name: foie cybernétique
  description: Un foie synthétique haute efficacité qui neutralise tous les effets négatifs de l'alcool tout en préservant l'ivresse.
  components:
  - type: Liver
  - type: Organ
    intCap: 29
    integrity: 29
    integrityThresholds:
      Normal: 29
      Damaged: 12
      Destroyed: 0
    slotId: liver
  - type: Sprite
    state: liver
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Metabolizer
    maxPoisonsProcessable: 1
    metabolizerTypes: [ Cybernetic ]
    groups:
    - id: Alcohol
      rateModifier: 0.1
  - type: Tag
    tags:
    - Organ
    - Liver

# Lungs

- type: entity
  parent: BaseCyberneticOrgan
  id: BasicCyberneticLungs
  name: poumons cybernétiques
  description: Poumons synthétiques avancés qui respirent l'oxygène et l'azote, ignorent le CO2 et résistent à la plupart des autres risques atmosphériques.
  components:
  - type: Sprite
    layers:
      - state: lung-l
      - state: lung-r
  - type: Organ
    intCap: 25
    integrity: 25
    integrityThresholds:
      Normal: 25
      Damaged: 9
      Destroyed: 0
    slotId: lungs
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Cybernetic ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      Lung:
        maxVol: 100.0
        canReact: false
  - type: Tag
    tags:
    - Organ
    - Lungs

- type: entity
  parent: BasicCyberneticLungs
  id: UpgradedCyberneticLungs
  name: poumons cybernétiques améliorés
  description: Un système respiratoire autonome qui élimine complètement le besoin de respirer et accorde une récupération d'endurance accrue.
  components:
  - type: Sprite
    layers:
      - state: lung-u-l
      - state: lung-u-r
  - type: Organ
    intCap: 32
    integrity: 32
    integrityThresholds:
      Normal: 32
      Damaged: 9
      Destroyed: 0
    slotId: lungs
    onAdd:
    - type: StaminaRegeneration
      regenerationRate: -3.0
