- type: entity
  parent: LeftArmCybernetic
  id: JawsOfLifeLeftArm
  name: bras gauche J.W.L
  description: Un bras gauche cybernétique capable de forcer l'ouverture des portes.
  components:
  - type: BodyPart
    onAdd:
    - type: Prying
      speedModifier: 1.5
      pryPowered: true
    - type: UseDelay # For insta prying
      delay: 1

- type: entity
  parent: RightArmCybernetic
