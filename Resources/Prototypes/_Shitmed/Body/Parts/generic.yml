- type: entity
  parent: HeadHuman
  id: BioSynthHeadEmpty
  name: tête creuse bio-synthétique
  description: Cette tête synthétique peut être transplantée dans tout organisme vivant et s'adaptera à son receveur, mais ne contient pas de cerveau ni d'yeux.

- type: entity
  parent: LeftArmHuman
  id: BioSynthLeftArm
  name: bras gauche bio-synthétique
  description: Ce bras gauche peut être transplanté dans tout organisme vivant et s'adaptera à son receveur.
  components:
  - type: BodyPart
    children:
      left hand:
        id: "left hand"
        type: Hand

- type: entity
  parent: RightArmHuman
  id: BioSynthRightArm
  name: bras droit bio-synthétique
  description: Ce bras droit peut être transplanté dans tout organisme vivant et s'adaptera à son receveur.
  components:
  - type: BodyPart
    children:
      right hand:
        id: "right hand"
        type: Hand

- type: entity
