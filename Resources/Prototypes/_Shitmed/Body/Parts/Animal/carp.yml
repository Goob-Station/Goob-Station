- type: entity
  abstract: true
  parent: PartBase
  id: PartCarpBase
  components:
  - type: Sprite
    sprite: _Shitmed/Mobs/Aliens/Carps/carp_parts.rsi
  - type: Icon
    sprite: _Shitmed/Mobs/Aliens/Carps/carp_parts.rsi

- type: entity
  parent: PartCarpBase
  id: TailCarp
  name: queue de carpe
  description: Les glandes uniques de cette queue permettent aux carpes spatiales de voler dans le vide.
  components:
  - type: Sprite
    state: tail
  - type: Icon
    state: tail
  - type: BodyPart
    partType: Tail
  - type: MovementBodyPart
    walkSpeed: 2.5
    sprintSpeed: 3.5
  # TODO: Make it actually needed. Legs are hardcoded to be the only parts that matter for movement.
  # TODO: space flight stuff

- type: entity
  parent: [ PartCarpBase, BaseChest ]
  id: ChestCarp
  name: torse de carpe
  components:
  - type: Sprite
    state: chest
  - type: Icon
    state: chest

- type: entity
  parent: [ PartCarpBase, BaseGroin ]
  id: GroinCarp
  name: aine de carpe
  components:
  - type: Sprite
    state: groin
  - type: Icon
    state: groin
