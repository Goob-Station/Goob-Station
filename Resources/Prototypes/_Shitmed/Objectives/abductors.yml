- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseAbductorObjective
  components:
  - type: Objective
    difficulty: 1.5
    issuer: objective-issuer-abductors
  - type: RoleRequirement
    roles:
    - Abductor

- type: entity
  parent: BaseAbductorObjective
  id: AbductObjective
  components:
  - type: Objective
    icon:
      sprite: _Shitmed/Mobs/Species/Misc/Dubious/organs.rsi
      state: gland
  - type: NumberObjective
    min: 6
    max: 9
    title: objective-condition-abduct-title
    description: objective-condition-abduct-description
  - type: AbductCondition

- type: entity
  parent: BaseObjective
  id: BaseAbductorVictimObjective
  abstract: true
  components:
  - type: Objective
    difficulty: 1
    issuer: objective-issuer-voices
  - type: RoleplayObjective
  - type: RoleRequirement
    roles:
    - AbductorVictim

# Harmless Objectives

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimPaintObjective
  name: Repeignez la station.
  description: La station est hideuse. Vous devez tout colorier !
  components:
  - type: Objective
    icon:
      sprite: Objects/Fun/crayons.rsi
      state: rainbow

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimPristine
  name: Assurez-vous que la station est impeccable.
  description: Le PDG de Nanotrasen arrive ! Assurez-vous que la station est en parfait état.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Head/Hats/comcap.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimBlingFloor
  name: Remplacez le sol.
  description: Remplacez tous les carreaux de sol par du bois, de la moquette, de l'herbe ou du bling.
  components:
  - type: Objective
    icon:
      sprite: Objects/Tiles/tile.rsi
      state: carpet-blue

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimCorpseCollector
  name: Collectez des cadavres.
  description: Commencez une collection de cadavres. Ne tuez pas des gens pour obtenir ces cadavres.
  components:
  - type: Objective
    icon:
      sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
      state: bag

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimParaplegic
  name: Paraplégique.
  description: Convainquez l'équipage que vous êtes paraplégique.
  components:
  - type: Objective
    icon:
      sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
      state: bag

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimHungry
  name: Rassasiez votre faim.
  description: Vous avez faim. Mangez autant de nourriture que vous pouvez en trouver.
  components:
  - type: Objective
    icon:
      sprite: Objects/Consumable/Food/meat.rsi
      state: plain-cooked

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimBlazeIt
  name: Améliorez votre corps chimiquement.
  description: Votre corps doit être amélioré. Ingérez autant de drogues que vous pouvez.
  components:
  - type: Objective
    icon:
      sprite: Objects/Specific/Hydroponics/cannabis.rsi
      state: produce

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimSocialExperiment
  name: Tout est un mensonge.
  description: C'est une expérience sociale secrète menée par Nanotrasen. Convainquez l'équipage que c'est la vérité.
  components:
  - type: Objective
    icon:
      sprite: Structures/Wallmounts/camera.rsi
      state: cameracase

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimVirtualInsanity
  name: RIEN N'EST RÉEL.
  description: Tout ceci est une simulation entièrement virtuelle dans un bunker souterrain. Convainquez l'équipage de s'échapper des chaînes de la réalité virtuelle.
  components:
  - type: Objective
    icon:
      sprite: Structures/Machines/computers.rsi
      state: avionics-systems

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimGame
  name: Chat c'est réel ça ?
  description: Convainquez l'équipage que nous sommes dans un jeu, sans le leur dire explicitement.
  components:
  - type: Objective
    icon:
      sprite: Structures/Machines/arcade.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimSaveAnimals
  name: Sauvez les animaux.
  description: Nanotrasen maltraite les animaux ! Sauvez-en autant que vous pouvez !
  components:
  - type: Objective
    icon:
      sprite: Mobs/Animals/monkey.rsi
      state: full

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimMusic
  name: Partagez votre musique.
  description: Vous brûlez de passion pour la musique. Partagez votre vision. Si quelqu'un la déteste, frappez-le sur la tête avec votre instrument !
  components:
  - type: Objective
    icon:
      sprite: Objects/Fun/Instruments/guitar.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimStalker
  name: Espionnez l'équipage.
  description: Quelqu'un vous a engagé pour constituer des dossiers sur tous les membres importants de l'équipage. Assurez-vous qu'ils ne sachent pas que vous le faites.
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/folders.rsi
      state: folder-colormap

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimConspiracy
  name: La conspiration.
  description: Les dirigeants de cette station cachent une grande et malveillante conspiration. Vous seul pouvez découvrir ce que c'est et l'exposer au peuple !
  components:
  - type: Objective
    icon:
      sprite: Structures/Wallmounts/camera.rsi
      state: cameracase

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNarrator
  name: Narrez l'histoire.
  description: Vous êtes le narrateur de cette histoire. Suivez les protagonistes pour raconter leur histoire.
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/books.rsi
      state: book_icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimSixthsense
  name: Êtes-vous vraiment vivant ?
  description: Vous êtes mort là-bas et êtes allé au paradis... ou est-ce l'enfer ? Personne ici ne semble savoir qu'il est mort. Convainquez-les, et peut-être pourrez-vous échapper à ce purgatoire.
  components:
  - type: Objective
    icon:
      sprite: Structures/Storage/Crates/coffin.rsi
      state: base

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimParty
  name: FÊTE !
  description: Vous DEVEZ organiser une énorme fête. Rendez-la aussi géniale que possible pour que tout l'équipage vienne... SINON !
  components:
  - type: Objective
    icon:
      sprite: Objects/Consumable/Drinks/beer.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimDeadStationTheory
  name: Il n'existe qu'une seule autre personne.
  description: Il n'existe qu'une seule autre personne, elle est juste très douée pour prétendre être plusieurs personnes.
  components:
  - type: Objective
    icon:
      sprite: Mobs/Species/Human/parts.rsi
      state: full

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimWeaknessOfMyFlesh
  name: La chair pourrit.
  description: Votre chair pourrit sur votre corps. Combattez l'inévitable et remplacez vos membres souillés par de tout nouveaux.
  components:
  - type: Objective
    icon:
      sprite: _Shitmed/Objects/Specific/Medical/Surgery/scalpel.rsi
      state: scalpel

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimInstructor
  name: Instructeur militaire.
  description: Vous êtes un instructeur militaire. Vous devez vous assurer que l'équipage est en pleine forme pour la guerre contre le syndicat !
  components:
  - type: Objective
    icon:
      sprite: _Shitmed/Objects/Specific/Medical/Surgery/scalpel.rsi
      state: scalpel

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimActor
  name: Film d'action.
  description: Vous êtes dans un film d'action. Vous devez dire autant de répliques accrocheuses que possible.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Eyes/Glasses/sunglasses.rsi
      state: icon

# Annoying Objectives

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNations
  name: Faites prospérer votre département.
  description: Assurez-vous que votre département prospère avant tout.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Neck/Medals/gold.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimPowerUnlimited
  name: Puissance illimitée.
  description: Inondez le réseau électrique de la station avec autant d'électricité que possible.
  components:
  - type: Objective
    icon:
      sprite: Objects/Power/power_cells.rsi
      state: antique

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimBuild
  name: Agrandissez la station.
  description: La station est trop petite, et vous allez y remédier.
  components:
  - type: Objective
    icon:
      sprite: Objects/Tools/rcd.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimDefect
  name: Désertez la station.
  description: Merde au système ! Désertez la station et fondez une colonie indépendante dans l'espace, à l'avant-poste minier ou dans l'épave. Recrutez des membres d'équipage si vous pouvez.
  components:
  - type: Objective
    icon:
      sprite: Structures/Shuttles/gyroscope.rsi
      state: base

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimMonkeyTakeover
  name: Levez une armée de singes.
  description: OOK OOK AAH!!!
  components:
  - type: Objective
    icon:
      sprite: Mobs/Animals/monkey.rsi
      state: full

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimAverageFrontierPirate
  name: Volez des chaussures.
  description: Volez autant de chaussures que possible.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Shoes/color.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNoClown
  name: Le clown n'est pas drôle.
  description: Le clown n'est pas drôle. Vous pouvez faire mieux ! Prenez leur rôle et faites rire l'équipage !
  components:
  - type: Objective
    icon:
      sprite: Clothing/Mask/clown.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimReplacePets
  name: Remplacez les animaux.
  description: Tous les animaux ici sont nuls. Vous devez les rendre plus cool. Remplacez-les par des bêtes exotiques !
  components:
  - type: Objective
    icon:
      sprite: Mobs/Animals/snake.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimBald
  name: Sauvez les gens de l'invasion des cheveux.
  description: Des parasites extraterrestres se font passer pour les cheveux des gens. Sauvez les gens de cette invasion.
  components:
  - type: Objective
    icon:
      sprite: Objects/Tools/scissors.rsi
      state: icon

# Harmful Objectives

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNoWalls
  name: Démolissez les murs.
  description: L'équipage doit mieux se connaître. Démolissez les murs à l'intérieur de la station !
  components:
  - type: Objective
    icon:
      sprite: Structures/Walls/solid.rsi
      state: rgeneric

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimAbductception
  name: Prenez votre revanche.
  description: Vous avez été changé pour toujours. Trouvez les extraterrestres qui vous ont fait ça et rendez-leur la pareille.
  components:
  - type: Objective
    icon:
      sprite: Objects/Weapons/Melee/baseball_bat.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNoOxygen
  name: L'OXYGÈNE TUE TOUT LE MONDE.
  description: L'oxygène les tue tous et ils ne le savent même pas. Assurez-vous qu'il n'y a plus d'oxygène sur la station.
  components:
  - type: NotJobRequirement
    job: AtmosphericTechnician # It would be too free for atmos techs :) CE is fair game though.
  - type: Objective
    icon:
      sprite: Objects/Tanks/oxygen.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimEscapeStation
  name: Échappez-vous de la station.
  description: Vous devez vous échapper de la station ! Faites appeler la navette !
  components:
  - type: Objective
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: shuttle
  - type: EscapeShuttleCondition

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimNoCloning
  name: Pas de clonage.
  description: N'autorisez personne à être cloné.
  components:
  - type: Objective
    icon:
      sprite: Structures/Machines/cloning.rsi
      state: pod_g

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimStealWeapons
  name: Volez des armes.
  description: Volez autant d'armes que vous pouvez porter sur vous.
  components:
  - type: Objective
    icon:
      sprite: Objects/Weapons/Melee/baseball_bat.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimDismantleComputers
  name: Volez des ordinateurs.
  description: Les ondes 7G émises par les ordinateurs tuent l'équipage et ils ne le savent pas ! Démontez-les !
  components:
  - type: Objective
    icon:
      sprite: Structures/Machines/computers.rsi
      state: avionics-systems

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimFinality
  name: Pas de réanimation.
  description: La mort devrait être définitive et la médecine moderne perturbe l'ordre naturel. N'autorisez personne à être réanimé.
  components:
  - type: Objective
    icon:
      sprite: Objects/Specific/Medical/defib.rsi
      state: icon

- type: entity
  parent: BaseAbductorVictimObjective
  id: AbductorVictimHeretic
  name: LES PORTES SE SONT OUVERTES MON ESPRIT EST OUVERT MON ESPRIT EST OUVERT MON ESPRIT EST OUVERT
  description: Vous voyez vous voyez ce qu'ils ne peuvent pas vous voyez la porte ouverte vous voyEZ vous VOYez vous VOYez vOus voyEz MONTREZ-LEUR TOUT.
  components:
  - type: ForceHereticObjective
  - type: Objective
    icon:
      sprite: _Goobstation/Heretic/mansus_grasp.rsi
      state: icon
