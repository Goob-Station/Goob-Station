  - type: Stitches

- type: entity
  parent: [ OmnimedTool, BaseSyndicateContraband ]
  id: OmnimedToolSyndie
  name: omnioutil chirurgical gorlex
  description: Un omnioutil chirurgical compact pratiquement conçu comme un couteau suisse, sauf que son utilisateur a probablement violé quelques conventions suisses. Peut effectuer des chirurgies à travers les vêtements.
  components:
  - type: Sprite
    state: evil
  - type: Item
    size: Small
    heldPrefix: evil
  - type: SurgeryIgnoreClothing

