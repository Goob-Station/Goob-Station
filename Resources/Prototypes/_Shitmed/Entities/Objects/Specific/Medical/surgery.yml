- type: entity
  parent: BaseToolSurgery
  id: Bonesetter
  name: réducteur d'os
  description: Utilisé pour remettre les os en place.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/bonesetter.rsi
    state: bonesetter
  - type: Item
  - type: BoneSetter
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/bone_setter.ogg

- type: entity
  parent: BaseToolSurgery
  id: BoneGel
  name: flacon de gel osseux
  description: Un contenant de gel osseux qui doit souvent être rechargé depuis une machine spécialisée.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/bone-gel.rsi
    state: bone-gel
  - type: BoneGel

- type: entity
  parent: BaseToolSurgery
  id: MedicalStitches
  name: sutures médicales
  description: Une fine aiguille courbe avec un fil de suture en polyglycolide absorbable.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/stitches.rsi
    state: stitches
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/saw.ogg # TODO: SOUND
  - type: Stitches

- type: entity
  name: coupe-tissu
  id: EnergyScalpel
  parent: Scalpel
  description: Un scalpel à lame énergétique, sert également de perceuse lorsqu'alimenté.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-scalpel.rsi
    state: e-scalpel-on
  - type: Item
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-scalpel.rsi
    heldPrefix: scalpel
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/scalpel2.ogg
  - type: MeleeWeapon
    damage:
      types:
        Slash: 12
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 150
      Glass: 37
      Gold: 37
  - type: Scalpel
    speed: 3
  - type: BoneSaw
    speed: 3
  - type: ItemSwitch
    showLabel: true
    state: scalpel
    defaultState: scalpel
    states:
      scalpel: !type:ItemSwitchState
        verb: scalpel
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-scalpel.rsi
          state: e-scalpel
        components:
          - type: Scalpel
            speed: 3
          - type: BoneSaw
            speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

      drill: !type:ItemSwitchState
        verb: drill
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-scalpel.rsi
          state: e-scalpel-on
        components:
        - type: Drill
          speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

- type: entity
  name: pinces à puissance
  id: AdvancedRetractor
  parent: Retractor
  description: Un rétracteur à pinces mécaniques, sert également d'hémostat lorsqu'alimenté.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/adv-retractor.rsi
    state: adv-retractor-on
  - type: Item
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/adv-retractor.rsi
    heldPrefix: retractor
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor2.ogg
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 12
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 150
      Glass: 37
      Silver: 37
  - type: Retractor
    speed: 3
  - type: ItemSwitch
    showLabel: true
    state: retractor
    states:
      retractor: !type:ItemSwitchState
        verb: retractor
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/adv-retractor.rsi
          state: adv-retractor
        components:
          - type: Retractor
            speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

      hemostat: !type:ItemSwitchState
        verb: hemostat
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/adv-retractor.rsi
          state: adv-retractor-on
        components:
          - type: Hemostat
            speed: 3
          - type: Tweezers
            speed: 3
          - type: Tending
            speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

- type: entity
  name: agrafeuse énergétique
  id: EnergyCautery
  parent: Cautery
  description: Un cautère à pointe énergétique, sert également de sutures lorsqu'alimenté.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-cautery.rsi
    state: e-cautery-on
  - type: Item
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-cautery.rsi
    heldPrefix: cautery
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/cautery1.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/cautery2.ogg
  - type: MeleeWeapon
    damage:
      types:
        Heat: 12
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 150
      Glass: 37
      Plasma: 37
  - type: Cautery
    speed: 3
  - type: ItemSwitch
    showLabel: true
    state: cautery
    states:
      cautery: !type:ItemSwitchState
        verb: cautery
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-cautery.rsi
          state: e-cautery
        components:
        - type: Cautery
          speed: 3
        soundStateActivate:
          collection: WelderOn
          params:
            variation: 0.125
            volume: -5

      stitches: !type:ItemSwitchState
        verb: stitches
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-cautery.rsi
          state: e-cautery-on
        components:
        - type: Stitches # should be unlimited when the actual stitches become limited
          speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

- type: entity
  name: multioutil osseux
  id: AdvancedBoneGel
  parent: BoneGel
  description: Un réparateur osseux mécanique, sert également de reducteur d'os lorsqu'alimenté.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-bone-gel.rsi
    state: e-bone-gel-on
  - type: Item
    heldPrefix: bonegel
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/bone_setter.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/bone_setter.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 12
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 150
      Glass: 37
      Plasma: 37
  - type: BoneGel # should be unlimited when the actual bone gel becomes limited
    speed: 3
  - type: ItemSwitch
    showLabel: true
    state: bonegel
    states:
      bonegel: !type:ItemSwitchState
        verb: gel osseux
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-bone-gel.rsi
          state: e-bone-gel
        components:
        - type: BoneGel # should be unlimited when the actual bone gel becomes limited
          speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

      bonesetter: !type:ItemSwitchState
        verb: réducteur d'os
        sprite:
          sprite: _Shitmed/Objects/Specific/Medical/Surgery/e-bone-gel.rsi
          state: e-bone-gel-on
        components:
        - type: BoneSetter
          speed: 3
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

- type: entity
  name: omnioutil chirurgical
  id: OmnimedTool
  parent: BaseToolSurgery
  description: Un omnioutil chirurgical compact pratiquement conçu comme un couteau suisse.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/omnimed.rsi
    state: omnimed
  - type: Item
    size: Normal
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/omnimed.rsi
  - type: SurgeryTool
