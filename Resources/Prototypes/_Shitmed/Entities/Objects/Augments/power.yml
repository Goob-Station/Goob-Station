# Power Cell Slot

- type: entity
  parent: BaseItem
  id: AugmentPowerCellSlotCasing
  name: boîtier de logement de pile d'augment
  description: Peut être implanté dans un corps pour alimenter d'autres implants. Celui-ci est incomplet.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: incomplete_cell
  - type: Construction
    graph: AugmentPowerCellSlot
    node: casing
    defaultTarget: augment
  - type: Tag
    tags: [ AugmentCellCasing ]

- type: entity
  parent: BaseItem
  id: AugmentPowerCellSlotCables
  name: boîtier de logement de pile d'augment avec câbles
  description: Peut être implanté dans un corps pour alimenter d'autres implants. Celui-ci est incomplet.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: incomplete_cell_cables
  - type: Construction
    graph: AugmentPowerCellSlot
    node: cables

- type: entity
  parent: BaseAugment
  id: AugmentPowerCellSlot
  name: logement de pile d'augment
  description: Peut être implanté dans un corps pour alimenter d'autres implants.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: cell
  - type: Organ
    slotId: powerCell
    onAdd:
    - type: HasAugmentPowerCellSlot
  - type: AugmentPowerCellSlot
  - type: Construction
    graph: AugmentPowerCellSlot
    node: augment
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot { }
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: PowerCellDraw
    drawRate: 0
    enabled: false
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        whitelist:
          components:
          - PowerCell
        blacklist:
          tags:
          - PowerCage

# Power Cell Charger

- type: entity
  abstract: true
  parent: BaseAugment
  id: BaseAugmentRecharger
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: cell
  - type: Organ
    slotId: charger
  - type: AugmentCharger

- type: entity
  parent: BaseItem
  id: AugmentRechargerCasing
  name: boîtier de rechargeur d'augment
  description: Peut être implanté dans un corps pour recharger une pile interne. Celui-ci est incomplet.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: incomplete_charger
  - type: Construction
    graph: AugmentRecharger
    node: casing
  - type: Tag
    tags: [ AugmentRechargerCasing ]

- type: entity
  parent: BaseItem
  id: AugmentRechargerCables
  name: boîtier de rechargeur d'augment avec câbles
  description: Peut être implanté dans un corps pour recharger une pile interne. Celui-ci est incomplet.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: incomplete_charger_cables
  - type: Construction
    graph: AugmentRecharger
    node: cables

- type: entity
  parent: BaseAugmentRecharger
  id: AugmentRechargerAPC
  name: rechargeur APC d'augment
  description: Permet à l'implanté de recharger sa pile via les APCs.
  components:
  - type: Sprite
    state: apc
  - type: Organ
    onAdd:
    - type: BatteryDrinker
  - type: Construction
    graph: AugmentRecharger
    node: apc

- type: entity
  parent: BaseAugmentRecharger
  id: AugmentRechargerStation
  name: rechargeur de station d'augment
  description: Permet à l'implanté de recharger sa pile via les stations de recharge cyborg.
  components:
  - type: Sprite
    state: station
  - type: Organ
    onAdd:
    - type: AugmentStationRecharge
  - type: Construction
    graph: AugmentRecharger
    node: station
