- type: entity
  abstract: true
  parent: BaseAugment
  id: BaseArmAugment
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/arm.rsi
  - type: Item
    size: Huge
  - type: Organ
    slotId: armImplant
  - type: AugmentArm

# Tools

- type: entity
  parent: BaseAugmentAction
  id: ActionAugmentOpenToolsPanel
  name: Ouvrir le panneau d'outils
  description: Accéder aux outils implantés en vous
  components:
  - type: Action
    icon: { sprite: Clothing/Belt/utility.rsi, state: icon }
    iconOn: Interface/Default/blocked.png

- type: entity
  abstract: true
  parent: BaseArmAugment
  id: BaseAugmentToolPanel
  components:
  - type: Sprite
    state: base
  - type: Storage
    maxItemSize: Normal
    defaultStorageOrientation: Vertical
    grid:
    - 0,0,9,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: ItemToggle
    activated: true # needs to be activated for installation
    onUse: false
    onActivate: false
  - type: AugmentPowerDraw
    draw: 6 # used while an item is equipped
  - type: AugmentToolPanel
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.AugmentToolPanelUiKey.Key:
        type: AugmentToolPanelMenuBoundUserInterface
        interactionRange: 0
  - type: AugmentActivatableUI
    key: enum.AugmentToolPanelUiKey.Key
  - type: AugmentAction
    action: ActionAugmentOpenToolsPanel
  - type: Construction
    graph: AugmentToolsPanel

# Arm augment electronics

- type: entity
  abstract: true
  parent: BaseElectronics
  id: BaseAugmentElectronics
  components:
  - type: Sprite
    state: mainboard
  - type: Item
    storedRotation: 0
  - type: PhysicalComposition
    materialComposition:
      Glass: 100
      Steel: 100
    chemicalComposition:
      Silicon: 20

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentUtilityPanelElectronics
  name: électronique de panneau d'outils utilitaires
  description: Une carte électronique qui programme un panneau d'outils pour contenir un type d'objet spécifique. Celui-ci contient des outils utilitaires.
  components:
  - type: Tag
    tags: [ AugmentUtilityToolElectronics ]

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentBotanyPanelElectronics
  name: électronique de panneau d'outils botaniques
  description: Une carte électronique qui programme un panneau d'outils pour contenir un type d'objet spécifique. Celui-ci contient des outils botaniques.
  components:
  - type: Tag
    tags: [ AugmentBotanyToolElectronics ]

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentSurgeryPanelElectronics
  name: électronique de panneau d'outils chirurgicaux
  description: Une carte électronique qui programme un panneau d'outils pour contenir un type d'objet spécifique. Celui-ci contient des outils chirurgicaux.
  components:
  - type: Tag
    tags: [ AugmentSurgeryToolElectronics ]

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentPaperworkPanelElectronics
  name: électronique de panneau d'outils administratifs
  description: Une carte électronique qui programme un panneau d'outils pour contenir un type d'objet spécifique. Celui-ci contient des outils administratifs.
