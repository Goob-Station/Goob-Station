# Strength

- type: entity
  abstract: true
  parent: BaseItem
  id: BaseIncompleteAugmentStrength
  description: Peut être implanté dans un corps pour augmenter la force physique. Celui-ci est incomplet.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/arm.rsi
  - type: Item
    size: Huge
  - type: Construction
    graph: AugmentStrength

- type: entity
  parent: BaseIncompleteAugmentStrength
  id: AugmentStrengthCasing
  name: boîtier d'augment de force
  components:
  - type: Sprite
    state: base
  - type: Construction
    node: casing
  - type: Tag
    tags: [ AugmentStrengthCasing ]

- type: entity
  parent: BaseIncompleteAugmentStrength
  id: AugmentStrengthCables
  name: boîtier d'augment de force avec câbles
  components:
  - type: Sprite
    state: base_cables
  - type: Construction
    node: cables

- type: entity
  parent: BaseAugmentAction
  id: ActionAugmentToggleStrength
  name: Activer/désactiver l'augment de force
  description: Augmente vos dégâts au corps à corps de 25 %, consomme 30W lorsqu'actif.
  components:
  - type: Action
    icon: Interface/Default/blocked.png
    iconOn: { sprite: Objects/Tools/Toolboxes/toolbox_blue.rsi, state: icon }
  - type: InstantAction
    event: !type:ToggleActionEvent

- type: entity
  parent: BaseArmAugment
  id: AugmentStrength
  name: augment de force
  description: Peut être implanté dans un corps pour augmenter la force physique.
  components:
  - type: Sprite
    state: strength
  - type: ItemToggle
    onUse: false
    onActivate: false
  - type: AugmentStrength
  - type: AugmentPowerDraw
    draw: 30
  - type: AugmentAction
    action: ActionAugmentToggleStrength
  - type: Construction
    graph: AugmentStrength
    node: augment
