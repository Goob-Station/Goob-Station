# Abductor's Crowbar
- type: entity
  parent: [ BaseCrowbar, BaseMajorContraband ]
  id: CrowbarAbductor
  name: pied-de-biche high-tech
  description: Fabriqué dans un métal plus durable que tout ce que Nanotrasen pourrait imaginer.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/crowbar.rsi
    state: abductor
  - type: Tool
    speedModifier: 2
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: GuideHelp
    guides:
    - Abductors

- type: entity
  name: coupe-fil high-tech
  parent: [ BaseItem, BaseMajorContraband]
  id: WirecutterAbductor
  description: Coupe les câbles comme un couteau chaud dans du beurre.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/wirecutters.rsi
    state: abductor
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/wirecutter_drop.ogg
  - type: Tag
    tags:
    - PlantSampleTaker
    - Wirecutter
  - type: MeleeWeapon
    wideAnimationRotation: -90
    damage:
      types:
        Piercing: 2
    attackRate: 2
    soundHit:
      path: "/Audio/Items/wirecutter.ogg"
  - type: Tool
    qualities:
      - Cutting
    useSound:
      path: /Audio/Items/wirecutter.ogg
  - type: Item
    sprite: _Shitmed/Objects/Specific/Abductor/wirecutters.rsi
    storedRotation: -90
  - type: ToolTileCompatible
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 30
  - type: Retractor
    speed: 0.35
  - type: Hemostat
    speed: 0.6
  - type: SurgeryTool
    startSound:
      path: /Audio/Items/wirecutter.ogg
      params:
        variation: 0.125
    endSound:
      path: /Audio/Items/wirecutter.ogg
      params:
        variation: 0.125
  - type: GuideHelp
    guides:
    - Abductors

- type: entity
  name: tournevis high-tech
  parent: [ BaseItem, BaseMajorContraband ]
  id: ScrewdriverAbductor
  description: Plus efficace que tout ce que Nanotrasen pourrait imaginer. À ne pas confondre avec un tournevis sonique.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/screwdriver.rsi
    state: abductor
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
  - type: Tag
    tags:
    - Screwdriver
  - type: Item
    sprite: _Shitmed/Objects/Specific/Abductor/screwdriver.rsi
    storedRotation: -90
  - type: MeleeWeapon
    wideAnimationRotation: -90
    attackRate: 1
    damage:
      types:
        Piercing: 6
    soundHit:
      path: "/Audio/Weapons/bladeslice.ogg"
  - type: Tool
    qualities:
      - Screwing
    useSound:
      collection: Screwdriver
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 30
  - type: Retractor
    speed: 0.45
  - type: Tending
    speed: 0.65
  - type: SurgeryTool
    startSound:
      collection: Screwdriver
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor2.ogg
  - type: GuideHelp
    guides:
    - Abductors

- type: entity
  name: clé à molette high-tech
  parent: [ Wrench, BaseMajorContraband ]
  id: WrenchAbductor
  description: Peut retirer un boulon en un seul tour. Non destiné au combat au corps à corps.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/wrench.rsi
    state: abductor
  - type: Item
    sprite: _Shitmed/Objects/Specific/Abductor/wrench.rsi
    storedRotation: 45
    heldPrefix: abductor
    storedSprite:
      sprite: _Shitmed/Objects/Specific/Abductor/wrench.rsi
      state: abductor
  - type: Tool
    speedModifier: 2
    qualities:
      - Anchoring
    useSound:
      path: /Audio/Items/ratchet.ogg
  - type: GuideHelp
    guides:
    - Abductors

- type: entity
  name: outil de soudage high-tech
  parent: [ Welder, BaseMajorContraband ]
  id: WelderAbductor
  description: "Un soudeur très avancé capable de produire du carburant en quantité infinie."
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/welder.rsi
    state: abductor
  - type: SolutionContainerManager
    solutions:
      Welder:
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 1000
        maxVol: 1000
  - type: PointLight
    enabled: false
    radius: 1.5
    color: lightblue
  - type: SolutionRegeneration
    solution: Welder
    generated:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 10
  - type: Tool
    speedModifier: 2.0
    useSound:
      collection: Welder
    qualities:
    - Welding
    - Axing # Goobstation
  - type: ToolTileCompatible # Goobstation
    delay: 2
  - type: GuideHelp
    guides:
    - Abductors

- type: entity
  name: multioutil high-tech
  parent: [BaseItem, BaseMajorContraband]
  id: MultitoolAbductor
  description: Un outil de piratage très avancé capable de visualiser les fonctions des câbles. Peut être utilisé comme séquenceur cryptographique en mode alternatif.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/multitool_drop.ogg
  - type: Item
    size: Small
    heldPrefix: link
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Plastic: 100
  - type: StaticPrice
    price: 56
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Abductor/multitool.rsi
    state: abductor
    layers:
      - state: abductor
  - type: Clothing
    quickEquip: false
    equippedPrefix: link
    slots:
    - Belt
  - type: GuideHelp
    guides:
    - Abductors
  - type: UserInterface
    interfaces:
      enum.NetworkConfiguratorUiKey.List:
        type: NetworkConfiguratorBoundUserInterface
      enum.NetworkConfiguratorUiKey.Configure:
        type: NetworkConfiguratorBoundUserInterface
      enum.NetworkConfiguratorUiKey.Link:
        type: NetworkConfiguratorBoundUserInterface
  - type: Tag
    tags:
      - Multitool
      - DoorElectronicsConfigurator
      - ShowWires
  - type: Tool
    qualities:
      - Pulsing
  - type: NetworkConfigurator
    showLabel: false
  - type: LimitedCharges
  - type: AutoRecharge
    rechargeDuration: 20
  - type: ItemSwitch
    state: link
    states:
      link: !type:ItemSwitchState
        verb: link
        sprite:
          sprite: _Shitmed/Objects/Specific/Abductor/multitool.rsi
          state: abductor
        components:
          - type: Tool
            qualities:
              - Pulsing
          - type: NetworkConfigurator
            showLabel: false
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5

      hijack: !type:ItemSwitchState
        verb: hijack
        sprite:
          sprite: _Shitmed/Objects/Specific/Abductor/multitool.rsi
          state: override-abductor
        components:
        - type: Emag
          emagType: Access
          validTargets:
            components:
            - Airlock
        soundStateActivate:
          collection: sparks
          params:
            variation: 0.125
            volume: -5
