- type: entity
  parent: BaseComputer
  id: AbductorConsole
  name: console de ravisseur
  description: Un ordinateur utilisé pour espionner la station.
  components:
  - type: AbductorConsole
  - type: Sprite
    sprite: _Shitmed/Structures/Machines/abductor_console.rsi
    layers:
    - map: ["console"]
      state: console
  - type: ActivatableUI
    key: enum.AbductorConsoleUIKey.Key
  - type: UserInterface
    interfaces:
     enum.AbductorConsoleUIKey.Key:
        type: AbductorConsoleBui
  - type: PointLight
    enabled: true
    radius: 1.5
    energy: 1.6
    color: "#FC0097"

- type: entity
  parent: ComputerComms
  id: CentCommSectoralConsole
  name: console sectorielle centcomm
  description: Utilisez ceci pour agacer les capitaines de toutes les stations à la fois.
  components:
    - type: AccessReader
      access: [[ "Command" ]]
    - type: CommunicationsConsole
      title: comms-console-announcement-title-centcom
      global: true

- type: entity
  parent: BaseComputer
  id: AbductorHumanObservationConsole
  name: console d'observation humaine
  description: Utilisez ceci pour définir la destination du téléporteur ou récupérer les personnes marquées par les outils du scientifique. Également utilisé pour acheter du matériel de remplacement et lier le gilet de l'agent.
  components:
  - type: Sprite
    sprite: _Shitmed/Structures/Machines/abductor_camera_console.rsi
    layers:
    - map: ["console"]
      state: console
  - type: AbductorHumanObservationConsole
  - type: ActivatableUI
    key: enum.AbductorCameraConsoleUIKey.Key
  - type: UserInterface
    interfaces:
     enum.AbductorCameraConsoleUIKey.Key:
        type: AbductorCameraConsoleBui
  - type: PointLight
    enabled: true
    radius: 1.5
    energy: 1.6
    color: "#FC0097"

- type: entity
  parent:
  - Incorporeal
  - BaseMob
  id: AbductorHumanObservationConsoleEye
  name: œil de ravisseur
  description: Le visualiseur du ravisseur.
  categories: [ HideSpawnMenu, DoNotMap ]
  suffix: DO NOT MAP
  components:
  - type: NoFTL
  - type: WarpPoint
    follow: true
  - type: Eye
    pvsScale: 1.5
  - type: Visibility
    layer: 8 # Abductor visflag
  - type: Sprite
    sprite: _Shitmed/Structures/Machines/abductor_camera_console.rsi
    layers:
    - state: eye
      shader: unshaded
  - type: Tag
    tags:
    - CantInteract
