# Actions
- type: entity
  parent: BaseMentalAction
  id: ActionExitConsole
  name: Quitter la console
  description: Quitter la console.
  components:
  - type: Action
    checkCanInteract: false
    priority: -20
    itemIconStyle: BigAction
    icon:
      sprite: _Shitmed/Interface/Actions/actions_abductor.rsi
      state: exit
  - type: InstantAction
    event: !type:ExitConsoleEvent

- type: entity
  parent: BaseMentalAction
  id: ActionSendYourself
  name: S'envoyer soi-même
  description: Vous devez effectuer un saut FTL vers la même carte que la station pour utiliser cette capacité !
  components:
  - type: Action
    itemIconStyle: BigAction
    checkCanInteract: false
    icon:
      sprite: _Shitmed/Interface/Actions/actions_abductor.rsi
      state: send-yourself
    useDelay: 10
    priority: -19
  - type: TargetAction
    checkCanAccess: false
    range: -1
  - type: WorldTargetAction
    event: !type:SendYourselfEvent

- type: entity
  parent: BaseAction
  id: ActionReturnToShip
  name: Retourner
  description: Retourner au vaisseau.
  components:
  - type: Action
    useDelay: 30
    icon:
      sprite: _Shitmed/Interface/Actions/actions_abductor.rsi
      state: take
    priority: -12
  - type: InstantAction
    event: !type:AbductorReturnToShipEvent
