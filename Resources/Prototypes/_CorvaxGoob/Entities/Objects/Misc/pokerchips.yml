- type: entity
  parent: BaseItem
  id: PokerChipBase
  name: poker chip
  description: A simple poker chip
  abstract: true
  components:
    - type: Item
      size: Tiny
    - type: Stack
      stackType: PokerChip5
      baseLayer: base
      layerStates:
        - chip_5-1
        - chip_5-5
        - chip_5-10
    - type: Sprite
      sprite: _CorvaxGoob/Objects/Misc/pokerchips.rsi
      state: chip_5-1
      layers:
        - state: chip_5-1
          map: ["base"]
    - type: Appearance
    - type: Tag
      tags:
        - PokerChip

- type: entity
  parent: PokerChipBase
  id: PokerChip5
  description: A simple poker chip with value of 5
  suffix: Value 5, 10
  components:
    - type: Stack
      stackType: PokerChip5
      baseLayer: base
      layerStates:
        - chip_5-1
        - chip_5-5
        - chip_5-10
      count: 10
    - type: Sprite
