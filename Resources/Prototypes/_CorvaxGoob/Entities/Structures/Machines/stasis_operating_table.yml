- type: entity
  id: StasisOperatingTable
  name: table d'opération de stase
  parent: [ StasisBed, OperatingTable ]
  description: Utilisée pour les procédures médicales avancées. Ralentit considérablement le métabolisme du patient et empêche la décomposition corporelle.
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Structures/Machines/stasis_operation_table.rsi
    noRot: true
    layers:
    - state: icon
    - state: unlit
      shader: unshaded
      map: ["unlit"]
  - type: Machine
    board: StasisOperatingTableCircuitboard
