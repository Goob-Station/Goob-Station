- type: entity
  parent: [ClothingHeadset, BaseSecurityLawyerContraband]
  id: ClothingHeadsetLawyer
  name: lawyer headset
  description: Thanks to this device, your lawyer will hear your screams from the interrogation room.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyLegal
      - EncryptionKeySecurity
      - EncryptionKeyCommon
  - type: Sprite
    sprite: Clothing/Ears/Headsets/security.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/security.rsi

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetMagistrate
  name: magistrate's headset
  description: A headset for judge to hear the captain's last words.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyIAA
  - type: Sprite
    sprite: Clothing/Ears/Headsets/command.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/command.rsi
