- type: entity
  parent: [ClothingOuterHardsuitBase, BaseSecurityContraband]
  id: ClothingOuterHardsuitSecuritySolarian
  name: solarian security hardsuit
  suffix: SAN
  description: A special suit that protects against hazardous, low pressure environments. Has an additional layer of armor.
  components:
  - type: Sprite
    sprite: _SolarianStation/Clothing/OuterClothing/Hardsuits/SolarianSecVoidSuit.rsi
  - type: Clothing
    sprite: _SolarianStation/Clothing/OuterClothing/Hardsuits/SolarianSecVoidSuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: Armor
    traumaDeductions:
      Dismemberment: 0.3
      OrganDamage: 0.3
      BoneDamage: 0.3
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.8
        Caustic: 0.7
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitSecuritySolarian
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.6
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 3
    knockdownTimeDelta: -3
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
