- type: entity
  name: Marine officer's sabre
  parent: BaseSword
  id: MarineOfficerSabre
  suffix: SAN
  description: A ceremonial weapon belonging to the marine officer of the SAN Army.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/sabre_drop.ogg
  - type: Sprite
    sprite: _SolarianStation/Objects/Weapons/Melee/SAN_marine_officer_sword.rsi
  - type: MeleeWeapon
    animationRotation: -95
    wideAnimationRotation: -135
    heavyStaminaCost: 2.5
    attackRate: 1.5
    damage:
      types:
        Slash: 19
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: 0.3
    spread: 90
  - type: Item
    storedSprite:
      state: storage
      sprite: _SolarianStation/Objects/Weapons/Melee/SAN_marine_officer_sword.rsi
    shape:
    - 0,0,0,3
  - type: Tag
    tags:
    - MarineOfficerSabre
  - type: DisarmMalus



