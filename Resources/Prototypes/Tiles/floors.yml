- type: tile
  id: BaseStationTile
  abstract: true
  isSubfloor: false
  deconstructTools: [ Prying ]
  footstepSounds:
    collection: FootstepFloor
  heatCapacity: 10000
  tileRipResistance: 4500 # Goob
  baseTurf: Plating
  baseWhitelist:
  - PlatingBrass
  - FloorAsteroidIronsand
  - FloorAsteroidSand
  - FloorAsteroidSandBorderless
  - FloorAsteroidIronsandBorderless
  - FloorAsteroidSandRedBorderless
  - PlatingAsteroid
  - PlatingSnow
  - FloorPlanetDirt
  - FloorDesert
  - FloorLowDesert
  - FloorPlanetGrass
  - FloorSnow
  - FloorDirt
  - PlatingRCD
  - FloorHullReinforced

