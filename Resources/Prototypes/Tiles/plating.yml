- type: tile
  id: BasePlating
  abstract: true
  friction: 1.5
  heatCapacity: 10000
  isSubfloor: true
  # Goobstation - Fireaxe plating prying
  deconstructTools: [ Axing ]
  deconstructTimeMultiplier: 5 # Goobstation
  footstepSounds:
    collection: FootstepPlating
  baseTurf: Lattice
  baseWhitelist:
    - TrainLattice

- type: tile
  id: Plating
  parent: BasePlating
  name: tiles-plating
  sprite: /Textures/Tiles/plating.png

- type: tile
  id: PlatingRCD
  parent: Plating
  baseWhitelist:
    - TrainLattice
    - FloorPlanetDirt
    - FloorDesert
    - FloorLowDesert
    - FloorPlanetGrass
    - FloorSnow
    - FloorDirt
    - FloorAsteroidIronsand
    - FloorAsteroidSand
    - FloorAsteroidSandBorderless
    - FloorAsteroidIronsandBorderless
    - FloorAsteroidSandRedBorderless

- type: tile
  id: FloorHullReinforced
  parent: BasePlating
  name: tiles-hull-reinforced
  sprite: /Textures/Tiles/hull_reinforced.png
  footstepSounds:
    collection: FootstepHull
  itemDrop: FloorTileItemSteel
  heatCapacity: 100000 #/tg/ has this set as "INFINITY." I don't know if that exists here so I've just added an extra 0
  indestructible: true

- type: tile
  id: PlatingDamaged
  parent: BasePlating
  name: tiles-plating
  sprite: /Textures/Tiles/plating_damaged.png
  variants: 3
  placementVariants:
  - 1.0
  - 1.0
  - 1.0
  baseTurf: Lattice
  isSubfloor: true
  footstepSounds:
    collection: FootstepPlating
  friction: 0.3
  heatCapacity: 10000
  # Goobstation - Fireaxe plating prying
  deconstructTools: [ Axing ]
  deconstructTimeMultiplier: 5 # Goobstation

- type: tile
  id: PlatingAsteroid
  parent: BasePlating
  name: tiles-asteroid-plating
  sprite: /Textures/Tiles/Asteroid/asteroid_plating.png
  # Goobstation - Fireaxe plating prying
  deconstructTools: [ Axing ]
  deconstructTimeMultiplier: 5 # Goobstation

- type: tile
  id: PlatingBrass
  parent: BasePlating
  name: tiles-brass-plating
  sprite: /Textures/Tiles/Misc/clockwork/clockwork_floor.png
  # Goobstation - Fireaxe plating prying
  deconstructTools: [ Axing ]
  deconstructTimeMultiplier: 5 # Goobstation

- type: tile
  id: PlatingSnow
  name: tiles-snow-plating
  parent: BasePlating
  sprite: /Textures/Tiles/snow_plating.png #Not in the snow planet RSI because it doesn't have any metadata. Should probably be moved to its own folder later.
  baseTurf: Lattice
  isSubfloor: true
  # Goobstation - Fireaxe plating prying
  deconstructTools: [ Axing ]
  deconstructTimeMultiplier: 5 # Goobstation
  friction: 0.75 #a little less then actual snow

- type: tile
  id: PlatingIronsand
  name: tiles-ironsand-plating
  sprite: /Textures/Tiles/Asteroid/ironsand_plating.png
  baseTurf: Lattice
  isSubfloor: true
  footstepSounds:
    collection: FootstepPlating
  friction: 1.5
  heatCapacity: 10000

- type: tile
  id: Lattice
  name: tiles-lattice
  sprite: /Textures/Tiles/lattice.png
  baseTurf: Space
  isSubfloor: true
  deconstructTools: [ Cutting ]
  deconstructTimeMultiplier: 1 # Goobstation
  weather: true
  footstepSounds:
    collection: FootstepCatwalk
  friction: 1.5
  isSpace: true
  itemDrop: PartRodMetal1
  heatCapacity: 10000
  mass: 200

- type: tile
  id: TrainLattice
  parent: Lattice
  name: tiles-lattice-train
  sprite: /Textures/Tiles/latticeTrain.png
  footstepSounds:
    collection: FootstepPlating
