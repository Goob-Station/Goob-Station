- type: entity
  parent: BaseAction
  id: ActionGravityJump
  name: Sauter
  description: En activant le système de propulsion avancé, vous vous propulsez sur une courte distance dans la direction de votre regard.
  components:
  - type: Action
    useDelay: 8
    icon:
      sprite: Interface/Actions/jump.rsi
      state: icon
  - type: InstantAction
    event: !type:GravityJumpEvent {}

- type: entity
  parent: BaseToggleAction
  id: ActionToggleRootable
  name: S'enraciner
  description: Commencer ou arrêter d'être enraciné au sol.
  components:
  - type: Action
    icon: Interface/Actions/rooting.png
    iconOn: Interface/Actions/rooting.png
    itemIconStyle: NoItem
    useDelay: 1

- type: entity
  id: ActionChameleonController
  name: Contrôler la tenue
  description: Changez toute votre tenue rapidement !
  components:
  - type: Action
    priority: -20
    icon: { sprite: Actions/Implants/implants.rsi, state: chameleon }
    itemIconStyle: BigAction
  - type: InstantAction
    event: !type:ChameleonControllerOpenMenuEvent
