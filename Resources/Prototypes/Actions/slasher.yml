- type: entity
  id: ActionSlasherSummonMachete
  name: Invoquer la machette
  description: Invoquez votre machette liée dans votre main active, ou créez-en une si elle est perdue.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 20
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: SummonMachete }
  - type: InstantAction
    event: !type:SlasherSummonMacheteEvent

- type: entity
  id: ActionSlasherSummonMeatSpike
  name: Pique de chair
  description: Faites surgir une horrible pique de chair sous vous pour capturer vos victimes.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 15
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: Meatspike }
  - type: InstantAction
    event: !type:SlasherSummonMeatSpikeEvent

- type: entity
  id: ActionSlasherIncorporealize
  name: S'incorporaliser
  description: Devenez incorporel, capable de traverser les murs et d'être complètement invisible, mais incapable d'interagir avec le monde. Ne peut être utilisé que lorsque vous n'êtes pas vu.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 1
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: Incorporealize }
  - type: InstantAction
    event: !type:SlasherIncorporealizeEvent

- type: entity
  id: ActionSlasherCorporealize
  name: Se corporaliser
  description: Manifestez votre être depuis votre état incorporel. Ne peut être utilisé que lorsque vous êtes incorporel.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 1
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: Corporealize }
  - type: InstantAction
    event: !type:SlasherCorporealizeEvent

- type: entity
  id: ActionSlasherBloodTrail
  name: Traînée de sang
  description: Commencez à laisser une traînée de sang sur votre passage avec une musique funky. Effrayant !
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 1
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: BloodTrail }
  - type: InstantAction
    event: !type:ToggleBloodTrailEvent

- type: entity
  id: ActionSlasherPossession
  name: Possession
  description: Utilisez ceci sur une personne pour prendre le contrôle d'elle, vous donnant le contrôle temporaire de son corps pendant 45 secondes. Une fois le temps écoulé, les deux corps reviennent.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 180
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: Possession }
  - type: TargetAction
    range: 3.5
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
    event: !type:SlasherPossessionEvent

- type: entity
  id: ActionSlasherRegenerate
  name: Régénérer
  description: Régénérez rapidement votre être, restaurant toute la santé perdue, réparant les blessures et supprimant tous les étourdissements. Doit être rechargé en volant une âme après chaque utilisation.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 75
    checkCanInteract: false
    checkConsciousness: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: Regenerate }
  - type: InstantAction
    event: !type:SlasherRegenerateEvent

- type: entity
  id: ActionSlasherStaggerArea
  name: Zone de chancelage
  description: Vous exercez votre aura sombre sur les personnes à portée, les ralentissant pendant un court instant.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 20
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: StaggerArea }
  - type: InstantAction
    event: !type:SlasherStaggerAreaEvent

- type: entity
  id: ActionSlasherMassacre
  name: Massacre
  description: Déchaînez une brutale série d'attaques. Plus vous enchaînez les coups, plus vous infligez de dégâts. Vous décapitez votre cible après 13 coups.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 20
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: SummonMachete }
  - type: InstantAction
    event: !type:SlasherMassacreEvent

- type: entity
  id: ActionSlasherSoulSteal
  name: Vol d'âme
  description: Siphonnez l'âme d'une victime. Doit être utilisé sur une cible vivante incapacitée (ou un cadavre) pour voler son âme, renforçant votre machette et augmentant votre santé.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 2
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: SoulSteal }
  - type: TargetAction
    range: 2.5
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
    event: !type:SlasherSoulStealEvent

- type: entity
  id: ActionSlasherNightVision
  name: Vision améliorée
  description: Vous voyez à travers l'obscurité.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 1
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: SlasherVision }
  - type: InstantAction
    event: !type:ToggleNightVisionEvent

- type: entity
  id: ActionSlasherRelentlessGrab
  name: Saisie implacable
  description: Votre prochaine attaque de mêlée saisira votre cible.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 15
    checkCanInteract: false
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Actions/slashericons.rsi, state: RelentlessGrab }
  - type: InstantAction
    event: !type:SlasherRelentlessGrabEvent
