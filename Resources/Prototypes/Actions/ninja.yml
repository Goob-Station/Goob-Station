# gloves
- type: entity
  parent: BaseToggleAction
  id: ActionToggleNinjaGloves
  name: Basculer les gants ninja
  description: Bascule toutes les actions des gants au clic gauche. Inclut le forçage de portes, le drainage d'énergie, l'étourdissement d'ennemis et le piratage de certains ordinateurs.
  components:
  - type: Action
    priority: -13

# suit
- type: entity
  parent: BaseAction
  id: ActionCreateThrowingStar
  name: Créer une étoile de lancer
  description: Canalise l'énergie de la combinaison pour créer une étoile de lancer infligeant des dégâts d'endurance supplémentaires.
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: Objects/Weapons/Throwable/throwing_star.rsi
      state: icon
    itemIconStyle: NoItem
    priority: -10
  - type: InstantAction
    event: !type:CreateItemEvent {}

- type: entity
  parent: BaseAction
  id: ActionRecallKatana
  name: Rappeler le katana
  description: Téléporte le Katana Énergétique lié à cette combinaison vers son porteur, le coût dépend de la distance.
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: Objects/Weapons/Melee/energykatana.rsi
      state: icon
    itemIconStyle: NoItem
    priority: -11
  - type: InstantAction
    event: !type:RecallKatanaEvent {}

- type: entity
  parent: BaseAction
  id: ActionNinjaEmp
  name: Impulsion EM
  description: Désactive toute technologie à proximité avec une impulsion électromagnétique.
  components:
  - type: Action
    icon:
      sprite: Objects/Weapons/Grenades/empgrenade.rsi
      state: icon
    itemIconStyle: BigAction
    priority: -13
  - type: InstantAction
    event: !type:NinjaEmpEvent {}

- type: entity
  parent: BaseAction
  id: ActionTogglePhaseCloak
  name: Camouflage de phase
  description: "Bascule le camouflage de phase de votre combinaison. Attention : si vous êtes touché, toutes les capacités sont désactivées pendant 5 secondes, y compris votre camouflage !"
  components:
  - type: Action
    # have to plan (un)cloaking ahead of time
    useDelay: 5
    priority: -9
  - type: InstantAction
    event: !type:ToggleActionEvent

# katana
- type: entity
  parent: BaseAction
  id: ActionEnergyKatanaDash
  name: Ruée du katana
  description: Téléportez-vous n'importe où dans votre champ de vision, si votre Katana Énergétique est en main.
  components:
  - type: Action
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: blink
    itemIconStyle: NoItem
    sound:
      path: /Audio/Magic/blink.ogg
      params:
        volume: 5
    priority: -12
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:DashEvent
