# Actions
- type: entity
  parent: BaseAction
  id: ActionJumpToCore
  name: Sauter vers le noyau
  description: Renvoie votre œil vers le noyau.
  components:
  - type: Action
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
  - type: InstantAction
    event: !type:JumpToCoreEvent

- type: entity
  parent: BaseAction
  id: ActionSurvCameraLights
  name: Basculer les lumières des caméras
  description: Active les lumières des caméras de surveillance près de l'endroit que vous observez.
  components:
  - type: Action
    priority: -5
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: camera_light
  - type: InstantAction
    event: !type:RelayedActionComponentChangeEvent
      components:
      - type: LightOnCollideCollider
      - type: FixturesChange
        fixtures:
          lightTrigger:
            shape:
              !type:PhysShapeCircle
              radius: 0.35
            density: 80
            hard: false
            layer:
            - GhostImpassable


- type: entity
  parent: BaseMentalAction
  id: ActionAIViewLaws
  name: Voir les lois
  description: Voir les lois que vous devez respecter.
  components:
  - type: Action
    priority: -3
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:ToggleLawsScreenEvent
