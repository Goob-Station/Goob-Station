- type: entity
  parent: BaseAction
  id: ActionRevertPolymorph
  name: Redevenir soi-même
  description: Reprendre sa forme originale.
  components:
  - type: ConfirmableAction
    popup: revert-polymorph-action-popup
  - type: InstantAction
    event: !type:RevertPolymorphActionEvent

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseActionPolymorph
  components:
  - type: Action
    checkCanInteract: false # Goobstation
    itemIconStyle: NoItem
    useDelay: 60
  - type: InstantAction
    event: !type:PolymorphActionEvent

- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphWizardSpider
  name: Polymorphie araignée
  description: Vous transforme en araignée.
  components:
  - type: Action
    icon:
      sprite: Mobs/Animals/spider.rsi
      state: tarantula
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: WizardSpider

- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphWizardRod
  name: Forme tige
  description: Prendre la forme d'une tige inamovible, détruisant tout sur votre passage.
  components:
  - type: Action
    useDelay: 25 # Goob edit
    icon:
      sprite: _Goobstation/Wizard/actions.rsi # Goob edit
      state: immrod # Goob edit
  - type: InstantAction
    event: !type:PolymorphSpellEvent # Goob edit
      protoId: WizardRod
  - type: SpeakOnAction
    sentence: action-speech-spell-rod-form # Goobstation
  - type: Magic # Goobstation
    requiresClothes: true
    requiresSpeech: true
    school: Transmutation
  - type: ActionUpgrade
    effectedLevels:
      2: ActionPolymorphWizardRodII
      3: ActionPolymorphWizardRodIII
      4: ActionPolymorphWizardRodIV
      5: ActionPolymorphWizardRodV


- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphJaunt
  name: Escapade éthérée
  description: Fondre dans le Plan Éthéré pour une fuite rapide !
  components:
  - type: Magic
    requiresClothes: true # Goobstation
    school: Translocation # Goobstation
  - type: Sprite # Goobstation - for apprentices
    sprite: _Goobstation/Wizard/actions.rsi
    state: jaunt
  - type: Action
    useDelay: 30
    icon:
      sprite: _Goobstation/Wizard/actions.rsi # Goob edit
      state: jaunt
  - type: InstantAction
    event: !type:PolymorphSpellEvent # Goob edit
      protoId: Jaunt
    # TODO: Effect ECS (from cardboard box)
  - type: ActionUpgrade
    effectedLevels:
      2: ActionPolymorphJauntII
      3: ActionPolymorphJauntIII

- type: entity
  parent: ActionPolymorphJaunt
  id: ActionPolymorphJauntII
  name: Escapade éthérée II
  description: Fondre dans le Plan Éthéré pour une fuite encore plus rapide !
  components:
  - type: Action
    useDelay: 22

- type: entity
  parent: ActionPolymorphJaunt
  id: ActionPolymorphJauntIII
  name: Escapade éthérée III
  description: Êtes-vous seulement encore tangible ?
  components:
  - type: Action
    useDelay: 14
