- type: entity
  parent: BaseAction
  id: ActionRevenantShop
  name: Boutique
  description: Ouvre la boutique de capacités.
  components:
  - type: Action
    icon: Interface/Actions/shop.png
  - type: InstantAction
    event: !type:RevenantShopActionEvent

- type: entity
  parent: BaseAction
  id: ActionRevenantDefile
  name: Profaner
  description: Brise les fenêtres, les tuiles et ouvre les conteneurs à proximité. Coûte 30 Essence. #Goob edit
  components:
  - type: Action
    useDelay: 15
    icon: Interface/Actions/defile.png
  - type: InstantAction
    event: !type:RevenantDefileActionEvent

- type: entity
  parent: BaseAction
  id: ActionRevenantOverloadLights
  name: Surcharger les lumières
  description: Invoque des éclairs depuis les lumières à proximité. Coûte 40 Essence. #Goob edit
  components:
  - type: Action
    icon: Interface/Actions/overloadlight.png
    useDelay: 20
  - type: InstantAction
    event: !type:RevenantOverloadLightsActionEvent

