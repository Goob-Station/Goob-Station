# Root selector
- type: megafaunaSelector
  id: Producer
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: ProducerActions

# Actions
- type: megafaunaSelector
  id: ProducerActions
  selector: !type:GroupMegafaunaSelector
    children:
  #  - id: ActionIdolSpawnSingle
    - id: ActionIdolSpawnGroup
  #  - id: ActionIdolSpawnReplenish

# Selectors

- type: megafaunaSelector
  id: ActionIdolSpawnSingle
  selector: !type:PerformActionSelector
    delay: !type:AngerNumberSelector
      range: 1.0,4.0
      inverse: true
    actionId: ActionIdolSpawnSingle
    conditions:
    - !type:ActionAvailableCondition
      actionId: ActionIdolSpawnSingle
 #  - !type:MegafaunaPhaseCondition
 #     phases: [1]

- type: megafaunaSelector
  id: ActionIdolSpawnGroup
  selector: !type:PerformActionSelector
    delay: !type:AngerNumberSelector
      range: 1.0,4.0
      inverse: true
    actionId: ActionIdolSpawnGroup
    conditions:
    - !type:ActionAvailableCondition
      actionId: ActionIdolSpawnGroup
 #   - !type:MegafaunaPhaseCondition
 #     phases: [2]

- type: megafaunaSelector
  id: ActionIdolSpawnReplenish
  selector: !type:PerformActionSelector
    delay: !type:AngerNumberSelector
      range: 1.0,4.0
      inverse: true
    actionId: ActionIdolSpawnReplenish
    conditions:
    - !type:ActionAvailableCondition
      actionId: ActionIdolSpawnReplenish
  #  - !type:MegafaunaPhaseCondition
  #    phases: [3]
