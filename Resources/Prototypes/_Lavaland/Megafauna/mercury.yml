# Root selector
- type: megafaunaSelector
  id: Mercury
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: MercuryActions

# Actions
- type: megafaunaSelector
  id: MercuryActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEtherDrain
    - id: ActionORTPlanktonFlood
    - id: ActionORTEnergyDischarge
    - id: ActionGalacticaSupercell
    - id: ActionORTCosmicRays
    - id: ActionORTResonanceVertical
    - id: ActionORTResonanceHorizontal
    - id: ActionORTEnergySurge

- type: megafaunaSelector
  id: ActionORTEtherDrain
  selector: !type:PerformActionSelector
    delay: !type:AngerNumberSelector
      range: 1.0,4.0
      inverse: true
    actionId: ActionORTEtherDrain
    conditions:
    - !type:ActionAvailableCondition
      actionId: ActionORTEtherDrain

