# Root selector
- type: megafaunaSelector
  id: Mercury
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: MercuryActions

- type: megafaunaSelector
  id: UFO
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: UFOActions

- type: megafaunaSelector
  id: ORTMelee
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: ORTMeleeActions

- type: megafaunaSelector
  id: ORTRanged
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: ORTRangedActions

# Actions
- type: megafaunaSelector
  id: MercuryActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEtherDrain
    - id: ActionORTPlanktonFlood
    - id: ActionORTCosmicRays
    - id: ActionORTResonanceVertical
    - id: ActionORTResonanceHorizontal

- type: megafaunaSelector
  id: UFOActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEnergyDischarge
    - id: ActionGalacticaSupercell
    - id: ActionORTEnergySurge

- type: megafaunaSelector
  id: ORTMeleeActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTSolarStorm
    - id: ActionORTParadigmInflation
    - id: ActionORTPhaseConversion
    - id: ActionORTReflectiveThreads

- type: megafaunaSelector
  id: ORTRangedActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEtherDrain
    - id: ActionORTEnergyDischarge
    - id: ActionORTEnergySurge
    - id: ActionORTPhaseConversion
    - id: ActionORTDarkMatterShell

- type: megafaunaSelector
  id: ActionORTEtherDrain
  selector: !type:PerformActionSelector
    delay: !type:AngerNumberSelector
      range: 1.0,4.0
      inverse: true
    actionId: ActionORTEtherDrain
    conditions:
    - !type:ActionAvailableCondition
      actionId: ActionORTEtherDrain

