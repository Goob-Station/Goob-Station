# Root selector
- type: megafaunaSelector
  id: Mercury
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: MercuryActions

- type: megafaunaSelector
  id: UFO
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: UFOActions

- type: megafaunaSelector
  id: ORTMelee
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: ORTGenericActions
    #- id: ORTMeleeActions

- type: megafaunaSelector
  id: ORTRanged
  selector: !type:AllMegafaunaSelector
    children:
    - id: PickTargetSimple
    - id: ORTGenericActions
    #- id: ORTRangedActions

# Actions
- type: megafaunaSelector
  id: MercuryActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEtherDrain
    - id: ActionORTPlanktonFlood
    - id: ActionORTCosmicRays
    - id: ActionORTResonanceVertical
    - id: ActionORTResonanceHorizontal

- type: megafaunaSelector
  id: UFOActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEnergyDischarge
    - id: ActionGalacticaSupercell
    - id: ActionORTEnergySurge

- type: megafaunaSelector
  id: ORTGenericActions
  selector: !type:GroupMegafaunaSelector
    children:
    - id: ActionORTEtherDrain
    - id: ActionORTPlanktonFlood
    - id: ActionORTEnergyDischarge
    - id: ActionORTEnergySurge
    - id: ActionORTSolarStorm

