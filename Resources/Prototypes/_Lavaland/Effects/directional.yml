- type: entity
  id: MoveUp
  components:
  - type: Transform
    noRot: true  
  - type: Physics
    bodyType: Dynamic  
  - type: DirectionalMovement
    moveNorth: true  
  - type: TimedDespawn
    lifetime: 3
  - type: Timer
  - type: TimedSpawner
    prototypes:
      - WarningVerticalSpawner
    intervalSeconds: 0.1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TriggerOnSpawn
  - type: EmitSoundOnTrigger
    sound:
      collection: MercuryBeam
      params:
        volume: -2

