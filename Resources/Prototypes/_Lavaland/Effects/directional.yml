- type: entity
  id: WarningVerticalSpawner
  parent: ORTWarningBox
  components:
  - type: TimedSpawner
    prototypes:
      - ORTThickBeamVertical
    intervalSeconds: 1.4
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: FadingIn
    fadeInTime: 0.3
  - type: FadingTimedDespawn
    lifetime: 1.1
    fadeOutTime: 1.1

- type: entity
  id: WarningHorizontalSpawner
  parent: ORTWarningBox
  components:
  - type: TimedSpawner
    prototypes:
      - ORTThickBeamHorizontal
    intervalSeconds: 1.4
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: FadingIn
    fadeInTime: 0.3
  - type: FadingTimedDespawn
    lifetime: 1.5
    fadeOutTime: 1.1

- type: entity
  id: ORTThickBeamVertical
  components:
  - type: Sprite
    sprite: _Lavaland/Effects/thick_beam.rsi
    state: thick_beamV
    shader: unshaded
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35, -0.35, 0.35, 0.35"
        density: 9999
        hard: false
        mask:
        - MobMask
        layer:
        - GlassLayer
  - type: Physics
    bodyType: Static
  - type: DamageOnCollide
    ignoreWhitelist:
      components:
        - Fauna
    inverted: true
    damage:
      groups:
        Genetic: 10
  - type: FadingTimedDespawn
    lifetime: 0.5
    fadeOutTime: 0.5

- type: entity
  id: ORTThickBeamHorizontal
  components:
  - type: Sprite
    sprite: _Lavaland/Effects/thick_beam.rsi
    state: thick_beamH
    shader: unshaded
    noRot: true
  - type: Physics
