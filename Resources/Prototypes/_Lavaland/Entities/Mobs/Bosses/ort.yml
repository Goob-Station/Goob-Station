- type: entity
  name: Spider of Mercury
  id: BaseORT
  parent: LavalandMobBase
  description:
  abstract: true
  components:
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-1.5,1.5,1.5"
        density: 1000
        mask:
        - LargeMobMask
        layer:
        - LargeMobLayer
  - type: Tag
    tags:
    - CannotSuicide
    - FootstepSound
  - type: TileMovement
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: MercurySpider
  - type: AddOrRemoveComponent
  - type: Fauna
  - type: Aggressive
    forgiveRange: 1000 # You woke it up, no more running.
  - type: CombatPower # Goobstation
    factor: 9999

- type: entity
  name: Bottomless pit
  id: ORTPit
  description: The radiation seeping from below makes your skin crawl. Something is waiting down there.
  components:
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-2,1,1"
        density: 1000
        mask:
        - LargeMobMask
        layer:
        - SlipLayer
  - type: Sprite
    drawdepth: FloorTiles
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: hole

- type: entity
  name: pulsing exoskeleton
  id: ORTForming
  parent: BaseORT
  description: The air trembles around it...
  components:
  - type: PointLight
    radius: 2
    energy: 1
    color: cyan
  - type: RadiationSource
    intensity: 3
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: mercury-skeleton
  - type: AngerPlayerScaling
    angerScale: 1.2
    hpScale: 1.2
  - type: MobThresholds
    thresholds:
      0: Alive
      750: Dead
  - type: SpawnLootOnDeath
    deleteOnDeath: true
    table: !type:AllSelector
      children:
      - id: ORTCombatAnimation
  # Actual boss from here
  - type: DangerZone
    popupRange: 15
    popup:
    - ort-sense-danger1
    - ort-sense-danger2
    - ort-sense-danger3
    - ort-sense-danger4
    - ort-sense-danger5
    - ort-sense-danger6
  - type: PulsingLight
    shouldPlaySound: true
  - type: VicinitySpawner
    numberToSpawn: 2
    offsetForSpawn: 7
    prototype:
    - CrystalSpikeEmerging

- type: entity
  name: Spider of Mercury
  id: ORTCombatForm
  parent: BaseORT
  description: Its body is not flesh. It is not metal. You don't have a clue as to what it is.
  components:
  - type: RadiationSource
    intensity: 2
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: mercury
  - type: SpriteMovement
    movementLayers:
      movement:
        state: mercury-walking
    noMovementLayers:
      movement:
        state: mercury
  - type: CombatMode
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: MobThresholds
    thresholds:
      0: Alive
      1500: Dead
  - type: AngerPlayerScaling
    angerScale: 1.3
    hpScale: 1.3
  - type: SpawnLootOnDeath
    deleteOnDeath: true
    table: !type:AllSelector
      children:
      - id: ORTUFO
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: FootstepModifier
    footstepSoundCollection:
      collection: CrystalStep
      params:
        volume: -5
  - type: BossMusic
    soundId: ORT
  - type: PointLight
    radius: 5
    energy: 1.5
    color: cyan
  # Actual boss from here
  - type: MegafaunaAi
    actionDelay: 0.5
    selector: !type:NestedMegafaunaSelector
      id: Mercury
  - type: EtherDrain
  - type: ActionGrant
    actions:
    - ActionORTEtherDrain
    #- ActionORTPlanktonFlood
    - ActionORTEnergyDischarge

- type: entity
  name: UFO
  id: ORTUFO
  parent: BaseORT
  description: The spider was only an empty shell. The true body was above all along.
  components:
  - type: SingularityDistortion
    intensity: 5
    falloffPower: 5
  - type: RadiationSource
    intensity: 4
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: UFO-spin
  - type: CombatMode
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
  - type: MobThresholds
    thresholds:
      0: Alive
      1500: Dead
  - type: AngerPlayerScaling
    angerScale: 1.2
    hpScale: 1.1
  - type: SpawnLootOnDeath
    deleteOnDeath: true
    table: !type:AllSelector
      children:
      - id: ORTUFODeathAnimation
  - type: AmbientSound
    enabled: true
    volume: -5
    range: 20
    sound:
      path: /Audio/_Lavaland/Mobs/Bosses/Mercury/ufo_ambience.ogg
  - type: PointLight
    radius: 4
    energy: 1.5
    color: green
  - type: BossMusic
    soundId: ORT

- type: entity
  name: The ultimate one
  id: ORTXibalbaRanged
  parent: BaseORT
  description: Long-range weaponry analyzed. Adaptation complete.
  components:
  - type: RadiationSource
    intensity: 1
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/96x96.rsi
    layers:
    - state: mercury_ring
      drawdepth: FloorObjects
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: adapted_ranged
  - type: CombatMode
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: AngerPlayerScaling
    angerScale: 1.5
    hpScale: 1.2
  - type: SpawnLootOnDeath
    deleteOnDeath: true
    table: !type:AllSelector
      children:
      - id: DarkMatterPlankton
  - type: BossMusic
    soundId: UltimateOne
  - type: PointLight
    radius: 5
    energy: 1.5
    color: gold
  - type: TriggerOnSpawn
  - type: EmitSoundOnTrigger
    sound: /Audio/_Lavaland/Mobs/Bosses/Mercury/alien_noise.ogg

- type: entity
  name: The ultimate one
  id: ORTXibalbaMelee
  parent: BaseORT
  description: Close-quarters weaponry analyzed. Adaptation complete. 
  components:
  - type: RadiationSource
    intensity: 1
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/96x96.rsi
    layers:
    - state: mercury_ring
      drawdepth: FloorObjects
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: adapted_melee
  - type: CombatMode
  - type: MobThresholds
    thresholds:
      0: Alive
      1500: Dead
  - type: AngerPlayerScaling
    angerScale: 1.5
    hpScale: 1.2
  - type: SpawnLootOnDeath
    deleteOnDeath: true
    table: !type:AllSelector
      children:
      - id: DarkMatterPlankton
  - type: BossMusic
    soundId: UltimateOne
  - type: PointLight
    radius: 5
    energy: 1.5
    color: gold
  - type: TriggerOnSpawn
  - type: EmitSoundOnTrigger
    sound: /Audio/_Lavaland/Mobs/Bosses/Mercury/communicating.ogg
