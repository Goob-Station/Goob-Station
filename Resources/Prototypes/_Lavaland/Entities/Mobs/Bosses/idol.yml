- type: entity
  id: MobIdolChained
  parent: MobBaseIdol
  name: Chained idol
  description: Has two large horns almost as big as her head. Shoots slow moving homing projectiles that will MESS YOU UP.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/chibi.rsi
    state: wagahai
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
  - type: ProjectileBatteryAmmoProvider
    proto: ProjectileHomingDoom
    fireCost: 1
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: Gun
    projectileSpeed: 2
    fireRate: 0.2
    useKey: false
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Effects/singularity_collapse.ogg
  - type: Idol
    damageOnDeath: 5000
