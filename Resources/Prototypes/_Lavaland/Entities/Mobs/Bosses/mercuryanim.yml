- type: entity
  name: ???
  id: BaseORTAnimation
  description: The air trembles around it.
  abstract: true
  components:
  - type: Timer
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-2,1,1"
        density: 1000
        mask:
        - LargeMobMask
        layer:
        - LargeMobLayer

- type: entity
  id: ORTFormingAnimation
  parent: BaseORTAnimation
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: mercury-forming
  - type: TimedSpawner
    prototypes:
      - ORTForming
    chance: 1.0
    intervalSeconds: 6.5
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 6.5

- type: entity
  id: ORTCombatAnimation
  parent: BaseORTAnimation
  description: Oh no...
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: mercury-combat-forming
  - type: TimedSpawner
    prototypes:
      - ORTCombatForm
    chance: 1.0
    intervalSeconds: 1.0
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 1.0

- type: entity
  id: ORTUFODeathAnimation
  parent: BaseORTAnimation
  description: Is it finally over?
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x128.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: UFO-death
  - type: TimedSpawner
    prototypes:
      - ORTStarCell
    chance: 1.0
    intervalSeconds: 3.6
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 3.6

- type: entity
  id: ORTStarCell
  parent: BaseORTAnimation
  name: Star cell
  description: Space-time continuum analyzed. Manifesting Star Cell colony invasive entity.
  components:
  - type: PointLight
    radius: 5
    energy: 2
    color: gold
  - type: PulsingLight
    color: gold
  - type: Rotating
    rotationSpeed: 30
    increaseOvertime: true
  - type: FadingIn
    fadeInTime: 5
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/128x96.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: star_cell
  - type: TimedSpawner
    prototypes:
      - ORTXibalbaMelee # TO DO: Dynamic system yadda yadda
    chance: 1.0
    intervalSeconds: 10
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: FadingTimedDespawn
    lifetime: 15
    fadeOutTime: 5
