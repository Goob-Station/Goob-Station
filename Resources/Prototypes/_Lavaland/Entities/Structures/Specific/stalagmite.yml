- type: entity
  parent: BaseRock
  id: CrystalStalagmite1
  name: crystal formation
  description: You mite step on it.
  components:
  - type: Clickable
  - type: Sprite
    sprite: /Textures/_Lavaland/Structures/Specific/Crystal/stalagmite.rsi
    state: crystalstalagmite1
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 1000
        layer:
        - HalfWallLayer
        - Opaque
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]

