- type: entity
  id: ProjectileHomingDoom
  parent: BaseBullet
  name: Omega sphere
  description: A sphere of unimaginable power. Stay clear of it.
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Projectiles/doom_projectile.rsi
    layers:
    - state: doom_projectile
  - type: Projectile
    damage:
      types:
        Heat: 50
        Structural: 100
  - type: Trail
    color: Purple
    scale: 0.8
    frequency: 0.02
    lifetime: 0.8
    lerpTime: 0.005
    alphaLerpAmount: 0.2
    scaleLerpAmount: 0.1
    shader: unshaded
    sprite:
      sprite: /Textures/_Lavaland/Objects/Projectiles/doom_projectile.rsi
      state: doom_projectile
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: Ammo
    muzzleFlash: null
  - type: TileFrictionModifier
    modifier: 0
  - type: HomingProjectile
    homingSpeed: 400
    targetNearestPlayer: true
  - type: AmbientSound
    range: 3.5
    volume: -10
    sound:
      path: /Audio/Effects/singularity.ogg
  - type: FadingTimedDespawn
    fadeOutTime: 3
    lifetime: 7

- type: entity
  id: IdolScreamEffect
  name: WAHHH!!!!
  description: An empowering scream that hurts the ears.
  components:
  - type: Sprite
    sprite: /Textures/_Lavaland/Effects/scream.rsi
    drawdepth: Effects
    noRot: true
    layers:
    - state: scream
      shader: unshaded
  - type: TimedDespawn
    lifetime: 0.8
  - type: EmitSoundOnSpawn
    sound: 
      path: /Audio/_Lavaland/Effects/wah.ogg
      params:
        variation: 0.3
    volume: -10
    range:
  - type: IdolEmpower
    whitelist:
      components:
      - Idol
