- type: entity
  name: wooden pickaxe
  parent: Pickaxe
  id: PickaxeWood
  description: A couple strong sticks stuck together. Decent at breaking rocks.
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Weapons/Melee/wood_pickaxe.rsi
    state: pickaxe
  - type: MeleeWeapon
    heavyStaminaCost: 2
    attackRate: 0.8
    damage:
      groups:
        Brute: 5
  - type: IncreaseDamageOnWield
    damage:
      groups:
        Brute: 4
      types:
        Structural: 16
  - type: PhysicalComposition
    materialComposition:
      Wood: 500
      Cloth: 300
  - type: Construction
    graph: PickaxeWood
    node: pickaxe

