- type: entity
  parent: MaterialBase
  id: MaterialFlowersAsh
  name: ash flowers
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Cloth: 50
  - type: Stack
    stackType: FlowersAsh
    baseLayer: base
    layerStates:
    - dark_1
    - dark_2
    - dark_3
  - type: Sprite
    sprite: _Lavaland/Objects/Materials/biomaterial.rsi
    layers:
    - state: dark_1
      map: ["base"]
  - type: Appearance
  - type: Tag
    tags:
    - ClothMade
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fiber
        Quantity: 1
  - type: Edible
    requiresSpecialDigestion: true
  - type: FlavorProfile
    flavors:
    - fiber
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 2
        reagents:
        - ReagentId: Fiber
          Quantity: 2

