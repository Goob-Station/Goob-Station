- type: constructionGraph
  id: WeaponBoneAxeConstructionGraph
  start: start
  graph:
  - node: start
    edges:
    - to: incompleteAxe
      steps:
      - material: Bones
        amount: 6
        doAfter: 2
      - material: AshwoodPlank
        amount: 2
        doAfter: 2
      - material: LegionSkull
        amount: 2
        doAfter: 2
      - material: Cloth
        amount: 10
        doAfter: 5
  - node: incompleteAxe
    entity: IncompleteBaseBallBat
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: MaterialAshwoodPlank1
        amount: 2
      - !type:SpawnPrototype
        prototype: MaterialBones1
        amount: 6
      - !type:SpawnPrototype
        prototype: MaterialLegionSkull1
        amount: 2
      - !type:SpawnPrototype
        prototype: MaterialCloth10
        amount: 1
      - !type:DeleteEntity {}
      steps:
      - tool: Cutting
        doAfter: 2
      - tool: Prying
        doAfter: 2
    - to: axe
      completed:
      - !type:AdminLog
        message: "Construction"
        impact: High
      steps:
      - tool: Slicing
        doAfter: 6
  - node: axe
    entity: WeaponBoneAxe

- type: constructionGraph
  id: DaggerBoneConstructionGraph
  start: start
  graph:
  - node: start
    edges:
    - to: dagger
      steps:
      - material: Bones
        amount: 2
        doAfter: 6
  - node: dagger
    entity: DaggerBone
