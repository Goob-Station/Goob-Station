- type: entity
  id: ActionBaseORT
  parent: BaseAction
  name: spider of mercury action
  abstract: true
  components:
  - type: Action
    priority: -21
    useDelay: 2
    icon:
      sprite: _Lavaland/Effects/plankton.rsi
      state: plankton
    itemIconStyle: NoItem
  - type: TargetAction
    checkCanAccess: false
    range: 30

- type: entity
  parent: ActionBaseORT
  id: ActionORTEtherDrain
  name: Ether Drain
  description: ██□■■■ □□□▣▣ ▢■■□
  components:
  - type: AngerDelayAction
    minDelay: 8
    maxDelay: 20
  - type: InstantAction
    event: !type:EtherDrainEvent

- type: entity
  parent: ActionBaseORT
  id: ActionORTPlanktonFlood
  name: Plankton Flood
  description:  ■■ ■■□□▣ █□■■■□
  components:
  - type: AngerDelayAction
    minDelay: 10
    maxDelay: 20
  - type: InstantAction
    event: !type:AddComponentActionEvent
      targetComponent:
        - type: VicinitySpawner
          spawnInterval: 2
          numberToSpawn: 4
          offsetForSpawn: 8
          prototype:
            - DarkMatterPlankton
      timeToRemoval: 8
      removeAfterTimer: true

