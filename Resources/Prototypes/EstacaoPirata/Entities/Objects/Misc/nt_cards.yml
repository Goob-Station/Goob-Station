  parent: CardBaseNanotrasen
  categories: [ HideSpawnMenu ]
  id: CardScJokerNanotrasen
  components:
  - type: Card
    name: card-sc-joker
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: joker
    drawdepth: SmallObjects
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
  - type: ThrowingAngle
    angularVelocity: true # spins
  - type: ThrowableBlocked # Goobstation
  - type: LandAtCursor
  - type: DamageOtherOnHit
    ignoreResistances: true
    damage:
      types:
        Slash: 0.1
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 4
        reagents:
        - ReagentId: Bananadine
          Quantity: 1.5
        - ReagentId: Honk
          Quantity: 0.5
        - ReagentId: Laughter
          Quantity: 2
  - type: SolutionRegeneration
    solution: injector
    duration: 0.25
    generated:
      reagents:
      - ReagentId: Bananadine
        Quantity: 1.5
      - ReagentId: Honk
        Quantity: 0.5
      - ReagentId: Laughter
        Quantity: 2
  - type: SolutionInjectWhileEmbedded
    transferAmount: 4
    updateInterval: 0.1
    maxInjections: 1
    solution: injector
    pierceArmor: false
# endregion Nanotrasen Cards
