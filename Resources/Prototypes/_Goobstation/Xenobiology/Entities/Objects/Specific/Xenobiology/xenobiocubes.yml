
- type: entity
  parent: BoxCardboard
  name: boîte de cubes de slime
  id: SlimeCubeBox
  description: Cubes de slime de marque Drymate. Il suffit d'ajouter de l'eau !
  components:
  - type: StorageFill
    contents:
      - id: SlimeCubeWrapped
        amount: 9
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box_variant
    
- type: entity
  parent: BoxCardboard
  name: boîte de cubes de slime syndiqués
  id: SlimeCubeBoxSyndie
  description: Cubes de slime de marque Interdyne. Il suffit d'ajouter de l'eau !
  components:
  - type: StorageFill
    contents:
      - id: SlimeCubeWrappedSyndie
        amount: 9
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/syndiecubes.rsi
    state: box

- type: entity
  parent: BaseWrappedCube
  name: cube de slime emballé
  id: SlimeCubeWrapped
  description: Déballez-le pour obtenir un cube de slime.
  components:
  - type: SpawnItemsOnUse
    items:
    - id: SlimeCube
  - type: Sprite
    state: wrapper

- type: entity
  parent: BaseWrappedCube
  name: cube de slime syndiqué emballé
  id: SlimeCubeWrappedSyndie
  description: Déballez-le pour obtenir un cube de slime.
  components:
    - type: SpawnItemsOnUse
      items:
        - id: SlimeCube
    - type: Sprite
      sprite: _Goobstation/Objects/Misc/syndiecubes.rsi
      state: wrapper

- type: entity
  parent: RehydratableAnimalCube
  id: SlimeCube
  name: cube de slime
  components:
    - type: Rehydratable
      possibleSpawns:
        - MobSlimeXenobioBabyGrey
        - MobSlimeXenobioBabyPurple
        - MobSlimeXenobioBabyBlue
