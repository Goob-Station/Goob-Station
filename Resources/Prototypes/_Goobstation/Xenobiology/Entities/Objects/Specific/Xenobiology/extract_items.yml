- type: entity
  id: XenobioVolatileOrgan
  parent: [ OrganHumanHeart, BasePowerCell ]
  name: organe volatil
  description: Une masse de slime pulsante qui semble réagir aux appareils proches.
  suffix: Plein
  components:
  - type: Sprite
    layers:
      - sprite: _Goobstation/Xenobiology/Specific/Xenobiology/volatile_organ.rsi
        state: icon
  - type: Item
    size: Normal
  - type: Battery
    pricePerJoule: 0.15
    maxCharge: 5200
    startingCharge: 5200
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 40
  - type: EmpImmune
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 15
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Slime
        Quantity: 15
  - type: Organ
    onAdd:
    - type: LightningArcShooter
      arcDepth: 1
      maxLightningArc: 3
      shootMinInterval: 90
      shootMaxInterval: 300
      shootRange: 5
      lightningPrototype: Lightning
    intCap: 32
    integrity: 32
    integrityThresholds:
      Normal: 32
      Damaged: 9
      Destroyed: 0
  - type: Metabolizer
    maxPoisonsProcessable: 2
    metabolizerTypes: [ Cybernetic ]
    groups:
    - id: Medicine
      rateModifier: 0.4
    - id: Poison
      rateModifier: 4.0
    - id: Narcotic
      rateModifier: 0.55
  - type: Tag
    tags:
    - PowerCell
    - DroneUsable
    - Organ

- type: entity
  name: balle de glu
  parent: [ BaseItem, ItemHeftyBase ]
  id: XenobioGoopBall
  description: Moins gluant qu'il n'y paraît. Avéré aussi efficace que l'holofan pour capturer les flammes. Hurlements inclus !
  components:
  - type: Sprite
    layers:
      - sprite: _Goobstation/Xenobiology/Specific/Xenobiology/goo_ball.rsi
        state: icon
  - type: Item
    size: Normal
  - type: Damageable
    damageContainer: Biological
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 0.1
    damage:
      types:
        Blunt: 1
    soundHit:
      collection: desecration
  - type: UseDelay
    delay: 0.5
  - type: EmitSoundOnUse
    sound:
      collection: desecration
      params:
        variation: 0.125
  - type: EmitSoundOnLand
    sound:
      collection: desecration
      params:
        variation: 0.125
  - type: EmitSoundOnCollide
    sound:
      collection: desecration
      params:
        variation: 0.125
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: desecration
      - !type:SpawnEntitiesBehavior
        spawn:
          XenoGooWall:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: FloorTileItemBase
  name: carré de moquette bleue ajustée
  id: FloorTileItemBluespace
  components:
  - type: Sprite
    sprite: _Goobstation/Xenobiology/Specific/Xenobiology/floors.rsi
    state: icon-bluespace
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface
  - type: SpawnAfterInteract
    prototype: FloorBluespaceEntity
    removeOnInteract: true
  - type: FloorTile
    outputs:
    - Plating
  - type: Stack
    stackType: FloorTileItemBluespace

- type: entity
  parent: FloorTileItemBase
  name: carré de moquette sépia ajustée
  id: FloorTileItemSepia
  components:
  - type: Sprite
    sprite: _Goobstation/Xenobiology/Specific/Xenobiology/floors.rsi
    state: icon-sepia
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface
  - type: SpawnAfterInteract
    prototype: FloorSepiaEntity
    removeOnInteract: true
  - type: FloorTile
    outputs:
    - Plating
  - type: Stack
    stackType: FloorTileItemSepia

- type: entity
  parent: BaseItem
  id: XenobioVolatileRedExtractJelly
  name: gelée de slime rouge volatile
  description: L'utiliser sur un vêtement semble supprimer tout ralentissement potentiel. Cependant, les porteurs de tels vêtements ont été carbonisés après qu'un scientifique a allumé sa cigarette.
  components:
  - type: Sprite
    layers:
    - sprite: _Goobstation/Xenobiology/Specific/Xenobiology/extract_jellies.rsi
      state: jelly
      color: "#ff3333"
  - type: ClothingCoating
    coatingName: clothing-coating-xenobio-volatile
    components:
    - type: VeryFlammable
    - type: SpeedModifierImmunity

- type: entity
  parent: BaseItem
  id: XenobioAdamantineBar
  name: lingot d'adamantine
  description: Théoriquement, si vous en vendiez quelques-uns, vous n'auriez plus jamais besoin de travailler sur la station. Ça doit avoir son utilité, vu le prix exorbitant. Mais laquelle ?
  components:
  - type: Sprite
    sprite: _Goobstation/Xenobiology/Specific/Xenobiology/adamantine_bar.rsi
    state: icon
  - type: StaticPrice
    price: 10000 # goida

