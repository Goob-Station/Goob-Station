- type: htnCompound
  id: XenoSlimeCompound
  branches:
  - preconditions:
    - !type:HasActiveDoAfterPrecondition
      invert: true
    tasks:
    - !type:HTNCompoundTask
      task: XenoSlimeFoodCompound
  - tasks:
    - !type:HTNCompoundTask
      task: LatchCompound
  - tasks:
    - !type:HTNCompoundTask
      task: EatCorpseCompound
  - tasks:
    - !type:HTNCompoundTask
      task: IdleCompound

- type: htnCompound
  id: XenoSlimeFoodCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyFood
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        pathfindInPlanning: true
        removeKeyOnFinish: false
        targetKey: TargetCoordinates
        pathfindKey: TargetPathfind
        rangeKey: MeleeRange
    - !type:HTNPrimitiveTask
      preconditions:
      - !type:KeyExistsPrecondition
        key: Target
      operator: !type:AltInteractOperator

- type: htnCompound
  id: LatchCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickSlimeLatchTargetOperator
        targetKey: MovementTarget
        latchKey: LatchTarget
        rangeKey: IdleRange
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        pathfindInPlanning: false
        targetKey: MovementTarget
        rangeKey: MeleeRange
    - !type:HTNPrimitiveTask
      operator: !type:SlimeLatchOperator
        latchKey: LatchTarget
    - !type:HTNPrimitiveTask
      preconditions:
      - !type:KeyExistsPrecondition
        key: IdleTime
      operator: !type:WaitOperator
        key: IdleTime

- type: htnCompound
  id: EatCorpseCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickCorpseEaterTargetOperator
        targetKey: MovementTarget
        corpseKey: CorpseTarget
        rangeKey: IdleRange
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        pathfindInPlanning: false
        targetKey: MovementTarget
        rangeKey: MeleeRange
    - !type:HTNPrimitiveTask
      operator: !type:EatCorpseOperator
        corpseKey: CorpseTarget
