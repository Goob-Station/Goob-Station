- type: entity
  id: BaseRaptor
  name: raptor
  parent: LavalandMobBase
  abstract: true
  components:
  - type: MobState
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Resomi
  - type: NoSlip
  - type: Pullable
  - type: InputMover
  - type: MobMover
  - type: NPCRetaliation
  - type: FactionException
  - type: InteractionPopup
    successChance: 0.8
    interactSuccessString: petting-success-raptor
    interactFailureString: petting-failure-raptor
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Dragon
  - type: Bloodstream
    bloodReagent: Blood
    smokeImmune: true # They live in volcano planet.
    bloodlossDamage:
      types:
        Bloodloss:
          0.5
    bloodlossHealDamage:
      types:
        Bloodloss:
          -0.25
  - type: NpcFactionMember
    factions:
    - Passive
  - type: Hunger
    startingHunger: 150
    thresholds:
      Overfed: 300
      Okay: 150
      Peckish: 50
      Starving: 10
      Dead: 0
    hungerThresholdDecayModifiers:
      Okay: 1
      Peckish: 0.2
      Starving: 0.0005 # We don't want our raptors dying from hunger.
      Dead: 0.0005
    baseDecayRate: 0.5
    starvingSlowdownModifier: 0.1
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Grammar
    gender: Epicene

- type: entity
  id: BabyRaptor
  name: baby raptor
  description: Will this grow into something useful?
  parent: BaseRaptor
  components:
  - type: Raptor
    raptorType: Red
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: Sprite
    drawdepth: Mobs
    sprite: _Goobstation/Raptors/babyraptor.rsi
    layers:
    - state: baby_red
  - type: DamageStateVisuals
    states:
      Alive:
        Base: baby_red
      Dead:
        Base: baby_red_dead
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.35
        density: 10
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      25: Dead
  - type: MeleeWeapon
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 3
  - type: MobGrowth
    currentStage: baby
    growthInterval: 20
    hungerRequired: 50
    stages:
      baby:
        nextStage: young
        sprite: baby_red
        displayName: baby
      young:
        nextStage: adult
        sprite: young_red
        displayName: young
      adult:
        sprite: raptor_red
        displayName: adult

- type: entity
  id: AdultRaptor
  name: raptor
  description: A trusty, powerful steed. Taming it might prove difficult...
  parent: BaseRaptor
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 5
    baseSprintSpeed: 5
  - type: Sprite
    drawdepth: Mobs
    sprite: _Goobstation/Raptors/raptoricebox.rsi
    layers:
    - state: raptor_red
  - type: DamageStateVisuals
    states:
      Alive:
        Base: raptor_red
      Dead:
        Base: dead_raptor_red
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.35
        density: 80
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      270: Dead
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 15
  - type: SpamEmitSound
    minInterval: 15
    maxInterval: 90
    sound:
      collection: RaptorIdle
      params:
        volume: -8
        maxDistance: 10
        variation: 0.05
  - type: Vehicle
    renderOver: East, SouthEast, South, SouthWest, West
  - type: FootstepModifier
    footstepSoundCollection:
      collection: Hardclaw
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound

