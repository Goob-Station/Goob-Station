# Base baby raptor.

- type: entity
  id: BaseBabyRaptor
  name: raptor
  description: Will this grow into something useful?
  parent: LavalandMobBase
  components:
  - type: Raptor
    raptorType: Red # default, overwritten when spawned
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: Sprite
    drawdepth: Mobs
    sprite: _Goobstation/Raptors/babyraptor.rsi
    layers:
      - state: baby_red
  - type: DamageStateVisuals
    states:
      Alive:
        Base: baby_red
      Dead:
        Base: baby_red_dead
  - type: MobState
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 10
        mask:
          - SmallMobMask
        layer:
          - SmallMobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      25: Dead
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Resomi
  - type: MeleeWeapon
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 3
  - type: NoSlip
  - type: Pullable
  - type: InputMover
  - type: MobMover
  - type: NPCRetaliation
  - type: FactionException
  - type: NpcFactionMember
    factions:
      - Passive
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Grammar
    gender: Epicene
  - type: MobGrowth
    currentStage: baby
    growthInterval: 20
    hungerRequired: 50
    stages:
      baby:
        nextStage: young
        sprite: baby_red
        displayName: baby
      young:
        nextStage: adult
        sprite: young_red
        displayName: young
      adult:
        sprite: raptor_red
        displayName: adult
