- type: entity
  parent: BaseSubdermalImplant
  id: LibrarianTranslatorImplant
  name: implant traducteur bibliothécaire
  description: Un implant permettant de comprendre et de parler la plupart des langues.
  categories: [ HideSpawnMenu ]
  components:
  - type: TranslatorImplant
    spoken:
      - TauCetiBasic # Common Languages -
      - SolCommon
      - Elyran
      - Freespeak
      - NovuNederic
      - Tradeband
      - Sign
      - SpaceItalian # Job Specific -
      - Bubblish # Species Languages -
      - Calcic
      - Canilunzt
      - Chittin
      - Gruntish
      - NewKinPidgin # = Ka'rakk
      - Marish
      - Moffic
      - Nehina
      - Nekomimetic
      - RobotTalk
      - RootSpeak
      - SiikMaas
      - Draconic # = Sinta'Unathi
      - Schechi
      - ValyrianStandard
      - YowKriol
      - Azaziba # Depricated Languages -
      - Delvahii
      - Eldritch
      - NalRasan
      - SiikTajr
      - YaSsa
      - Cheval # Animal Languages -
      - Mouse
      - Monkey
      - Kobold

    understood:
      - TauCetiBasic # Common Languages -
      - SolCommon
      - Elyran
      - Freespeak
      - NovuNederic
      - Tradeband
      - Sign
      - SpaceItalian # Job Specific -
      - Bubblish # Species Languages -
      - Calcic
      - Canilunzt
      - Chittin
      - Gruntish
      - NewKinPidgin # = Ka'rakk
      - Marish
      - Moffic
      - Nehina
      - Nekomimetic
      - RobotTalk
      - RootSpeak
      - SiikMaas
      - Draconic # = Sinta'Unathi
      - Schechi
      - ValyrianStandard
      - YowKriol
      - Azaziba # Depricated Languages -
      - Delvahii
      - Eldritch
      - NalRasan
      - SiikTajr
      - YaSsa
      - Cheval # Animal Languages -
      - Mouse
      - Monkey
      - Kobold





