- type: entity
  name: machete
  parent: [ BaseItem, BaseMajorContraband ]
  id: SlasherMachete
  description: A large, vicious looking blade.
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
    decapitation: true
  - type: Tag
    tags:
    - Machete
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Slasher/machete.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -45
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 15
    soundHit:
      path: /Audio/_Goobstation/Weapons/Melee/slashermachetehit.ogg
      params:
        volume: -6
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 30
  - type: Item
    size: Large
    storedSprite:
      state: storage
      sprite: _Goobstation/Objects/Specific/Slasher/machete.rsi
    shape:
    - 0,0,0,2
  - type: Tool
    qualities:
    - Slicing
  - type: DisarmMalus
  - type: SlasherMassacreMachete
  - type: Prying
    pryPowered: True
    speedModifier: 1.5
  - type: ThrowingAngle
    angle: 225

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatSlasherMask
  name: slasher mask
  description: A head-mounted face cover designed to protect the wearer completely from space-arc eye.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Slasher/mask.rsi
  - type: Clothing
    sprite: _Goobstation/Objects/Specific/Slasher/mask.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
  - type: Tag
    tags:
    - WhitelistChameleon
    - WeldingMask
  - type: RandomIntervalSound
    requireEquipped: True
    requireAlive: True
    sound:
      collection: SlasherBreathing
      params:
        volume: -5
        maxDistance: 8
  - type: SelfUnremovableClothing
  - type: SelfEquipOnly
    unequipRequireConscious: false
  - type: Armor
    coverage:
    - Head
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.90
        Caustic: 0.90
  - type: FaceHuggerBlocker

