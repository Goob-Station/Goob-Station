- type: entity
  parent: BaseItem
  id: DropPodspawner
  name: nacelle de largage
  description: Placez les objets que vous voulez distribuer aux joueurs dans le sac, puis activez-le au-dessus de l'endroit où vous voulez faire tomber la nacelle. Les joueurs ne peuvent pas voir la nacelle. Pour y faire entrer des êtres vivants, faites-les glisser dans la nacelle (comme pour attacher quelqu'un à une chaise).
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/DropPod/item.rsi
    state: DROPPOD
  - type: Item
    size: Ginormous
  - type: Storage
    grid:
    - 0,0,20,20
    maxItemSize: Ginormous
  - type: Visibility
    layer: 2 #ghost layer
  - type: DragInsertContainer
    containerId: clowncar_container
    entryDelay: 0
    useVerbs: false
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      clowncar_container: !type:Container
  - type: ExtendedContainer
    containerName: clowncar_container
    deleteContentsOnBreak: false
    capacity: 999
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Damageable
    damageContainer: Inorganic
  - type: TriggerOnUse
  - type: TimerTrigger
    delay: 0.9
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          SpawnSupplyEmpty:
            min: 1
            max: 1
    - trigger:
        !type:DamageTrigger
        damage: 1100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: AnchorOnTrigger
  - type: TwoStageTrigger
    keysIn:
    - timer
    triggerDelay: 1
    components:
    - type: DamageOverTime
      damage:
        types:
          Slash: 50
      interval: 0.5
      ignoreResistances: true
