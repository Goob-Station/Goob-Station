- type: entity
  name: pack piège à ours inversé
  parent: BoxCardboard
  id: BoxReverseBearTrap
  description: Une boîte pleine d'objets totalement légaux.
  components:
  - type: StorageFill
    contents:
      - id: ReverseBearTrap
        amount: 1
      - id: ReverseBearTrapKey
        amount: 1
  - type: Sprite
    sprite: _Goobstation/Objects/Storage/boxes.rsi

- type: entity
  name: boîte d'injecteur de combat
  parent: BoxCardboard
  id: BoxCombatInjector
  suffix: NE PAS PLACER
  description: Une boîte contenant un injecteur de combat et quelques produits chimiques de soin.
  components:
  - type: StorageFill
    contents:
      - id: CombatInjector
        amount: 1
      - id: TirimolChemistryVial
        amount: 1
      - id: OmnizineChemistryVial
        amount: 1
      - id: SyriniverChemistryVial
        amount: 1
      - id: ProcenylLazideChemistryVial
        amount: 1
      - id: EbifinlLazideChemistryVial
        amount: 1
  - type: Sprite
    sprite: _Goobstation/Objects/Storage/boxes.rsi

- type: entity
  name: boîte de cartouches d'auto-injecteur
  parent: BoxCardboard
  id: BoxAutoinjectorCartidges
  description: Une boîte avec des cartouches d'auto-injecteur.
  components:
  - type: StorageFill
    contents:
    - id: CartridgeSaline
      amount: 3
    - id: CartridgeBicaridine
      amount: 3
    - id: CartridgeDermaline
      amount: 3
  - type: Sprite
    sprite: _Goobstation/Objects/Storage/boxes.rsi
