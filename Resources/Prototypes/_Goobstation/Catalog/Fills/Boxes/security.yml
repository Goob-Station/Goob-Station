- type: entity
  name: boîte de traceurs
  parent: [BoxCardboard, BaseSecurityContraband]
  id: BoxTracker
  description: Une boîte contenant quelques traceurs.
  components:
  - type: StorageFill
    contents:
    - id: TrackingImplanter # Todo - Replace with biochip?
      amount: 4
  - type: Sprite
    layers:
    - state: box

- type: entity
  name: boîte d'injections létales
  parent: [BoxCardboard, BaseSecurityContraband]
  id: BoxLethalInjection
  description: Une boîte contenant plusieurs seringues d'injection létale.
  components:
  - type: StorageFill
    contents:
    - id: SyringePoisonLethalInjection
      amount: 3
  - type: Sprite
    layers:
    - state: box

- type: entity
  name: boîte de grenades matraque 40mm
  parent: [BoxCardboard, BaseSecurityContraband]
  id: BoxGrenadesBaton
  description: Une boîte contenant huit grenades matraque 40mm pour étourdir des cibles individuelles.
  components:
  - type: StorageFill
    contents:
    - id: GrenadeBaton
      amount: 8
  - type: Storage
    grid:
    - 0,0,3,3
    whitelist:
      tags:
      - Grenade

- type: entity
  name: boîte de grenades flash 40mm
  parent: [BoxCardboard, BaseSecurityContraband]
  id: BoxGrenadesFlash
  description: Une boîte contenant huit grenades flash 40mm pour étourdir des cibles en masse.
  components:
  - type: StorageFill
    contents:
    - id: GrenadeFlash
      amount: 8
  - type: Storage
    grid:
    - 0,0,3,3
    whitelist:
      tags:
      - Grenade

- type: entity
  name: boîte de grenades lacrymogènes 40mm
  parent: [BoxCardboard, BaseSecurityContraband]
  id: BoxGrenadesTeargas
  description: Une boîte contenant huit grenades lacrymogènes 40mm pour disperser efficacement les émeutes.
  components:
  - type: StorageFill
    contents:
    - id: GrenadeTeargas
      amount: 8
  - type: Storage
    grid:
    - 0,0,3,3
    whitelist:
      tags:
      - Grenade

