      amount: 1
    - id: FoodBoxPizzaBomb
      amount: 2
    - id: FoodBoxPizzaFilled
      amount: 2
    - id: FoodBoxPizzaBomb
      amount : 1
    - id: FoodBoxPizzaCotton
      amount : 1
    - id: FoodBoxPizzaBomb
      amount : 2
    - id: FoodBoxPizzaFilled
      amount: 2
    - id: FoodBoxPizzaBomb
      amount : 2
    - id: FoodBoxPizzaFilled
      amount: 1
    - id: FoodBoxPizzaBomb
      amount: 1
    - id: FoodBoxPizzaFilled
      amount: 1
    - id: LidSalami
      prob: 0.01

- type: entity
  parent: [ BaseStructureDynamic, BaseSetSelector, BaseSyndicateContraband ]
  id: CrateSyndicateUndetermined # Not actually a crate, just looks like one
  name: caisse de paquet Syndiqué indéterminé
  description: Contient un paquet Syndiqué. Lequel reste à déterminer.
  components:
  - type: Icon
    sprite: Structures/Storage/Crates/syndicate.rsi
    state: icon
  - type: Sprite
    noRot: true
    sprite: Structures/Storage/Crates/syndicate.rsi
    layers:
    - state: icon
  - type: SetSelector
    possibleSets:
    - SyndicateWesternSet
    - SyndicateSpySet
    - SyndicateHitmanSet
    - SyndicateImplantsSet
    - SyndicateHackerSet
    - SyndicateDeswordSet
    - SyndicateGrenadierSet
    - SyndicateFluclearSet
    - SyndicateFriendshipSet
    - SyndicateCarpSet
    - SyndicateSusSet
#    - SyndicateBuilderSet - Requires Rework pending Miner Removal
    setsToSelect: 3
    spawnedStoragePrototype: CrateSyndicate
    spawnedStorageContainer: entity_storage
    openSpawnedStorage: true
    approveSound:
      path: /Audio/Effects/closetopen.ogg
  - type: InteractionOutline
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.29"
        density: 50
        mask:
        - CrateMask
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 5000

