- type: entity
  id: CrateFunATV
  parent: CrateLivestock
  name: caisse d'ATV
  description: Un Véhicule Absolument Taxable pour aider le cargo avec ses transports.
  components:
  - type: StorageFill
    contents:
      - id: VehicleATV
      - id: VehicleKeyATV

- type: entity
  id: CrateFunSyndicateSegway
  parent: CrateLivestock
  name: caisse de segway syndiqué
  description: Une caisse contenant un deux-roues qui vous aidera à fuir les officiers de sécurité. Ou pas.
  components:
    - type: StorageFill
      contents:
        - id: VehicleSyndicateSegway
        - id: VehicleKeySyndicateSegway


- type: entity
  id: CrateFunBingleLoot
  parent: CrateBingle
  name: butin de bingle
  components:
  - type: StorageFill
    contents:
    - id: PlushieBingle
      amount: 3
    - id: PlushieBingleSmall
    - id: PlushieBongle
    - id: PlushieBingleYakub
    - id: PlushieBinglePony

- type: entity
  id: CrateFunBingleAdmeme
  parent: CrateBingle
  suffix: caisse à bingle déclenchée par la voix d'un adminmème
  name: Bingle
  components:
  - type: SpawnOnTrigger
    proto: MobBingle
  - type: TriggerOnVoice
    keyPhrase: Bingle
  - type: ActiveListener
    range: 4

- type: entity
  id: CrateFunDiscoBeachBall
  parent: CrateGenericSteel
  name: caisse de ballon de plage disco
  description: Une caisse contenant un ballon de plage disco qui transforme n'importe quelle plage en Studio 54.
  components:
  - type: StorageFill
    contents:
    - id: DiscoBeachBall
      amount: 1

- type: entity
  id: CrateWizardAnomCore
  name: Caisse d'Enchantement
  description: Une boîte contenant des noyaux d'anomalie volés, utilisés pour enchanter.
  parent: CratePirate
  components:
  #ONLY contains anomalies with enchantcomp.
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: RandomAnomalyCoreEnchantTable 
        - !type:NestedSelector
          tableId: RandomAnomalyCoreInertEnchantTable
          rolls: 2

- type: entityTable
  id: RandomAnomalyCoreEnchantTable
  table: !type:GroupSelector
    children:
    - id: AnomalyCorePyroclastic
    - id: AnomalyCoreGravity
    - id: AnomalyCoreIce
    - id: AnomalyCoreFlesh
    - id: AnomalyCoreRock
    - id: AnomalyCoreLiquid
    - id: AnomalyCoreElectricity
    - id: AnomalyCoreFlora
    - id: AnomalyCoreSanta

- type: entityTable
  id: RandomAnomalyCoreInertEnchantTable
  table: !type:GroupSelector
    children:
    - id: AnomalyCorePyroclasticInert
    - id: AnomalyCoreGravityInert
    - id: AnomalyCoreIceInert
    - id: AnomalyCoreFleshInert
    - id: AnomalyCoreRockInert
    - id: AnomalyCoreLiquidInert
    - id: AnomalyCoreElectricityInert
    - id: AnomalyCoreFloraInert
    - id: AnomalyCoreSantaInert
