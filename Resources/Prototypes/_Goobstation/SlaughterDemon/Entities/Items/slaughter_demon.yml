- type: entity
  name: fiole de chatouilles
  id: BottleOfTickles
  parent: [BaseItem, BaseMagicalContraband]
  description: Une bouteille magiquement infusée d'amour de clown, distillée d'innombrables attaques de câlins. Utilisée dans de drôles de rituels pour attirer de mignonnes créatures.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/vials.rsi
    state: vialtickles
  - type: SolutionContainerManager
    solutions:
      liquid:
        maxVol: 15
        reagents:
        - ReagentId: Laughter
          Quantity: 15
  - type: ExaminableSolution
    solution: liquid
  - type: Item
    size: Tiny
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: liquid
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 0
            max: 1
      - !type:AddGameRuleBehavior
        rule: LaughterDemonSummon
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  name: fiole de sang
  id: BottleOfBlood
  parent: BottleOfTickles
  description: Une bouteille magiquement infusée de sang, distillée d'innombrables victimes de meurtre. Utilisée dans des rituels impies pour attirer des créatures horrifiques.
  components:
  - type: Sprite
    state: vial
  - type: SolutionContainerManager
    solutions:
      liquid:
        maxVol: 15
        reagents:
        - ReagentId: Blood
          Quantity: 15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: liquid
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 0
            max: 1
      - !type:AddGameRuleBehavior
        rule: SlaughterDemonSummon
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: VialSummon
