- type: entity
  id: BloodCrawlAction
  name: Saut de Sang
  description: SAUTEZ N'IMPORTE OÙ QUAND VOUS ÊTES SUR DU SANG
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon:
      sprite: _Goobstation/SlaughterDemon/abilities.rsi
      state: crawl
    useDelay: 4
  - type: InstantAction
    event: !type:BloodCrawlEvent

- type: entity
  id: DemonicWhisperAction
  name: Chuchotement Démoniaque
  description: ENVOYEZ UN MESSAGE À LEUR ÂME, DEPUIS L'ENFER
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    raiseOnUser: true
    icon:
      sprite: _Goobstation/SlaughterDemon/abilities.rsi
      state: whisper
    itemIconStyle: NoItem
  - type: TargetAction
    interactOnMiss: false
    range: 15
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:DemonicWhisperEvent