- type: entity
  id: Pentagram
  name: pentagramme
  parent: Acidifier
  description: Un cercle d'invocation diabolique.
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Effects/pentagram.rsi
    drawdepth: BelowMobs
    noRot: true
    layers:
    - state: pentagram
      shader: unshaded
  - type: Transform
    anchored: False
  - type: TimedDespawn
    lifetime: 5
  - type: PointLight
    color: Red
    radius: 3
    energy: 2
    netsync: false

- type: entity
  id: PentagramHellHand
  parent: Pentagram
  name: pentagramme & main
  description: Un cercle d'invocation diabolique avec une main tout aussi diabolique.
  components:
  - type: SpawnOnDespawn
    prototype: HellHand
