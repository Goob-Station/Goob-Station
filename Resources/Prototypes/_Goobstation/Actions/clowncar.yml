- type: entity
  parent: BaseAction
  id: ActionThankDriver
  name: Remercier le conducteur
  description: Montrez au conducteur que vous appréciez être passager
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Objects/Vehicles/clowncar.rsi
      state: clowncar
    useDelay: 60
  - type: InstantAction
    event: !type:ThankRiderActionEvent

- type: entity
  parent: BaseAction
  id: ActionQuietBackThere
  name: Du calme là-derrière
  description: Dites aux passagers de se taire
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Objects/Vehicles/clowncar.rsi
      state: clowncar
    useDelay: 30
  - type: InstantAction
    event: !type:QuietBackThereActionEvent

- type: entity
  parent: BaseAction
  id: ActionDrivingWithStyle
  name: JukeBox
  description: Conduisez avec de la musique
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Structures/Machines/jukebox.rsi
      state: "on"
    useDelay: 1
  - type: InstantAction
    event: !type:DrivingWithStyleActionEvent
