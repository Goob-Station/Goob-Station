- type: entity
  parent: BaseAction
  id: ActionOpenCameraWarpMenu
  name: Sauter vers une caméra
  description: Sautez rapidement vers une caméra de la station pour faciliter la navigation !
  components:
  - type: Action
    checkConsciousness: false
    checkCanInteract: false
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: camera_jump
  - type: InstantAction
    event: !type:ToggleCameraWarpScreenEvent
