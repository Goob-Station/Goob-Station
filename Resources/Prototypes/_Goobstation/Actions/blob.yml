- type: entity
  parent: BaseAction
  id: ActionCreateBlobFactory
  name: Placer une Tuile Usine (80)
  description: Transforme la tuile de blob normale sélectionnée en tuile usine, qui produira jusqu'à 3 spores et un blobbernaut si placée à côté d'un noyau ou d'un nœud.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobFactory
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobTransformTileActionEvent
      transformFrom: Normal
      tileType: Factory

- type: entity
  parent: BaseAction
  id: ActionCreateBlobResource
  name: Placer une Tuile Ressource (60)
  description: Transforme la tuile de blob normale sélectionnée en tuile ressource qui génèrera des ressources si placée à côté d'un noyau ou d'un nœud.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobResource
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobTransformTileActionEvent
      transformFrom: Normal
      tileType: Resource

- type: entity
  parent: BaseAction
  id: ActionCreateBlobNode
  name: Placer une Tuile Nœud (50)
  description: Transforme la tuile de blob normale sélectionnée en tuile nœud. Une tuile nœud active les effets des tuiles usine et ressource, soigne les autres blobs et s'étend lentement, détruisant les murs et créant des blobs normaux.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobNode
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobTransformTileActionEvent
      transformFrom: Normal
      tileType: Node

- type: entity
  parent: BaseAction
  id: ActionCreateBlobbernaut
  name: Produire un Blobbernaut (60)
  description: Crée un blobbernaut sur l'usine sélectionnée. Chaque usine ne peut le faire qu'une seule fois. Le blobbernaut subira des dégâts en dehors des tuiles de blob et se soignera près des nœuds.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobBlobbernaut
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobCreateBlobbernautActionEvent    

- type: entity
  parent: BaseAction
  id: ActionSplitBlobCore
  name: Diviser le Noyau (400)
  description: Vous ne pouvez le faire qu'une seule fois. Transforme le nœud sélectionné en noyau indépendant qui agira seul.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobSplit
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobSplitCoreActionEvent

- type: entity
  parent: BaseAction
  id: ActionSwapBlobCore
  name: Déplacer le Noyau (200)
  description: Échange la position de votre noyau et du nœud sélectionné.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobSwap
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobSwapCoreActionEvent

- type: entity
  parent: BaseAction
  id: ActionTeleportBlobToCore
  name: Sauter au Noyau
  description: Vous téléporte vers votre Noyau de Blob.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobToCore
    itemIconStyle: BigAction
    useDelay: 0.5
  - type: InstantAction
    event: !type:BlobToCoreActionEvent

- type: entity
  parent: BaseAction
  id: ActionSwapBlobChem
  name: Changer de produit chimique (70)
  description: Vous permet de changer votre produit chimique actuel.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobChemSwap
    useDelay: 0.5
  - type: InstantAction
    event: !type:BlobSwapChemActionEvent

- type: entity
  parent: BaseAction
  id: ActionTransformToBlob
  name: Se transformer en blob
  description: Détruit instantanément votre corps et crée un noyau de blob. Assurez-vous d'être sur une tuile de sol, sinon vous disparaîtrez simplement.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobToCore
  - type: InstantAction
    event: !type:TransformToBlobActionEvent

- type: entity
  parent: BaseAction
  id: ActionDowngradeBlob
  name: Rétrograder le blob
  description: Ramène la tuile sélectionnée à un blob normal pour installer d'autres types de structures.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Blob/Actions/blob.rsi
      state: blobDowngrade
    useDelay: 0.5
    itemIconStyle: BigAction
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:BlobTransformTileActionEvent
      transformFrom: Invalid
      tileType: Normal
