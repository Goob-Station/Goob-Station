- type: entity
  parent: BaseAction
  id: ActionInvisibleBlockade
  name: Barricade invisible
  description: Formez une barricade invisible large de trois cases.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 60
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Actions/mime.rsi
      state: invisible_blockade
  - type: InstantAction
    event: !type:InvisibleBlockadeActionEvent
  - type: AdvancedMimeryAction

- type: entity
  parent: BaseAction
  id: ActionFingerGuns
  name: Pistolets à doigts
  description: Tirez jusqu'à trois balles mimées depuis vos doigts qui endommagent et rendent muettes leurs cibles. Impossible à utiliser si vous avez quelque chose dans les mains.
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 0.25 # use delay is controlled by FingerGunsActionComponent
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Actions/mime.rsi
      state: finger_guns
  - type: TargetAction
    checkCanAccess: false
    repeat: true
    interactOnMiss: false
    range: 20
  - type: EntityTargetAction
    canTargetSelf: false
  - type: WorldTargetAction
    event: !type:FingerGunsActionEvent
      prototype: BulletMime
  - type: AdvancedMimeryAction
  - type: FingerGunsAction
