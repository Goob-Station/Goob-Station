- type: entity
  parent: BaseAction
  id: ActionClothingSeal
  name: Sceller les vêtements
  description: Scelle vos vêtements actuels.
  categories: [ HideSpawnMenu ]
  components:
  - type: ConfirmableAction
    confirmDelay: 0
    primeTime: 2
  - type: Action
    checkCanInteract: true
    checkConsciousness: true
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/modsuit.rsi
      state: activate
    iconOn:
      sprite: _Goobstation/Actions/modsuit.rsi
      state: activate-ready
  - type: InstantAction
    event: !type:SealClothingEvent {}


- type: entity
  parent: BaseAction
  id: ActionActivateProjector
  name: Basculer le Clone
  description: Génère ou dissipe votre gémeaux connecté.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    checkCanInteract: false
    checkConsciousness: true
    itemIconStyle: NoItem
    icon:
      sprite: Mobs/Silicon/station_ai.rsi
      state: default
  - type: InstantAction
    event: !type:CloneProjectorActivatedEvent {}

- type: entity
  parent: BaseAction
  id: ActionHailer
  name: Héler
  description: Hélez audiblement l'équipage proche, utile pour donner des ordres rapides.
  components:
  - type: Action
    icon: { sprite: Clothing/Mask/gassecurity.rsi, state: icon }
  - type: InstantAction
    event: !type:HailerActionEvent
