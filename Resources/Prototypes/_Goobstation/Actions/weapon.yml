- type: entity
  parent: BaseAction
  id: ActionLegSweep
  name: Balayage de Jambe
  description: Fauche les jambes d'une cible pour la faire tomber quelques secondes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: legsweep
  - type: Sprite # For guidebook
    sprite: _Goobstation/Actions/kravmaga.rsi
    state: legsweep
  - type: InstantAction
    event: !type:KravMagaActionEvent { }
  - type: KravMagaAction
    configuration: LegSweep
    name: Leg Sweep

- type: entity
  parent: BaseAction
  id: ActionNeckChop
  name: Hachoir de Nuque
  description: Un coup dur avec le tranchant de la main inflige quelques dégâts et prive la cible de parole pendant vingt secondes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: neckchop
  - type: Sprite # For guidebook
    sprite: _Goobstation/Actions/kravmaga.rsi
    state: neckchop
  - type: InstantAction
    event: !type:KravMagaActionEvent { }
  - type: KravMagaAction
    configuration: NeckChop
    name: Neck Chop
    effectTime: 20

- type: entity
  parent: BaseAction
  id: ActionLungPunch
  name: Coup de Poing au Poumon
  description: Inflige 30 dégâts d'endurance et empêche de respirer pendant dix secondes. Quatre de ces coups incapacitent une cible de façon non létale, mais attention à la perte de souffle infligée.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 0.5
    icon:
      sprite: _Goobstation/Actions/kravmaga.rsi
      state: lungpunch
  - type: Sprite # For guidebook
    sprite: _Goobstation/Actions/kravmaga.rsi
    state: lungpunch
  - type: InstantAction
    event: !type:KravMagaActionEvent { }
  - type: KravMagaAction
    configuration: LungPunch
    name: Lung Punch
    staminaDamage: 40
    effectTime: 10
