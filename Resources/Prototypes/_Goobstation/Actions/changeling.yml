## capacités

# de départ
- type: entity
  parent: BaseAction
  id: ActionEvolutionMenu
  name: Ouvrir le menu d'évolution
  description: Ouvre le menu d'évolution.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Changeling/changeling_abilities.rsi
      state: evolution_menu
  - type: InstantAction
    event: !type:OpenEvolutionMenuEvent {}
  - type: ChangelingAction
    useOnFire: true
    useInLesserForm: true
    useInLastResort: true

- type: entity
  parent: BaseAction
  id: ActionAbsorbDNA
  name: Absorber l'ADN
  description: Absorbe l'ADN de la cible, la transformant en enveloppe vide. Coûte 25 produits chimiques.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 5
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Changeling/changeling_abilities.rsi
      state: absorb_dna
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - Body
    canTargetSelf: false
    event: !type:AbsorbDNAEvent {}
  - type: ChangelingAction
    useInLesserForm: true
  - type: InternalResourcesAction
    resourceProto: ChangelingChemicals
    useAmount: 25

