# Spécifique au Diable

- type: entity
  parent: BaseAction
  id: ActionCreateContract
  name: Invoquer un contrat infernal
  description: Crée un contrat infernal dans la main du Diable.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: summon-contract
  - type: InstantAction
    event: !type:CreateContractEvent {}

- type: entity
  parent: BaseAction
  id: ActionCreateRevivalContract
  name: Invoquer un contrat de résurrection
  description: Crée un contrat de résurrection dans la main du Diable.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: summon-contract-revival
  - type: InstantAction
    event: !type:CreateRevivalContractEvent {}

- type: entity
  parent: BaseAction
  id: ActionShadowJaunt
  name: Fuite dans l'ombre
  description: Fondez dans les ombres.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 40 # Stop running you cowardly fucks.
    itemIconStyle: NoItem
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: shadow-jaunt
  - type: InstantAction
    event: !type:ShadowJauntEvent {}

- type: entity
  parent: BaseAction
  id: ActionDevilPossess
  name: Posséder la cible
  description: Possède temporairement une cible.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 70
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: possess
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - Body
    event: !type:DevilPossessionEvent {}

- type: entity
  parent: BaseAction
  id: ActionEndPossession
  name: Terminer la possession
  description: Annulez cette possession prématurément.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: possess
  - type: InstantAction
    event: !type:EndPossessionEarlyEvent {}

- type: entity
  parent: BaseAction
  id: ActionDevilGrip
  name: Emprise du Diable
  description: Le peu de pouvoir qui vous reste dans ce monde, canalisé dans vos mains.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: devil-grip
  - type: InstantAction
    event: !type:DevilGripEvent {}

# Pactes

- type: entity
  parent: BaseAction
  id: ActionCheatDeath
  name: Tricher la Mort
  description: Riez au nez de la Faucheuse. Vous avez encore du temps.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 250
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: cheat-death
  - type: InstantAction
    event: !type:CheatDeathEvent {}
