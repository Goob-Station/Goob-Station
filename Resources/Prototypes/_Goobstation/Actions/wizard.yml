- type: entity
  parent: BaseAction
  id: ActionBindSoul
  name: Lier l'Âme
  description: Liez votre âme à un objet pour ressusciter après la mort. Si votre âme est déjà liée à un objet et que vous êtes mort, tentez une résurrection.
  components:
  - type: Action
    raiseOnUser: true
    checkCanInteract: false
    checkConsciousness: false
    allowGhostAction: true
    useDelay: 1
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wizard/actions.rsi
      state: skeleton
  - type: InstantAction
    event: !type:BindSoulEvent
      sound: !type:SoundPathSpecifier
        path: /Audio/_Goobstation/Wizard/pope_entry.ogg
      blacklist:
        components:
        - MobState
        - NukeDisk
        - VirtualItem
        - Body
        - BodyPart
        - Organ
        - TimedDespawn
        - FadingTimedDespawn
        - Godmode
        - DeleteOnDropAttempt
        - EnchantedBoltActionRifle
        - Phylactery
  - type: SpeakOnAction
    sentence: action-speech-spell-bind-soul
  - type: Magic
    requiresSpeech: true
    blockedBySpectral: false
    school: Necromancy
  - type: Tag
    tags:
      - BindSoulAction

