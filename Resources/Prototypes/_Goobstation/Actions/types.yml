- type: entity
  parent: BaseSuicideAction
  id: ActionActivateBluespaceLifeline
  name: Activer la Ligne de Vie Bleue
  description: Active votre implant de ligne de vie bleue, vous téléportant très loin de cette station. Vous ne pourrez pas revenir.
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: _Goobstation/Effects/bluespace_lifeline.rsi
      state: bluespace_lifeline
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  parent: BaseAction
  id: ActionHorn
  name: Klaxon !
  description: Klaxonnez sur quiconque vous allez renverser.
  components:
  - type: Action
    useDelay: 1
    icon: { sprite: Objects/Fun/bikehorn.rsi, state: icon }
  - type: InstantAction
    event: !type:HornActionEvent

- type: entity
  parent: BaseAction
  id: ActionSiren
  name: Sirène
  description: Alertez votre victime de votre présence.
  components:
  - type: Action
    useDelay: 1
    icon: { sprite: Objects/Fun/bikehorn.rsi, state: icon }
  - type: InstantAction
    event: !type:SirenActionEvent

- type: entity
  parent: BaseImplantAction
  id: ActivateSmokeImplant
  name: Libérer un nuage de fumée
  description: Libère un nuage de fumée autour de vous.
  components:
  - type: Action
    useDelay: 30
    icon:
      sprite: Objects/Weapons/Grenades/smoke.rsi
      state: icon

- type: entity
  parent: BaseAction
  id: ActionDashMoth
  name: Ruée alaire
  description: Battez vivement des ailes pour vous élancer sur le côté !
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 6.5
    icon: { sprite: _Goobstation/Actions/dash.rsi, state: icon }
    itemIconStyle: NoItem
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Effects/moth_wings.ogg
      params:
        volume: 6.5
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:DashActionEvent
      staminaDrain: 30


- type: entity
  id: ActionDashGeneric
  name: Ruée
  parent: ActionDashMoth
  description: Ruez-vous vers l'avant.
  components:
  - type: Action
    useDelay: 6.5
    icon: { sprite: _Goobstation/Actions/dash.rsi, state: icon }
    itemIconStyle: NoItem
    sound: !type:SoundPathSpecifier
      path: /Audio/Effects/thudswoosh.ogg
      params:
        volume: 6.5

- type: entity
  parent: BaseAction
  id: ActionToggleRightMantisBlade
  name: Basculer la Lame Mantis Droite
  description: Déployer ou rétracter la lame mantis dans votre bras droit.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 2
    icon: { sprite: _Goobstation/Objects/Weapons/Melee/mantis_blade.rsi, state: icon }
    itemIconStyle: NoItem
    sound: !type:SoundPathSpecifier
      path: /Audio/Items/unsheath.ogg
  - type: InstantAction
    event: !type:ToggleMantisBladeEvent

- type: entity
  parent: ActionToggleRightMantisBlade
  id: ActionToggleLeftMantisBlade
  name: Basculer la Lame Mantis Gauche
  description: Déployer ou rétracter la lame mantis dans votre bras gauche.
  components:
  - type: Action
    icon: { sprite: _Goobstation/Objects/Weapons/Melee/mantis_blade.rsi, state: icon-mirrored }

- type: entity
  parent: BaseAction
  id: ActionToggleSandevistan
  name: Basculer le Sandevistan
  description: Activer ou désactiver vos réflexes améliorés fournis par le Sandevistan.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 3
    icon: { sprite: _Goobstation/Objects/Misc/sandevistan.rsi, state: icon }
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:ToggleSandevistanEvent

- type: entity
  parent: BaseMentalAction
  id: ActionShowStationMap
  name: Interface Carte de Station
  description: Afficher une Interface de Carte de Station.
  components:
  - type: Action
    # TODO: Make a sprite for the station map interface.
    icon: { sprite: Interface/Actions/actions_ai.rsi, state: mass_scanner }
    iconOn: Interface/Actions/actions_ai.rsi/mass_scanner.png
    keywords: [ "AI", "console", "interface" ]
    priority: -8
  - type: InstantAction
    event: !type:ToggleIntrinsicUIEvent { key: enum.StationMapUiKey.Key }

- type: entity
  parent: BaseAction
  id: ActionToggleFloorBoardsMode
  name: Entrer ou Quitter le Sol
  description: Ramper sous les lames du plancher.
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 3
    icon:
      sprite: Structures/Piping/Atmospherics/vent.rsi
      state: vent_off
  - type: InstantAction
    event: !type:ToggleCrawlingStateEvent

- type: entity
  parent: BaseAction
  id: ActionStealShoes
  name: Voler des Chaussures
  description: Ça sera un délicieux en-cas !
  components:
  - type: Action
    checkCanInteract: false
    itemIconStyle: NoItem
    icon:
      sprite: Clothing/Shoes/Boots/jackboots.rsi
      state: icon
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - Inventory
    canTargetSelf: false
    event: !type:StealShoesEvent {}

- type: entity
  id: ActionVehicleWallPush
  name: Lancer de Mur
  description: Élancez-vous depuis la surface la plus proche — les chaotiques comptent comme des surfaces.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: office-dark
    useDelay: 1
  - type: TargetAction
    range: 16
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:VehicleWallPushActionEvent

- type: entity
  id: ActionRocketChairBoost
  parent: BaseAction
  name: Boost
  description: Projetez de l'eau pour vous propulser vers l'avant.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Objects/Misc/fire_extinguisher.rsi
      state: fire_extinguisher_closed
    useDelay: 1
  - type: TargetAction
    range: 16
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:RocketChairBoostActionEvent

- type: entity
  parent: BaseAction
  id: ActionActivateBerserkerImplant
  name: Activer l'Implant Berserker
  description: Active votre implant berserker, augmentant considérablement vos dégâts en mêlée et votre vitesse pour une courte durée. En mode berserker, vous ne pourrez pas utiliser d'armes à distance.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 40
    icon: { sprite: _Goobstation/Objects/Misc/berserker_heart.rsi, state: icon }
    itemIconStyle: NoItem
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Misc/berserker-implant-activate.ogg
  - type: InstantAction
    event: !type:ActivateBerserkerImplantActionEvent

- type: entity
  parent: BaseSuicideAction
  id: ActionActivateRedspaceLifeline
  name: Activer la Ligne de Vie Rouge
  description: Active votre implant de ligne de vie rouge, vous téléportant très loin de cette station. Vous ne pourrez pas revenir.
  components:
    - type: Action
      checkCanInteract: false
      checkConsciousness: false
      itemIconStyle: BigAction
      priority: -20
      icon:
        sprite: _Goobstation/Effects/redspace_lifeline.rsi
        state: redspace_lifeline
    - type: InstantAction
      event: !type:ActivateImplantEvent

- type: entity
  parent: BaseAction
  id: ActionForklift
  name: Activer le Lift
  description: Soulever les caisses devant vous.
  components:
  - type: Action
    useDelay: 3
    icon:
      sprite: _Goobstation/Objects/Vehicles/forklift.rsi
      state: forklift
    itemIconStyle: BigAction
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    event: !type:ForkliftActionEvent
    canTargetSelf: false
    whitelist:
      tags:
      - Crate

- type: entity
  parent: BaseAction
  id: ActionUnforklift
  name: Poser le Lift
  description: Poser les caisses devant vous.
  components:
  - type: Action
    useDelay: 1.5
    icon: Interface/NavMap/beveled_arrow_south.png
  - type: InstantAction
    event: !type:UnforkliftActionEvent
