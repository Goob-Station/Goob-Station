- type: entity
  parent: BaseAction
  id: ActionHereticRustConstruction
  name: Formation de Rouille
  description: Transforme un sol rouillé en un mur de rouille complet. Créer un mur sous un personnage lui inflige des dégâts.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 8
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: construction
  - type: TargetAction
    checkCanAccess: false
    repeat: true
    range: 4
  - type: WorldTargetAction
    event: !type:EventHereticRustConstruction
  - type: HereticAction
    requireMagicItem: true

- type: entity
  parent: BaseAction
  id: ActionHereticAggressiveSpread
  name: Propagation Agressive
  description: Propage la rouille sur les surfaces environnantes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    predicted: false
    useDelay: 30
    itemIconStyle: NoItem
    sound:
      path: /Audio/Items/welder.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: aggressive_spread
  - type: InstantAction
    event: !type:EventHereticAggressiveSpread
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-rust-spread
  - type: ChangeUseDelayOnAscension
    newUseDelay: 15
    requiredPath: Rust

- type: entity
  parent: BaseAction
  id: ActionHereticEntropicPlume
  name: Panache Entropique
  description: Projette un panache désorientant qui pousse les ennemis à se frapper mutuellement, les aveugle brièvement et les empoisonne. Propage également la rouille dans le sillage du panache.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    predicted: false
    useDelay: 30
    itemIconStyle: NoItem
    sound:
      path: /Audio/_Goobstation/Wizard/smoke.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: entropic_plume
  - type: InstantAction
    event: !type:EventHereticEntropicPlume
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-rust-plume

- type: entity
  parent: BaseAction
  id: ActionHereticRustCharge
  name: Charge Rouillée
  description: Une charge qui doit être lancée depuis une dalle rouillée et qui détruira tout objet rouillé sur votre passage, infligera de lourds dégâts aux autres et propagera la rouille autour de vous pendant la charge. C'est la rouille qui vous confère cette capacité, aucun focalisateur n'est donc nécessaire.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 45
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: rust_charge
  - type: TargetAction
    range: 0
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:EventHereticRustCharge
  - type: HereticAction
    requireMagicItem: false

- type: entity
  parent: BaseAction
  id: ActionHereticRustWave
  name: Portée du Patron
  description: Libère une vague toxique de rouille.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: true
    useDelay: 35
    itemIconStyle: NoItem
    sound:
      path: /Audio/Items/welder.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: rust_wave
  - type: TargetAction
    range: 0
    checkCanAccess: false
  - type: EntityTargetAction
    canTargetSelf: false
  - type: WorldTargetAction
    event: !type:ProjectileSpellEvent
      prototype: ProjectileWaveRust
      speed: 2.8
  - type: SpeakOnAction
    sentence: heretic-speech-rust-wave
