- type: entity
  parent: BaseAction
  id: ActionHereticVoidBlast
  name: Souffle du Vide
  description: Tire un cône de glace devant vous.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 15
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_blast
  - type: InstantAction
    event: !type:HereticVoidBlastEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-blast

- type: entity
  parent: BaseAction
  id: ActionHereticVoidPhase
  name: Phase du Vide
  description: Traversez le vide, renversant tous ceux autour de vous.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 20
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_phase
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Heretic/voidblink.ogg
  - type: TargetAction
    checkCanAccess: false
    range: 16
  - type: WorldTargetAction
    event: !type:HereticVoidBlinkEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-phase

- type: entity
  parent: BaseAction
  id: ActionHereticVoidPrison
  name: Prison du Vide
  description: Envoie un mécréant dans le vide pendant 10 secondes. Il sera incapable d'effectuer toute action pendant cette durée. Ensuite, il sera glacé et renvoyé sur le plan mortel.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    predicted: false
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: voidball
  - type: TargetAction
    range: 3
  - type: EntityTargetAction
    whitelist:
      components:
      - MobState
    canTargetSelf: true
    event: !type:HereticVoidPrisonEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-prison

- type: entity
  parent: BaseAction
  id: ActionHereticVoidPull
  name: Attraction du Vide
  description: Invoque le vide, infligeant des dégâts, renversant, attirant les personnes proches et les étourdissant.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    checkCanInteract: false
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_pull
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Heretic/voidblink.ogg
  - type: InstantAction
    event: !type:HereticVoidPullEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-pull

- type: entity
  parent: BaseAction
  id: ActionHereticVoidConduit
  name: Conduit du Vide
  description: Ouvre une porte vers le Vide ; elle émet une impulsion intermittente qui endommage les fenêtres et les sas, tout en infligeant aux Mécréants le gel du vide. Les Hérétiques affectés reçoivent à la place une résistance à la basse pression.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 60
    itemIconStyle: NoItem
    checkCanInteract: false
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_rift
  - type: InstantAction
    event: !type:HereticVoidConduitEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-conduit
