# actions
- type: entity
  parent: BaseAction
  id: ActionHereticOpenStore
  name: Ouvrir le Grimoire
  description: Ouvre le Grimoire de Connaissances.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: open_store
  - type: InstantAction
    event: !type:EventHereticOpenStore {}
  - type: HereticAction
    requireMagicItem: false

- type: entity
  parent: BaseAction
  id: ActionHereticMansusGrasp
  name: Emprise du Mansus
  description: Canalisez le pouvoir des Dieux Anciens à travers votre prise.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: mansus_grasp
  - type: InstantAction
    event: !type:EventHereticMansusGrasp {}
  - type: HereticAction
    requireMagicItem: false

- type: entity
  parent: BaseAction
  id: ActionHereticLivingHeart
  name: Cœur Vivant
  description: Utilisez votre cœur pour localiser vos cibles de sacrifice.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 2
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: living_heart
  - type: InstantAction
    event: !type:EventHereticLivingHeart {}
  - type: HereticAction
    requireMagicItem: false

- type: entity
  parent: BaseAction
  id: ActionHereticMansusLink
  name: Lien du Mansus
  description: "Percez la réalité et connectez les esprits les uns aux autres. Touche par défaut : +m"
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: mansus_link
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:EventHereticMansusLink {}
  - type: HereticAction
    requireMagicItem: false
  - type: SpeakOnAction
    sentence: heretic-speech-mansuslink

- type: entity
  parent: BaseAction
  id: ActionHereticShadowCloak
  name: Manteau d'Ombre
  description: Dissimule entièrement votre identité, mais ne vous rend pas invisible. Peut être activé à nouveau pour le désactiver. Sous le manteau, vous vous déplacez plus vite, mais effectuez des actions bien plus lentement. Subir des dégâts sous le manteau peut le faire se lever soudainement.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 6
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: shadowcloak
  - type: InstantAction
    event: !type:EventHereticCloak
      status: ShadowCloakStatusEffect
      lifetime: 180
  - type: HereticAction
    requireMagicItem: true
  - type: Tag
    tags:
    - ShadowCloakAction

- type: entity
  parent: BaseAction
  id: ActionHereticShapeshift
  name: Métamorphose
  description: Un sort vous permettant de prendre la forme d'une autre créature et d'acquérir ses capacités.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: shapeshift
  - type: InstantAction
    event: !type:EventHereticShapeshift
  - type: ShapeshiftAction
    polymorphs:
    - ShapeshiftMouse
    - ShapeshiftHonkBot
    - ShapeshiftAdultSlimesBlue
    - ShapeshiftBat
    - ShapeshiftMothroach
    - ShapeshiftCrab
    - ShapeshiftGoose
    - ShapeshiftLizard
    - ShapeshiftParrot
    - ShapeshiftGiantSpider
    - ShapeshiftFox
    - ShapeshiftCorgi
    - ShapeshiftCat
    - ShapeshiftHamster
    - ShapeshiftCarp
    - ShapeshiftBingle
    - ShapeshiftLaserRaptor
  - type: UserInterface
    interfaces:
      enum.HereticShapeshiftUiKey.Key:
        type: HereticShapeshiftBoundUserInterface
