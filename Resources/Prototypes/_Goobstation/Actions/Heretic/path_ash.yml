- type: entity
  parent: BaseAction
  id: ActionHereticJaunt
  name: Passage Cendré
  description: Un sort à courte portée vous permettant de traverser les murs sans entrave.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 15
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: ashen_shift
  - type: InstantAction
    event: !type:EventHereticAshenShift
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-ash-jaunt

- type: entity
  parent: ActionHereticJaunt
  id: ActionHereticJauntLong
  name: Passage Cendré
  description: Un sort à longue portée vous permettant de traverser les murs sans entrave.
  categories: [ HideSpawnMenu ]
  components:
  - type: InstantAction
    event: !type:EventHereticAshenShift
      jaunt: AshJauntLong

- type: entity
  parent: BaseAction
  id: ActionHereticVolcanoBlast
  name: Explosion Volcanique
  description: Charge un souffle de feu qui se propage en chaîne entre les cibles proches, les embrasant. Les cibles déjà en feu sont prioritaires. Si la cible ne prend pas feu, ou s'éteint avant que la chaîne ne rebondisse, celle-ci s'arrête.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 45
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: volcano_blast
  - type: InstantAction
    event: !type:EventHereticVolcanoBlast
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-ash-volcano
  - type: ChangeUseDelayOnAscension
    newUseDelay: 30
    requiredPath: Ash

- type: entity
  parent: BaseAction
  id: ActionHereticNightwatcherRebirth
  name: Renaissance du Veilleur de Nuit
  description: Draine la force vitale des mécréants environnants engloutis dans les flammes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 60
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: nightwatcher_rebirth
