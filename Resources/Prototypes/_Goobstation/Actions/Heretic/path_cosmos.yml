- type: entity
  id: ActionHereticCosmicRune
  name: Rune Cosmique
  description: Crée une rune cosmique à votre position ; deux peuvent exister simultanément. Invoquer une rune vous transporte vers l'autre. Toute personne portant une marque d'étoile est transportée avec vous.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 15
    itemIconStyle: NoItem
    sound:
      path: /Audio/Magic/forcewall.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: cosmic_rune
  - type: InstantAction
    event: !type:EventHereticCosmicRune
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-cosmic-rune
  - type: HereticCosmicRuneAction

- type: entity
  id: ActionHereticStarTouch
  name: Toucher des Étoiles
  description: Peut être utilisé pour apposer une marque d'étoile sur une cible. Si votre victime est déjà marquée, vous lie à elle par un rayon cosmique. Si le lien reste intact pendant 8 secondes, elle s'endort et est téléportée vers vous. Le Toucher des Étoiles peut également supprimer des Runes Cosmiques, ou vous téléporter vers votre Contemplatrice d'Étoiles lorsqu'utilisé en main.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: star_touch
  - type: InstantAction
    event: !type:EventHereticStarTouch
  - type: HereticAction
    requireMagicItem: true

- type: entity
  id: ActionHereticStarBlast
  name: Éclat Stellaire
  description: Ce sort tire un disque irrépressible chargé d'énergies cosmiques sur une cible, propageant la marque d'étoile. Lors du second lancement, vous êtes téléporté vers le disque, et des champs cosmiques se génèrent depuis le disque et depuis le lanceur, attirant les mécréants proches.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 1
    itemIconStyle: NoItem
    sound:
      path: /Audio/_Goobstation/Heretic/cosmic_energy.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: star_blast
  - type: TargetAction
    range: 0
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:EventHereticStarBlast
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-star-blast
  - type: StarBlastAction

- type: entity
  id: ActionHereticCosmicExpansion
  name: Expansion Cosmique
  description: Ce sort génère un domaine cosmique de 5x5 cases. Les créatures jusqu'à 7 cases reçoivent également une marque d'étoile.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 15
    itemIconStyle: NoItem
    sound:
      path: /Audio/_Goobstation/Heretic/cosmic_expansion.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: cosmic_domain
  - type: InstantAction
    event: !type:EventHereticCosmicExpansion
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-cosmic-expansion

- type: entity
  id: ActionStarGaze
  name: Contemplation des Étoiles
  description: Génère un immense rayon de la mort qui éradique tout sur son passage. Possède sa propre attraction gravitationnelle, aspirant de nouvelles victimes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: gazer_beam_charge
  - type: InstantAction
    event: !type:StarGazeEvent
  - type: HereticAction
  - type: SpeakOnAction
    sentence: heretic-speech-stargaze

- type: entity
  id: ActionResetStarGazerConsciousness
  name: Réinitialiser la Conscience de la Contemplatrice
  description: Remplace l'esprit de votre invocation par celui d'un fantôme différent.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: stargazer
  - type: InstantAction
    event: !type:ResetStarGazerConsciousnessEvent
  - type: ConfirmableAction
    popup: heretic-stargazer-reset-consciousness

- type: entity
  id: ActionStarGazerSeekMaster
  name: Rejoindre le Maître
  description: Vous téléporte auprès de votre maître.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 5
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: stargazer
  - type: InstantAction
    event: !type:StarGazerSeekMasterEvent
