- type: entity
  parent: BaseAction
  id: ActionStartFishing
  name: Lancer le leurre
  description: Lancez le leurre de la canne à pêche pour attraper quelque chose !
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Objects/Specific/Fishing/fishing_lure.rsi
      state: icon
    sound:
      path: /Audio/_Goobstation/Items/Fishing/fishing_rod_cast.ogg
    itemIconStyle: BigAction
    useDelay: 2.5
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:ThrowFishingLureActionEvent  

- type: entity
  parent: BaseAction
  id: ActionStopFishing
  name: Mouliner la canne
  description: Moulinez votre canne à pêche pour tirer un objet accroché, ou arrêtez de pêcher.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Objects/Specific/Fishing/goon_rod.rsi
      state: icon
    sound:
      path: /Audio/_Goobstation/Items/Fishing/fishing_rod_reel.ogg
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:PullFishingLureActionEvent
