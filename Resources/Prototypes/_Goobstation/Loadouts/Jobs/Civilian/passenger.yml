# Tide Quarterzip for the sophisticated passengers
- type: loadoutEffectGroup
  id: SophisticatedTider
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobPassenger
      time: 288000 # 80 hrs

# Quarterzip
- type: loadout
  id: QuarterzipJumpsuit
  effects:
  - !type:GroupLoadoutEffect
    proto: SophisticatedTider
  equipment:
    jumpsuit: ClothingUniformJumpsuitPassengerQuarterzip

# Overalls
- type: loadout
  id: OverallsJumpsuit
  equipment:
    jumpsuit: ClothingUniformOveralls

# recruit jumpsuit

- type: loadout
  id: JumpsuitRecruit
  effects:
  - !type:GroupLoadoutEffect
    proto: Noob
  equipment:
    jumpsuit: ClothingUniformJumpsuitRecruitNT

