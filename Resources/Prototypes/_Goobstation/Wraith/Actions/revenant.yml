# This is the only true revenant
# 1. 9. 8. 4.

- type: entity
  id: ActionRevenantPush
  name: Poussée
  description: Repousse un objet ou un personnage cible loin du revenant.
  components:
  - type: ActionWraithPoints
    wpConsume: 50
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: push
  - type: TargetAction
    range: 2
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:RevenantPushEvent

- type: entity
  id: ActionMassCommand
  name: Commandement de Masse
  description: Lance un assortiment d'objets environnants vers un emplacement cible.
  components:
  - type: ActionWraithPoints
    wpConsume: 300
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: mass_comm
  - type: TargetAction
    range: 10
  - type: EntityTargetAction
    blacklist:
      components:
        - BibleUser
    canTargetSelf: false
    event: !type:WraithCommandEvent

- type: entity
  id: ActionShockwave
  name: Onde de Choc
  description: Émet une onde de choc, brisant les lumières et les murs environnants, et étourdissant les humains proches pendant un court instant.
  components:
  - type: ActionWraithPoints
    wpConsume: 750
  - type: Action
    useDelay: 30
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: shockwave
  - type: InstantAction
    event: !type:RevenantShockwaveEvent

- type: entity
  id: ActionTouchOfEvil
  name: Toucher du Mal
  description: Renforce vos attaques au corps à corps pendant un court instant, infligeant des dégâts supplémentaires et renversant les cibles.
  components:
  - type: ActionWraithPoints
    wpConsume: 1000
  - type: Action
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Wraith/revtouch.ogg
    useDelay: 30
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: evil_touch
  - type: InstantAction
    event: !type:TouchOfEvilEvent

- type: entity
  id: ActionCrush
  name: Écrasement
  description: Concentre vos capacités télékinétiques sur une cible humaine, infligeant des dégâts tant que vous restez immobile. Lancer un autre sort interrompra ceci !
  components:
  - type: ActionWraithPoints
    wpConsume: 2500
  - type: Action
    useDelay: 60
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: crush
  - type: TargetAction
    range: 15
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:RevenantCrushEvent
    whitelist:
      components:
        - Body
    blacklist:
      components:
        - BibleUser

