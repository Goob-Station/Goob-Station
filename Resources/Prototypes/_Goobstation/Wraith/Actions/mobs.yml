# Used for Skeleton Commander.
- type: entity
  id: ActionRally
  name: Ralliement
  description: Renforce toutes les créatures environnantes pour vous aider à combattre.
  components:
  - type: Action
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Wraith/Mobs/ghostbreath.ogg
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: rally
  - type: InstantAction
    event: !type:RallyEvent

- type: entity
  id: ActionSummonLesserSkeleton
  name: Invoquer un squelette mineur
  description: Matérialisez un squelette depuis le vide pour vous aider.
  components:
  - type: Action
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Wraith/Mobs/ghostbreath.ogg
    useDelay: 30
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: skeleton
  - type: TargetAction
    range: 2
  - type: WorldTargetAction
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: MobSkeletonGoonLesser
        amount: 1
      offset: 0, 1

# Used for Void Piker.
- type: entity
  id: ActionTentacleHook
  name: Harpon tentaculaire
  description: Lancez un tentacule sur votre cible et attirez-la vers vous.
  components:
  - type: Action
    useDelay: 30
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Misc/Hastur/tentacle_hit.ogg
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: hook
  - type: TargetAction
    range: 15
  - type: EntityTargetAction
    whitelist:
      components:
      - Body
    canTargetSelf: false
    event: !type:TentacleHookEvent

- type: entity
  id: ActionShuffle
  name: Dérobade
  description: Recroquevillez-vous pour annuler les étourdissements, vous faufiler à travers les portes et échapper à vos assaillants.
  components:
  - type: Action
    useDelay: 50
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: shuffle
  - type: InstantAction
    event: !type:SpikerShuffleEvent

- type: entity
  id: ActionLash
  name: Lacération
  description: Entrez dans une frénésie sanglante sur une cible et mettez-la en pièces.
  components:
  - type: Action
    useDelay: 50
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: lash
  - type: TargetAction
    range: 2
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:SpikerLashEvent

# Used for Void Hound.

- type: entity
  id: ActionRushdown
  name: Ruée
  description: Bondissez en avant et renversez ceux qui se trouvent sur votre chemin.
  components:
  - type: Action
    useDelay: 40
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: pounce
  - type: InstantAction
    event: !type:RushdownEvent

- type: entity
  id: ActionCloak
  name: Camouflage
  description: Glissez-vous dans le vide et rendez-vous difficile à percevoir pendant un court instant.
  components:
  - type: Action
    useDelay: 40
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: cloak
  - type: InstantAction
    event: !type:CloakEvent

# Used for Diseased Rat, and its variants.

- type: entity
  id: ActionEatFilth
  name: Manger des immondices
  description: Mangez des immondices, vous soignant légèrement et grandissant progressivement.
  components:
  - type: Action
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Heretic/eatfood.ogg #Pourquoi ce son de repas générique est-il dans le dossier hérétique ?
    useDelay: 2
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: eatfilth
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:EatFilthEvent

- type: entity
  id: ActionRatBite
  name: Morsure
  description: Mordez une créature vivante, lui infligeant un peu de dégâts et lui injectant un peu de poison de rat.
  components:
  - type: Action
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Wraith/Attack/handcuffs.ogg
    useDelay: 5
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: ratbite
  - type: TargetAction
    deselectOnMiss: true
  - type: EntityTargetAction
    whitelist:
      components:
      - Body
    canTargetSelf: false
    event: !type:RatBiteEvent

- type: entity
  id: ActionRatDen
  name: Créer un repaire de rats
  description: Créez votre nid de rat, vous soignant à proximité et invoquant quelques petites souris malades.
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 40
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: ratden
  - type: TargetAction
    range: 2
  - type: WorldTargetAction
    event: !type:SummonRatDenEvent

- type: entity
  id: ActionRatSlam
  name: Percutée
  description: Percutez quelque chose. Émet une puissante onde de choc lors de la collision.
  components:
  - type: Action
    useDelay: 40
    icon:
      sprite: _Goobstation/Wraith/Mobs/actions.rsi
      state: ratrush
  - type: InstantAction
    event: !type:RushdownEvent

# Used for summon void creature ghost entity
- type: entity
  id: ActionChooseVoidCreature
  name: Choisissez votre combattant
  description: Choisissez l'une des trois créatures du vide pour vous incarner.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Wraith/actions.rsi
      state: summon_creature
  - type: InstantAction
    event: !type:ChooseVoidCreatureEvent
