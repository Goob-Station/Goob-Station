- type: entity
  id: ActionFlipLights
  name: Inverser les interrupteurs
  description: Les interrupteurs allumés s'éteignent et les éteints s'allument.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: flip
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: flip
  - type: InstantAction
    event: !type:FlipLightsEvent

- type: entity
  id: ActionBurnLights
  name: Brûler les lumières
  description: Détruit jusqu'à quatre tubes et ampoules dans la zone, créant des étincelles pouvant enflammer les matériaux inflammables.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: burn
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: burn
  - type: InstantAction
    event: !type:BurnLightsEvent

- type: entity
  id: ActionOpenDoors
  name: Ouvrir portes, casiers et caisses
  description: Ouvre et ferme quelques portes, casiers et caisses au hasard dans la zone.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: open
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: open
  - type: InstantAction
    event: !type:OpenDoorsSpookEvent

- type: entity
  id: ActionCreateSmoke
  name: Créer de la fumée
  description: Crée plusieurs nuages de fumée autour de vous pouvant obscurcir complètement la vision. Les nuages persistent environ une minute.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: smoke
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: smoke
  - type: InstantAction
    event: !type:CreateSmokeSpookEvent

- type: entity
  id: ActionCreateEctoplasm
  name: Créer de l'ectoplasme
  description: Fait apparaître quelques globes d'ectoplasme dans la zone.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: ectoplasm
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: ectoplasm
  - type: InstantAction
    event: !type:CreateEctoplasmEvent

- type: entity
  id: ActionSapApc
  name: Siphonner l'APC
  description: Draine un peu d'énergie de l'APC de la zone. Plus votre taux de régénération de PS est élevé, plus l'énergie drainée est importante. Impossible de drainer plusieurs APCs.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: apc
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: apc
  - type: InstantAction
    event: !type:SapApcEvent

- type: entity
  id: ActionSpookRandom
  name: Aléatoire
  description: Effectue une action aléatoire.
  components:
  - type: Sprite
    sprite: _Goobstation/Wraith/UI/spook.rsi
    state: random
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Wraith/UI/spook.rsi
      state: random
  - type: InstantAction
    event: !type:RandomSpookEvent
