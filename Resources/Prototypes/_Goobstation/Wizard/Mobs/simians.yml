- type: entity
  parent: MobGorilla
  id: MobGorillaAngry
  suffix: En Colère
  components:
  - type: NpcFactionMember
    factions:
    - SimpleHostile

- type: entity
  parent: MobGorillaAngry
  id: MobGorillaAngryTemp
  suffix: En Colère, Moindre, Temporaire
  components:
  - type: FadingTimedDespawn
    lifetime: 120
    fadeOutTime: 4
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Critical
      100: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.7
      70: 0.5

- type: entity
  parent: MobGorillaAngry
  id: MobGorillaWizard
  suffix: Sorcier
  components:
  - type: NpcFactionMember
    factions:
    - SimpleHostile
    - Wizard
  - type: Speech
    speechVerb: LargeMob
  - type: MobThresholds
    thresholds:
      0: Alive
      250: Critical
      350: Dead
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 50
        Structural: 80
  - type: SlowOnDamage
    speedModifierThresholds:
      210: 0.7
      230: 0.5
  - type: Insulated
  - type: FlashImmunity
  - type: Bloodstream
    maxBleedAmount: 0
  - type: Respirator
    suffocationThreshold: -5
  - type: StepTriggerImmune
  - type: NoSlip
  - type: Sprinter
    staminaDrainRate: 8
  - type: Puller
    needsHands: false
  - type: Targeting

- type: entity
  name: singe
  id: MobMonkeyAngry
  parent: MobBaseAncestor
  suffix: En Colère
  description: La nouvelle église des néo-darwinistes croit réellement que TOUS les animaux ont évolué à partir d'un singe. Goût de porc — les tuer est à la fois amusant et relaxant.
  components:
  - type: NameIdentifier
    group: Monkey
  - type: Speech
    speechSounds: Monkey
    speechVerb: Monkey
  - type: MonkeyAccent
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound

- type: entity
  name: kobold
  id: MobKoboldAngry
  parent: MobBaseKobold
  description: Cousins de la race sentiente des lézards, les kobolds se fondent dans leur habitat naturel et sont aussi vicieux que les singes ; prêts à vous arracher les cheveux et vous poignarder à mort.
  components:
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound

- type: entity
  parent: MobMonkeyAngry
  id: MobMonkeyAngryTemp
  suffix: En Colère, Moindre, Temporaire
  components:
  - type: FadingTimedDespawn
    lifetime: 120
    fadeOutTime: 4
  - type: DropItemsOnTimedDespawn
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Critical
      100: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      30: 0.7
      40: 0.5
