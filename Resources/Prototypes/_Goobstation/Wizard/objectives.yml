- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseWizardObjective
  components:
  - type: Objective
    difficulty: 1.5
    issuer: objective-issuer-wizard-federation
    icon:
      sprite: Clothing/Head/Hats/wizardhat.rsi
      state: icon

- type: entity
  parent: [BaseWizardObjective, BaseSurviveObjective]
  id: WizardSurviveObjective
  name: Survivre en semant le chaos autant que possible
  description: La Fédération des Sorciers Spatiaux vous a envoyé semer le chaos sur la station. Ne les décevez pas.

- type: entity
  parent: [BaseWizardObjective, BaseKeepAliveObjective]
  id: KeepWizardAliveObjective
  name: S'assurer que le sorcier survive
  description: Protéger à tout prix la personne qui vous a invoqué.
  components:
  - type: TargetObjective
    title: objective-condition-wizard-alive-title
    dynamicName: true
    showJobTitle: false