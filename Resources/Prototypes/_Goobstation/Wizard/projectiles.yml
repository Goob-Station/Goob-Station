  - type: Ammo
    muzzleFlash: null

- type: entity
  id: ProjectileSpellCardRedNoHoming
  parent: BaseBullet
  name: carte enchantée
  description: Un morceau de papier enchanté pour lui conférer une durabilité et une rigidité extrêmes, ainsi qu'une brûlure très chaude pour quiconque malheureusement touché par une carte chargée.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Projectiles/spellcard.rsi
    layers:
    - state: red
      shader: unshaded
      map: [ "base" ]
  - type: Reflective
    reflective: Magic
  - type: Projectile
    damage:
      types:
        Heat: 5
  - type: Trail
    color: "#FF0033DD"
    scale: 0.08
    frequency: 0.02
    lifetime: 0.3
    lerpTime: 0.005
    alphaLerpAmount: 0.1
    scaleLerpAmount: 0.08
    shader: unshaded
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: Ammo
    muzzleFlash: null
  - type: TileFrictionModifier # Thanks wizden for killing physics comp damping
    modifier: 0

- type: entity
  id: ProjectileSpellCardRed
  parent: ProjectileSpellCardRedNoHoming
  categories: [ HideSpawnMenu ]
  components:
  - type: SpellCard
    rotateTime: 0.2
    flippedTrailColor: "#AA00FFDD"
  - type: HomingProjectile
    homingTime: 0.2
    homingSpeed: 2160
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SpellCardVisuals.State:
        base:
          0: { state: red }
          1: { state: red_to_purple }
          2: { state: purple }

- type: entity
  id: ProjectileSpellCardPurple
