- type: entity
  id: ProjectileMagicMissile
  parent: BaseBullet
  name: missile magique
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: magicm
      shader: unshaded
  - type: StunOnCollide
    stunAmount: 6
    knockdownAmount: 6
  - type: Reflective
    reflective: Magic
  - type: PointLight
    enabled: true
    color: "#FF87FF"
    radius: 1.5
    energy: 5.0
  - type: Projectile
    soundHit:
      path: /Audio/_Goobstation/Wizard/mm_hit.ogg
      params:
        volume: -3
    damage:
      types:
        Heat: 0
  - type: TimedDespawn
    lifetime: 2
  - type: Trail
    endAngle: 320
    particleAmount: 9
    velocity: 0.1
    lerpTime: 0.05
    frequency: 0.1
    lifetime: 1
    alphaLerpAmount: 0.4
    shader: unshaded
    sprite:
      sprite: /Textures/Objects/Weapons/Guns/Projectiles/magic.rsi
      state: magicm
  - type: HomingProjectile
    homingSpeed: 1620
  - type: Ammo
    muzzleFlash: null

- type: entity
  id: ProjectileToolboxHoming
  parent: BaseBullet
  name: boîte à outils à tête chercheuse
