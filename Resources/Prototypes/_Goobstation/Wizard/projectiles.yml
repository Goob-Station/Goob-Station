  - type: InteractionOutline
  - type: MovedByPressure
  - type: Clickable
  - type: Pullable
  - type: Physics
    bodyType: Dynamic
    linearDamping: 0
    angularDamping: 0
  - type: TimedDespawn
    lifetime: 10
  - type: Sprite
    drawdepth: Items
    noRot: true
    sprite: _Goobstation/Wizard/Projectiles/banana.rsi
    layers:
    - state: icon
  - type: SlipOnCollide
  - type: Slippery
