- type: entity
  abstract: true
  id: ScryingOrbBase
  suffix: Sorcier
  components:
  - type: ScryingOrb
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/scrying_orb.rsi
    state: icon

- type: entity
  parent: [BaseStructure, ScryingOrbBase]
  id: PonderingOrbWizard
  name: orbe de méditation
  description: Méditez sur vos plans pour la station grâce à cet artefact de clairvoyance.
  components:
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: SmallObjects
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.16,0.3,0.16"
        density: 20
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer

- type: entity
  parent: [BaseItem, ScryingOrbBase, BaseMagicalContraband]
  id: ScryingOrbWizard
  name: orbe de scrutation
  description: Un orbe incandescent d'énergie d'un autre monde. Le fixer vous confère une vision au-delà des moyens mortels.
  components:
  - type: ActionGrant
    actions:
    - ActionToggleLighting
    - ActionToggleFov
    - ActionToggleGhosts
  - type: ItemActionGrant
    actions:
    - ActionToggleLighting
    - ActionToggleFov
    - ActionToggleGhosts
  - type: StaticPrice
    price: 50000