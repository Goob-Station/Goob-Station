- type: entity
  name: bâton de métamorphose
  parent: WeaponStaffBase
  id: WeaponStaffChange
  description: Un artefact qui crache des éclairs d'énergie coruscante qui font que la forme même de la cible se remodèle.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/change.rsi
    layers:
    - state: change
  - type: Item
    heldPrefix: change
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_change.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileWabbajack
    capacity: 6
    count: 6
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 8

- type: entity
  name: bâton du chaos
  parent: WeaponStaffBase
  id: WeaponStaffChaos
  description: Un artefact qui crache des éclairs de magie chaotique pouvant potentiellement faire n'importe quoi.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/chaos.rsi
    layers:
    - state: chaos
  - type: Item
    heldPrefix: chaos
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_chaos.ogg
      params:
        variation: 0.250
  - type: BasicEntityAmmoProvider
    prototypes: ChaosProjectiles
    capacity: 10
    count: 10
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2

- type: entity
  name: bâton du glissement
  parent: WeaponStaffBase
  id: WeaponStaffSlipping
  description: Un artefact qui crache... des bananes ?
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/Weapons/Staves/slipping.rsi
    layers:
    - state: slipping
  - type: Item
    heldPrefix: slipping
  - type: Gun
    soundGunshot:
      collection: BikeHorn
      params:
        variation: 0.250
  - type: BasicEntityAmmoProvider
    proto: ProjectileBananaPeel
    capacity: 6
    count: 6
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 4