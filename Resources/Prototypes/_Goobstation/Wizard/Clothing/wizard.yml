- type: entity
  parent: ClothingEyesBase
  id: ClothingEyesEyepatchMedical
  name: cache-œil médical
  description: Utilisé par les weeaboos spatiaux pour faire semblant qu'ils n'ont pas d'œil, et par les membres d'équipage qui ont réellement perdu leur œil pour faire semblant qu'ils en ont un.
  suffix: NE PAS PLACER
  categories: [ DoNotMap ]
  save: false
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Clothing/Eyes/eyepatch.rsi
    layers:
    - state: icon
      map: [ "flipped" ]
  - type: Clothing
    sprite: _Goobstation/Wizard/Clothing/Eyes/eyepatch.rsi
  - type: WizardClothes
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.FlippedVisuals.Flipped:
        flipped:
          True: { state: flipped-icon }
          False: { state: icon }
  - type: ChuuniEyepatch
  - type: Tag
    tags:
    - ClothMade
    - WhitelistChameleon

- type: entity
  abstract: true
  id: ClothingHeadHatWizardBaseArmor
  suffix: Vêtements de Sorcier
  components:
  - type: Armor
    traumaDeductions: # prevents traumas at all (kinda)
      Dismemberment: 1
      OrganDamage: 1
      BoneDamage: 1
      VeinsDamage: 1
      NerveDamage: 1
    coverage:
    - Head
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.6
        Caustic: 0.1
        Radiation: 0.1
  - type: ExplosionResistance
    damageCoefficient: 0.8
  - type: GroupExamine

- type: entity
  abstract: true
  id: ClothingOuterWizardBaseArmor
  suffix: Vêtements de Sorcier
  components:
  - type: Armor
    coverage: # full coverage, idk, magic
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    - Tail
    - Other
    traumaDeductions: # prevents traumas at all (kinda)
      Dismemberment: 1
      OrganDamage: 1
      BoneDamage: 1
      VeinsDamage: 1
      NerveDamage: 1
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.6
        Radiation: 0.1
        Caustic: 0.1
  - type: ExplosionResistance
    damageCoefficient: 0.25
  - type: GroupExamine
  - type: FireProtection
    reduction: 1
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: ModifyDelayedKnockdown
    delayDelta: 3
    knockdownTimeDelta: -3
  - type: StaminaResistance
    damageCoefficient: 0.5

