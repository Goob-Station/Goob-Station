- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskPig
  name: masque de cochon
  description: Un masque de cochon en caoutchouc avec un modulateur de voix intégré.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Clothing/Mask/pig.rsi
  - type: Clothing
    sprite: _Goobstation/Wizard/Clothing/Mask/pig.rsi
  - type: Tag
    tags:
    - CursedAnimalMask
    - WhitelistChameleon
    - IPCMaskWearable # EE - IPCs
  - type: HideLayerClothing
    slots:
    - Snout
  - type: IdentityBlocker
  - type: AddAccentClothing
    accent: PigAccent

