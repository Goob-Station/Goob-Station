- type: entity
  id: BaseTrap
  name: C'EST UN PIÈGE
  description: Marcher sur moi, c'est garantir une mauvaise journée.
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    drawdepth: FloorEffects
    sprite: _Goobstation/Wizard/Objects/trap.rsi
    state: icon
    color: '#FFFFFF0e'
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        hard: false
        mask:
          - ItemMask
        layer:
          - SlipLayer
  - type: Physics
    bodyType: Static
  - type: Appearance
  - type: AnimationPlayer
  - type: TimedDespawn
    lifetime: 300
  - type: WizardTrap
  - type: Tag
    tags:
      - HideContextMenu

- type: entity
  parent: BaseTrap
  id: TrapShock
  name: piège à choc
  description: Un piège qui vous électrifiera et vous immobilisera. Mieux vaut l'éviter.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    color: '#FFFF000e'
  - type: WizardTrap
    stunTime: 0
    effect: StunTrapFlashEffect
  - type: StunTrap

- type: entity
  parent: BaseTrap
  id: TrapFlame
  name: piège à flammes
  description: Un piège qui vous mettra en feu. Mieux vaut l'éviter.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    color: '#FF00000e'
  - type: WizardTrap
    effect: FlameTrapFlashEffect
  - type: FlameTrap

- type: entity
  parent: BaseTrap
  id: TrapDamage
  name: piège tellurique
  description: Un piège qui déclenchera un petit tremblement de terre, rien que pour vous. Mieux vaut l'éviter.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    color: '#00FF000e'
  - type: WizardTrap
    effect: DamageTrapFlashEffect
  - type: DamageTrap
    spawnedEntity: FloraRockSolidFading
    damage:
      types:
        Blunt: 50

- type: entity
  parent: BaseTrap
  id: TrapChill
  name: piège à givre
  description: Un piège qui vous gèlera jusqu'aux os. Mieux vaut l'éviter.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    color: '#00FFFF0e'
  - type: WizardTrap
    stunTime: 0
    effect: ChillTrapFlashEffect
  - type: ChillTrap

- type: entity
  parent: BaseTrap
  id: TrapBlind
  name: piège aveuglant
  description: Un piège qui vous aveuglera temporairement. Mieux vaut l'éviter.
  placement:
    mode: SnapgridCenter
  components:
  - type: WizardTrap
    effect: BlindingTrapFlashEffect
  - type: BlindingTrap