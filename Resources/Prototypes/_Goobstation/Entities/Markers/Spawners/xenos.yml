# Xeno spawners for mapping

- type: entity
  parent: MarkerBase
  id: SpawnMobXenomorphLarva
  name: xeno larva spawner
  suffix: Cant Evolve
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: _White/Mobs/Aliens/Xenomorphs/larva.rsi
      state: xenomorph
  - type: ConditionalSpawner
    prototypes:
    - MobXenomorphLarvaDungeon

