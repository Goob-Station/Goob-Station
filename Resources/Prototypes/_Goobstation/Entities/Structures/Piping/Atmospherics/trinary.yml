- type: entity
  parent: GasFilterBase
  id: GasFilterInline
  name: filtre à gaz intégré
  description: Filtre les gaz d'un réseau de tuyaux sans le diviser en deux.
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Piping/inlinegasfilter.rsi
  - type: GasFilter
    inlet: pipe
    outlet: pipe
  - type: NodeContainer
    nodes:
      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: Longitudinal
      filter:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: West
  - type: Construction
    node: inline_filter
