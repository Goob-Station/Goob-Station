- type: entity
  id: DisposalBlocker
  parent: DisposalPipeBase
  name: bloqueur de tuyau d'évacuation
  description: Un tuyau qui permet le mouvement des objets d'un côté et le bloque de l'autre.
  components:
  - type: Sprite
    drawdepth: ThickPipe
    sprite: _Goobstation/Structures/Piping/disposal.rsi
    layers:
    - map: [ "pipe" ]
      state: conpipe-blocker
  - type: DisposalTube
    containerId: DisposalBlocker
  - type: DisposalBlocker
  - type: ContainerContainer
    containers:
      DisposalBlocker: !type:Container
  - type: GenericVisualizer
    visuals:
      enum.DisposalTubeVisuals.VisualState:
        pipe:
          Free: { state: conpipe-blocker }
          Anchored: { state: pipe-blocker }
  - type: Construction
    graph: DisposalPipe
    node: blocker