- type: entity
  id: PollBooth
  parent: BaseStructure
  name: isoloir
  description: Un isoloir pour voter sur les sondages communautaires. Activez pour ouvrir la fenêtre des sondages.
  components:
  - type: Anchorable
  - type: Transform
  - type: PollBooth
  - type: InteractionOutline
  - type: Sprite
    sprite: _Goobstation/Structures/Specific/polling.rsi
    state: polling_booth
  - type: Icon
    sprite: _Goobstation/Structures/Specific/polling.rsi
    state: polling_booth
  - type: Tag
    tags:
    - Wooden
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
