- type: entity
  id: VendingMachineFitness
  parent: VendingMachine
  name: SweatMAX
  description: Un distributeur d'aides à l'exercice et de suppléments nutritionnels qui profite de votre insuffisance.
  components:
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Structures/Machines/VendingMachines/fitness.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: "screen"
      map: ["enum.VendingMachineVisualLayers.Screen"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: VendingMachine
    pack: FitnessVendInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    denyState: deny-unshaded
    ejectState: eject-unshaded
    screenState: screen
  - type: Advertise
    pack: FitnessVendAds
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
  - type: Transform
    noRot: false
  - type: Rotatable
    rotateWhileAnchored: false
    rotateWhilePulling: true
  - type: PointLight
    radius: 2
    energy: 1.6
    color: "#9dc5c9"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

