- type: entity
  id: AlwaysPoweredFloorLight
  name: lumière au sol
  description: "Une lumière au sol toujours alimentée."
  suffix: Always powered
  parent: AlwaysPoweredWallLight
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Decoration/floorlight.rsi
    layers:
      - map: ["enum.PoweredLightLayers.Base"]
        state: base
      - map: ["enum.PoweredLightLayers.Glow"]
        state: glow
        shader: unshaded
    state: base
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
          - Impassable
        layer:
          - Opaque

- type: entity
  id: PoweredFloorLightEmpty
  name: lumière au sol
  description: "Un luminaire au sol. Tire de l'énergie et produit de la lumière lorsqu'il est équipé d'une ampoule."
  suffix: Vide
  parent: PoweredlightEmpty
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Decoration/floorlight.rsi
    layers:
      - map: ["enum.PoweredLightLayers.Base"]
        state: empty
    state: empty
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
          - Impassable
        layer:
          - Opaque

