- type: entity
  name: HE1S-G8
  parent: [ BaseItem, BaseGunWieldable, BaseSyndicateContraband ]
  id: WeaponSniperHE1SG8
  description: High Energy One-Shell rifle. On its side, "leading us on and on" is written using a cheap black marker. Takes Gauss-8 cartridges.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Snipers/heavensgate_icon_48x.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Snipers/heavensgate.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Appearance
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Snipers/heavensgate.rsi
    size: Huge
    shape:
      - 0,0,8,2 # Comically large
  - type: Gun
    fireRate: 0.3
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon2.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/lmg_empty_alarm.ogg
    projectileSpeed: 50 # Gauss rifle needs to have higher velocity
  - type: GunRequiresWield
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    canRack: false
    soundBoltClosed:
      path: /Audio/Weapons/Guns/Bolt/lever_bolt_closed.ogg
    soundBoltOpened:
      path: /Audio/Weapons/Guns/Bolt/lever_bolt_opened.ogg
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: CartridgeG8Demolishing
        priority: 1
        whitelist:
          tags:
          - CartridgeG8
  - type: ContainerContainer
    containers:
      gun_chamber: !type:ContainerSlot
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 5
    pvsIncrease: 0.5
  - type: StaticPrice
    price: 1000

- type: entity
  name: Ceremonial Rifle
  parent: [BaseWeaponSniper, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponSniperMosinSergeant
  description: A true relic, this has served in nearly every armed conflict since its creation 670 years ago. The bolt-action design of the rifle remains virtually identical to its original design, whether used for hunting, sniping, or endless trench warfare. Loads 10 rounds of .30 Rifle.
  suffix: sergeant, ceremonial rifle
  components:
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Snipers/ceremonial_rifle.rsi
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Snipers/ceremonial_rifle.rsi
    layers:
    - state: base
    - state: base1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: base
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 1
    equippedFillBaseName: -fill-
    equippedMaxFillLevels: 1
  - type: Gun
    fireRate: 1 # Slighty higher fire rate (1, instead of 0.75)
  - type: MeleeWeapon
    wideAnimationRotation: -135
    animationRotation: -135 # WWDP
    damage:
      types:
        Piercing: 12
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: MeleeRequiresWield
  - type: AltFireMelee
    attackType: Heavy
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 2
  - type: MeleeChemicalInjector
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 2
  - type: Sharp
    butcherDelayModifier: 2 #It's a bayonet
  - type: GunRequiresWield
  - type: StaticPrice
    price: 500
  - type: Item  # Goob edit
    size: Large
    storedRotation: 45