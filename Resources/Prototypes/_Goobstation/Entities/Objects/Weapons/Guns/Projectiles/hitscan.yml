# region SMG Lasers
# basic SMG laser
- type: entity
  parent: BasicHitscan
  id: SMGLaser
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 10.5
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/small_laser.rsi
      state: muzzle_beam_light
    travelFlash:
      sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/small_laser.rsi
      state: beam_light
    impactFlash:
      sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/small_laser.rsi
      state: impact_beam_light
