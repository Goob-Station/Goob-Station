- type: entity
  name: plasma cutter
  parent: BaseWeaponBatterySmall
  id: WeaponPlasmaCutter
  description: A mining weapon that can mine an entire tunnel with a single shot.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/cutter.rsi
    state: icon
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/_Goobstation/Weapons/Guns/Gunshots/plasma_cutter.ogg
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500
  - type: MaterialEnergy
    materialWhiteList: [Plasma]
  - type: ProjectileBatteryAmmoProvider
    proto: BulletPlasmaCutter
    fireCost: 100
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      Steel: 125
      Glass: 75
      Plasma: 75

- type: entity
  parent: WeaponPlasmaCutter
  id: WeaponPlasmaCutterEmpty
  suffix: Empty
  components:
  - type: Battery
    startingCharge: 0

- type: entity
  name: super plasma cutter
  parent: [ WeaponPlasmaCutter, BaseSalvageContraband ]
  id: WeaponSuperPlasmaCutter
  description: A strong mining weapon that can mine even bigger tunnels through rocks.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/super_cutter.rsi
    state: icon
  - type: Gun
    fireRate: 2
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: ProjectileBatteryAmmoProvider
    proto: BulletSuperPlasmaCutter
    fireCost: 40
  - type: StaticPrice
    price: 2000
  - type: PhysicalComposition
    materialComposition:
      Gold: 400
      Steel: 200
      Glass: 150
      Plasma: 150
      BSCrystal: 100
      Silver: 100
      Diamond: 50

- type: entity
  parent: WeaponSuperPlasmaCutter
  id: WeaponSuperPlasmaCutterEmpty
  suffix: Empty
  components:
  - type: Battery
    startingCharge: 0
