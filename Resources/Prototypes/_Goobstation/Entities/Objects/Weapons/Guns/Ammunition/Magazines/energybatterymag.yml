- type: entity
  id: EnergyRifleMagBase #god i hope i know sprite comp and yes i copy speedloader yml code fight me
  abstract: true
  parent: BaseItem
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Objects/Weapons/Guns/Ammunition/Magazine/energyriflemag.rsi
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: AmmoCounter
  - type: Appearance
  - type: Tag
    tags:
      - EnergyMagAmmo

- type: entity
  id: EnergyMagRifleLethal
  parent: [ EnergyRifleMagBase, BaseSecurityContraband ]
  name: energy rifle magazine (lethal)
  description: Cellule de puissance avec convertisseur créant un boulon léthal à l'extrémité du fusil énergétique.
  components:
  - type: Sprite
    layers:
    - state: erifle_lethal
      map: [ "enum.GunVisualLayers.Base" ]
  - type: ProjectileBatteryAmmoProvider
    proto: RifleBulletEnergyGunLethal
    fireCost: 50

