  name: futuristic PDA
  description: Un puissant ordinateur quantique déguisé en PDA ordinaire.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Devices/pda.rsi
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-chrono
  - type: Pda
    id: ChronoIDCard
    penSlot:
      startingItem: PenFuture
      whitelist:
        tags:
        - Write
  - type: PdaBorderColor
    borderColor: "#dee4e7"
    accentVColor: "#59bcee"
  - type: Icon
    sprite: _Goobstation/Objects/Devices/pda.rsi
    state: pda-chrono

