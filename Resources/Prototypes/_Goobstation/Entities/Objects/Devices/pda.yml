    scanDelay: 0
    silent: true
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    notificationsEnabled: false
    diskSpace: 10 # DeltaV
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NewsReaderCartridge
    - LogProbeCartridge
    - WantedListCartridge
    - MedTekCartridge
    - AstroNavCartridge
    - NanoChatCartridge # DeltaV

