- type: entity
  parent: BaseMachineCircuitboard
  id: RoboticArmCircuitboard
  name: carte machine de bras robotique
  description: Un circuit imprimé de machine pour un bras robotique.
  components:
  - type: Sprite
    state: engineering
  - type: MachineBoard
    prototype: RoboticArm
    stackRequirements:
      Manipulator: 4
      Steel: 6
      Cable: 5
    tagRequirements:
      BorgArm:
        amount: 2
        defaultPrototype: LeftArmBorg

