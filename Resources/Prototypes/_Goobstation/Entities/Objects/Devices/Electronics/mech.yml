# Clarke

- type: entity
  id: ClarkeCentralElectronics
  parent: BaseElectronics
  name: module de contrôle central du Clarke
  description: Le centre de contrôle électrique du mech Clarke.
  components:
    - type: Item
      storedRotation: 0
    - type: Sprite
      sprite: Objects/Misc/module.rsi
      state: mainboard
    - type: Tag
      tags:
      - ClarkeCentralControlModule
    - type: GuideHelp
      guides:
      - Robotics

- type: entity
  id: ClarkePeripheralsElectronics
  parent: BaseElectronics
  name: module de contrôle des périphériques du Clarke
  description: Le contrôle électrique des périphériques du mech Clarke.
  components:
    - type: Sprite
      sprite: Objects/Misc/module.rsi
      state: id_mod
    - type: Tag
      tags:
      - ClarkePeripheralsControlModule
    - type: GuideHelp
      guides:
      - Robotics

