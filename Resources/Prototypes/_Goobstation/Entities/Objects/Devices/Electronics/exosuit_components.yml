- type: entity
  id: BaseExosuitParts
  parent: BaseItem
  name: composants de base
  abstract: true
  components:
  - type: Item
    storedRotation: -90
    size: Ginormous
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_camera
  - type: StaticPrice
    price: 100
  - type: PhysicalComposition
    materialComposition:
      Steel: 200

- type: entity
  id: DurandArmorPlate
  parent: BaseExosuitParts
  name: plaques d'armure du Durand
  description: Plaques d'armure en plasteel pour l'exosuit Durand.
  components:
    - type: Item
      storedRotation: 0
    - type: Sprite
      sprite: _Goobstation/Objects/Specific/Mech/durand_construction.rsi
      state: durand_armor
    - type: Tag
      tags:
      - DurandArmor
    - type: GuideHelp
      guides:
      - Robotics

- type: entity
