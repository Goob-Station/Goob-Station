# Antag Planet

- type: entity
  parent: BaseSubdermalImplant
  id: AntagImplantChangeling
  name: changeling implant
  description: Cet implant permet à l'utilisateur de transformer son corps comme un changelin.
  categories: [ HideSpawnMenu ]
