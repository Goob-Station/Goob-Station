- type: entity
  parent: BaseSubdermalImplant
  id: BluespaceLifelineImplant
  name: bluespace lifeline implant
  description: Teleports the hosts body to Central Command on activation. They will not be able to return.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionActivateBluespaceLifeline
  - type: MansusGraspBlockTrigger
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: TriggerOnActivateImplant
  - type: DeleteParentOnTrigger
  - type: SpawnOnTrigger
    proto: BluespaceLifelineSpawnCore
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu

- type: entity
  parent: BaseSubdermalImplant
  id: CommandTrackingImplant
  name: command tracking implant
  description: This implant reserved for command has a tracking device attached to a private suit sensor network, as well as a condition monitor for the Command radio channel.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      whitelist:
        components:
        - MobState # admeme implanting a chair with tracking implant needs to give the chair mobstate so it can die first
    - type: SuitSensor
      randomMode: false
      controlsLocked: true
      commandTracker: true #for BSO command monitor
      mode: SensorCords
      activationContainer: "implant"
    - type: DeviceNetwork
      deviceNetId: Wireless
      transmitFrequencyId: SuitSensor
    - type: StationLimitedNetwork
    - type: WirelessNetworkConnection
      range: 500

- type: entity
  parent: BaseSubdermalImplant
  id: PacifismImplant
  name: pacifism implant
  description: Implant de pacifisme, donné aux prisonniers condamnés à vie pour les empêcher de commettre de la violence.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    whitelist:
      components:
      - MobState
  - type: Pacified

- type: entity
  parent: BaseSubdermalImplant
  id: SmokeImplant
  name: smoke implant
  description: Cet implant libère un nuage de fumée à l'activation.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      implantAction: ActivateSmokeImplant
    - type: TriggerOnActivateImplant
    - type: SmokeOnTrigger
      spreadAmount: 25
      duration: 10
    - type: EmitSoundOnTrigger
      sound: /Audio/Effects/smoke.ogg

- type: entity
  parent: BaseSubdermalImplant
  id: KravMagaImplant
  name: krav maga implant
  description: Cet implant permet à l'utilisateur d'effectuer divers mouvements de Krav Maga.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: KravMaga

- type: entity
  parent: BaseSubdermalImplant
  id: AutoinjectorImplant
  name: autoinjector implant
  description: Cet implant permet à l'utilisateur de s'injecter un produit chimique à l'utilisation. Éphédrine par défaut.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionActivateAutoinjector
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu

- type: entity
  parent: BaseSubdermalImplant
  id: NutrimentPumpImplant
  name: nutriment pump implant
  description: Cet implant empêche l'utilisateur d'avoir faim ou soif.
  categories: [ HideSpawnMenu ]
  components:
  - type: NutrimentPumpImplant

- type: entity
  parent: BaseSubdermalImplant
  id: SpaceProofImplant
  name: space proofing implant
  description: This implant allows the user to survive in space and without air.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: BreathingImmunity
    - type: PressureImmunity
    - type: SpecialLowTempImmunity

- type: entity
  parent: BaseSubdermalImplant
  id: StypticStimulatorImplant
  name: styptic stimulator implant
  description: Cet implant met la régénération de l'utilisateur en surrégime.
  categories: [ HideSpawnMenu ]
  components:
  - type: StypticStimulatorImplant

- type: entity
  parent: BaseSubdermalImplant
  id: BinaryImplant
  name: binary decoder implant
  description: Cet implant permet à l'utilisateur d'accéder au Binaire et de communiquer avec les silicones (utiliser +b).
  categories: [ HideSpawnMenu ]
  components:
  - type: ImplantGrantCollectiveMind
    collectiveMind: Binary

- type: entity
  parent: BaseSubdermalImplant
  id: ClumsyImplant
  name: clumsy implant
  description: Cet implant rend l'utilisateur maladroit, lui permettant de conduire un certain véhicule.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: Clumsy

- type: entity
  parent: BaseSubdermalImplant
  id: ShadowmindImplant
  name: shadowmind implant
  description: Cet implant permet à l'utilisateur d'accéder au canal Shadowmind (utiliser +q).
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
  - type: ImplantGrantCollectiveMind
    collectiveMind: Shadowmind

