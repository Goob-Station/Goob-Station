- type: entity
  parent: BaseSubdermalImplant
  id: XenoCompatibilityImplant
  name: xeno compatibility implant
  description: Permet à un sujet de recevoir des organes xéno transplantés.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    whitelist:
      requireAll: true
      components: # should cover all the bases (no IPCs)
      - Body
      - Bloodstream
      - Dna
  - type: ComponentsImplant
