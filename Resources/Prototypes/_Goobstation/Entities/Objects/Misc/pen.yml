- type: entity
  name: futuristic pen
  parent: PenCentcom
  id: PenFuture
  description: Certaines théories affirment que l'apocalypse de 3024 s'est produite à cause des stylos.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/bureaucracy.rsi
    state: pen_future
  - type: Item
    sprite: _Goobstation/Objects/Misc/bureaucracy.rsi
    heldPrefix: pen_future

- type: entity
  name: devilish pen
  parent: [BaseAdvancedPen, BaseMagicalContraband]
  id: PenDevil
  description: Un stylo diaboliquement pointu avec un corps étrangement chaud. Pas aussi tranchant qu'une langue de diable, ni aussi enduit d'argent.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/bureaucracy.rsi
    state: pen_devil
  - type: Item
    sprite: _Goobstation/Objects/Misc/bureaucracy.rsi
    heldPrefix: pen_devil
  - type: CrematoriumImmune
  - type: MeleeWeapon
    wideAnimationRotation: -45
    damage:
      types:
        Piercing: 15
        Heat: 5
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
