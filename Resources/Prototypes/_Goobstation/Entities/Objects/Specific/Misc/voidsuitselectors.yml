# paramedic
- type: entity
  id: UndeterminedVoidsuitParamedic
  name: sélecteur de combinaison rigide de paramédic
  description: Une petite télécommande utilisant la technologie bluespace pour vous livrer une combinaison de votre choix.
  parent: [ BaseItem, BaseSetSelector, BaseMedicalContraband ]
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Devices/unique_teleporters.rsi
    state: standard
  - type: SetSelector
    possibleSets:
    - VoidsuitSelectorParamedicVoidsuit
    - VoidsuitSelectorParamedicHardsuit

