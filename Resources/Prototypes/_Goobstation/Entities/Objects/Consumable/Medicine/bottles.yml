- type: entity
  id: ChemistryBottleHeartbreakerToxin
  suffix: heartbreakertoxin
  parent: BaseChemistryBottleFilled
  components:
  - type: Label
    currentLabel: reagent-name-heartbreakertoxin
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: HeartbreakerToxin
          Quantity: 30

