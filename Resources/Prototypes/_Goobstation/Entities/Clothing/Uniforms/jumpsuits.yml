# durathread jumpsuit
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitDurathread
  name: durathread jumpsuit
  description: A loose worn durathread shirt with a grey pants, its resilient fibres provide some protection to the wearer.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/Civilian/durathread_jumpsuit.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/Civilian/durathread_jumpsuit.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.85
        Heat: 0.85

