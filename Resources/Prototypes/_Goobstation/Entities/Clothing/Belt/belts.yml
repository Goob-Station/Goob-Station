- type: entity
  parent: [ClothingBeltBase]
  id: ClothingBeltWhipping
  suffix: Admeme
  name: ceinture fouet
  description: Là où il y a un fouet, il y a une voie.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Belt/whippingbelt.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Belt/whippingbelt.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
    equippedPrefix: buckled
  - type: Item
    heldPrefix: buckled
  - type: ItemSwitch
    needsPower: false
    defaultState: buckled
    state: "buckled"
    showLabel: true
    states:
      buckled: !type:ItemSwitchState
        verb: buckled
        energyPerUse: 0
        sprite:
          sprite: _Goobstation/Clothing/Belt/whippingbelt.rsi
          state: icon

      punishment: !type:ItemSwitchState
        verb: punishment
        energyPerUse: 0
        sprite:
          sprite: _Goobstation/Clothing/Belt/whippingbelt.rsi
          state: belt-punishment
        components:
        - type: MeleeWeapon
          wideAnimationRotation: -135
          attackRate: 1.5
          damage:
            types:
              Shock: 0
          angle: 60
          animation: WeaponArcThrust
          soundHit:
            path: /Audio/_Goobstation/Weapons/Effects/whip.ogg
            params:
              variation: 0.125
              volume: -0.5
        - type: StaminaDamageOnHit
          damage: 65
          overtime: 15
        soundStateActivate:
          path: /Audio/_Goobstation/Items/card_swipe.ogg

      beating: !type:ItemSwitchState
        verb: beating
        energyPerUse: 0
        sprite:
          sprite: _Goobstation/Clothing/Belt/whippingbelt.rsi
          state: belt-beating
        components:
        - type: MeleeWeapon
          wideAnimationRotation: -135
          attackRate: 1.5
          damage:
            types:
              Blunt: 25
              Structural: 25
          angle: 60
          animation: WeaponArcThrust
          soundHit:
            path: /Audio/_Goobstation/Weapons/Effects/whip.ogg
            params:
              variation: 0.125
              volume: -0.5
        soundStateActivate:
          path: /Audio/_Goobstation/Items/card_swipe.ogg
