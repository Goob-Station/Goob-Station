- type: entity 
  id: ShowHealthRelatedIcons
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Inorganic
    - Silicon
    - SiliconRadiation # Goobstation - Make IPCs take radiation
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  - type: ShowDiseaseIcons

- type: entity
  parent: ClothingEyesHudOmni
  id: ClothingEyesHudChrono
  name: futuristic visor
  description: A visior from the future, capable of displaying almost anything.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Eyes/Hud/chrono.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Eyes/Hud/chrono.rsi

- type: entity
  parent: ClothingEyesHudChrono
  id: ClothingEyesHudChronoUnremoveable
  suffix: Inamovible
  components:
  - type: Unremoveable

- type: entity 
  parent: [ClothingEyesBase, ShowHealthRelatedIcons]
  id: ClothingEyesHudDiagnosticMedical
  name: meddiag hud
  description: Un affichage tête haute combinant informations médicales et de diagnostic.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Eyes/Hud/meddiag.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Eyes/Hud/meddiag.rsi
  - type: Construction
    graph: HudMedDiag
    node: meddiagHud
  - type: Tag
    tags:
    - HudMedicalDiagnostic

- type: entity
  parent: ClothingEyesHudMedical
  id: ClothingEyesHudViro
  name: viro hud
  description: Un HUD médical amélioré avec un scanner de maladies avancé.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Eyes/Hud/viro.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Eyes/Hud/viro.rsi
  - type: ShowDiseaseIcons
    lowThreshold: 1 # very sensitive
    mediumThreshold: 20
    highThreshold: 40

- type: entity
  parent: ClothingEyesHudSyndicate
  id: ClothingEyesHudContractor
  name: contractor visor
  description: L'affichage tête haute professionnel de la guilde, conçu pour mieux détecter les humanoïdes et faciliter leur capture.
  components:
  - type: ThermalVision
    isEquipment: true
    color: "#05570a"
    lightRadius: 15