# Posters

- type: entity
  parent: PosterBase
  id: PosterLegitGoobWorkHard
  name: "Work Hard"
  description: "Si vous travaillez suffisamment dur, VOUS pourriez gagner votre propre Débouchoir Plus Nanotrasen ! Assurez-vous de survivre assez longtemps pour l'échanger !.."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster1_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobMakeshift
  name: "Makeshift Clown Poster"
  description: "A makeshift poster consisting of a crayon drawing upon a paper stuck to the wall with some horrible mix of glue and banana paste. Upon it is inscribed: 'Clowne was herE !!'."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster2_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobCan
  name: "Fallen Can"
  description: "Une affiche vous rappelant de nettoyer après vous, personne n'aime les déchets ! Ou c'est probablement ce que ça veut dire. Ça fait si longtemps qu'elle est là, le sens original a peut-être disparu…"
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster3_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobFaded
  name: "Faded Poster"
  description: "Était-ce une affiche de recherché ? Une prime sur un humain ? Ce n'est pas très clair. Vous pouvez dire, cependant, que la cible n'est probablement plus en liberté..."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster4_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobCandle
  name: "Magic Candle"
  description: "Le feu en vous brûle brillamment. Entretenez-le et prospérez. Négligez-le et dépérissez."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster5_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobSuperMatter
  name: "Super-Matter"
  description: "Nanotrasen's really getting creative with these motivational posters. Using the cause of death of thousands of people as a source of motivation? Brilliant. Now, if only it were actually effective..."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster6_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobWatching
  name: "Always Watching"
  description: "A good reminder that the Station AI is keeping everyone safe by eliminating all semblance of privacy! Aren't you glad it's probably staring at you right now?"
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster7_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobSpaceAsshole
  name: "Space Asshole"
  description: "Une affiche publicitaire pour le film de drame historique sur ce qu'on appelle de nos jours 'L'Incident de 2125'. Le nom de l'affiche vous rappelle quelque chose."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster8_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobSmokeBreak
  name: "Smoke Break"
  description: "Une affiche vous rappelant la durée 'optimale' des pauses cigarettes approuvées par Nanotrasen. Ils l'ont jugée suffisamment longue en raison d'un agent de sécurité qui aurait consommé environ 500 cigarettes en 5 minutes. Elle a été maladroitement modifiée pour tenir compte de son récente augmentation de 10 minutes, demandée quasi-unanimement par les Capitaines de Station sondés. La couleur du fond est légèrement irritante, mais vous ne savez pas trop pourquoi."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster9_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobWallMeat
  name: "Wall Meat"
  description: "The objectively best way to store food is to hide it in the walls where nobody can ever find it! So convenient! So useful! So discrete! So cool! Agreed-upon by vampires everywhere."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster10_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobCoolS
  name: "Cool S"
  description: "It seems some crewmember cut out part of a graffiti'd maintenance closet and stuck it onto this wall. And who can blame them? This thing is siiiick."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster11_legit

- type: entity
  parent: PosterBase
  id: PosterLegitGoobBigBrotherAI
  name: "AI Sees All"
  description: "Une affiche qui vous rappelle que vos secrets ne sont pas cachés à votre IA de Station."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster12_legit

- type: entity
  parent: PosterBase
