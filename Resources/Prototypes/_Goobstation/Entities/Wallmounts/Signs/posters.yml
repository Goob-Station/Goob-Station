  name: "Durk Plushie Advertisement"
  description: "Une affiche représentant une sorte de personnage en peluche bientôt livré dans une station près de chez vous."
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/posters.rsi
    state: goob_poster13_legit

- type: entity
