- type: entity
  id: MobMosquito
  name: mosquito
  parent: MobBee
  description: Pesky little thing. Sucks on blood. Spreads Malaria.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: mosquito
      sprite: _Goobstation/Mobs/Animals/mosquito.rsi
  - type: ActionGrant
    actions:
    - ActionBloodBite
  - type: BloodBite
    shouldPlaySound: false
    bloodDrainAmount: 0.2
    initialBleedMultiplier: 0.25
    startDelay: 0.3
    sipDelay: 0.5
    range: 1.2
    breakOnMove: true
    breakOnDamage: true
    hiddenDoAfter: true
    transferBlood: true
    healSpecifier:
      types:
        Blunt: -1
  - type: NpcFactionMember
    factions:
    - Passive
  - type: GhostRole
    makeSentient: false
    allowSpeech: false
    allowMovement: true
    name: ghost-role-information-critter-name
    description: ghost-role-information-critter-description
    rules: ghost-role-information-freeagent-rules
  - type: GhostTakeoverAvailable
  - type: GrantDisease
    baseDisease: DiseaseBaseMouse
    complexity: 45
    possibleTypes:
    - Viral
  - type: DiseaseOnHit
    spreadParams:
      chance: 0.05 # Very small
      power: 2
      spreadType: Blood
  - type: LanguageKnowledge # Einstein Engines - Language
    speaks:
    - Xeno
    understands:
    - Xeno
    - TauCetiBasic

- type: entity
  id: MobAngryMosquito
  name: mosquito
  suffix: Angry
  parent: MobMosquito
  description: Nasty little thing. Will bite anything it can come across.
  components:
  - type: CombatMode
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 1
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: BloodBite
    bloodDrainAmount: 1.5
    initialBleedMultiplier: 0.4
    startDelay: 1
    sipDelay: 0.5
    range: 1.3
    breakOnMove: false
    breakOnDamage: false
    hiddenDoAfter: true
    transferBlood: true
    healSpecifier:
      types:
        Blunt: -1.5
