# Visiting scurrets from Planet Wawa shuttle

# Captain
- type: entity
  name: Captain Scurret
  id: MobCaptainScurret
  parent: MobEmotionalSupportScurret
  description: Commonly known as Wawa, from the wetlands of Planet Wawa, this one seems to be a Captain of its own little shuttle!
