- type: entity
  parent: [BaseItem, BaseCentcommContraband]
  id: BSOManual
  name: manuel de Kung Fu Dragon Nanotrasen
  description: Un manuel avec des instructions de Kung Fu Dragon, art martial approuvé par Nanotrasen pour les gardes du corps d'élite.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/martial_arts.rsi
    layers:
    - state: dragon
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: GrantKungFuDragon
  - type: GuideHelp
    guides:
    - DragonKungFu

- type: entity
  parent: [BaseItem, BaseCentcommContraband]
  id: HandheldCrewMonitorBSO
  name: moniteur de commande portable
  description: Un moniteur d'équipage portable modifié pour les besoins des officiers bouclier bleu. Conçu pour injecter un dispositif de suivi dans le personnel de commandement et vous alerter lorsqu'ils sont en danger. Fonctionne avec une cellule à micro-réacteur intégrée.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Security/bso_monitor.rsi
    state: scanner
  - type: Item
    size: Small
  - type: CrewMonitorScanning
    whitelist:
      components:
      - CommandStaff
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 1000
  - type: Tag
    tags:
    - HandheldCrewMonitor
  - type: Speech
    speechSounds: Borg
