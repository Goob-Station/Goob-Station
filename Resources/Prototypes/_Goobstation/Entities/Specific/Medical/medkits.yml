- type: entity
  name: stylo médical de combat avancé
  parent: ChemicalMedipen
  id: AdvancedCombatMedipen
  description: Un stylo médical à usage unique contenant des produits chimiques extraits de bêtes éldritchiques. # sang de dragon spatial éthiquement sourcé
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: advcombatpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: advcombatpen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 40
        reagents:
        - ReagentId: Ichor
          Quantity: 35
        - ReagentId: TranexamicAcid
          Quantity: 5
  - type: Hypospray
    solutionName: pen
    transferAmount: 40
    onlyAffectsMobs: false
    injectOnly: true
  - type: StaticPrice
    price: 500
  - type: Tag
    tags:
    - Medipen

- type: entity
  name: trousse médicale tactique
  description: Contient tout ce dont vous avez besoin pour remettre quelqu'un sur pied rapidement.
  parent: Medkit
  id: MedkitBSO
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    state: bsokit
  - type: Item
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: bsokit
    size: Normal
  - type: Storage
    defaultStorageOrientation: Vertical

- type: entity
  name: trousse de réparation tactique
  description: Contient tout ce dont vous avez besoin pour remettre un silicium sur pied rapidement.
  parent: MedkitBSO
  id: MedkitBSOIPC
  components:
  - type: Sprite
    state: bsokit-ipc
  - type: Item
    heldPrefix: bsokit-ipc

- type: entity
  name: trousse médicale de combat
  description: Contient la plupart des médicaments dont vous avez besoin pour récupérer des blessures et des maladies, le tout sous forme pratique de pilules.
  parent: Medkit
  id: MedkitCombatBlue
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    state: blackbluekit
  - type: Item
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: blackbluekit
    size: Normal

- type: entity
  name: trousse médicale de combat
  description: Pour les IPC parmi nous.
  parent: Medkit
  id: MedkitCombatPurple
  components:
  - type: Sprite
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    state: blackpurplekit
  - type: Item
    sprite: /Textures/_Goobstation/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: blackpurplekit
    size: Normal
  - type: Storage
    defaultStorageOrientation: Vertical
