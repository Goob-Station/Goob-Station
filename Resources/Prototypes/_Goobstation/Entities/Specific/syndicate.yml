- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: CQCManual
  name: vieux manuel
  description: Un petit manuel noir. Il y a des instructions dessinées de combat tactique au corps à corps.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
    layers:
    - state: icon
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: GrantCqc
  - type: GuideHelp
    guides:
    - CQC

- type: entity
  parent: [ BaseItem, BaseSyndicateContraband ]
  id: SleepingCarpScroll
  name: parchemin mystérieux
  description: Un parchemin rempli de marques étranges. Il semble y avoir des dessins d'une sorte d'art martial.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/scroll.rsi
    layers:
    - state: scroll2
  - type: Item
    sprite: _Goobstation/Wizard/Objects/scroll.rsi
    size: Small
  - type: StaticPrice
    price: 3000
  - type: GrantSleepingCarp
  - type: GuideHelp
    guides:
    - SleepingCarp

- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: CapoeiraManual
  name: manuel de chorégraphie
  description: Manuel de chorégraphie — ou du moins c'est ce qu'il prétend. Chaque deuxième page se termine avec quelqu'un par terre, pas en train de danser.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/martial_arts.rsi
    layers:
    - state: capoeira
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: GrantCapoeira
  - type: GuideHelp
    guides:
    - Capoeira
