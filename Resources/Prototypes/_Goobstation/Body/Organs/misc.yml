- type: entity
  parent: [ OrganHumanHeart, BaseSyndicateContraband ]
  id: OrganHeartSandevistan
  name: Sandevistan
  description: Cyberware illégal qui remplace le cœur de l'utilisateur et lui permet d'augmenter considérablement sa vitesse au détriment de son endurance.
  components:
  - type: Cybernetics
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/sandevistan.rsi
    state: icon
    scale: 0.5, 0.5
  - type: Organ
    onAdd:
    - type: SandevistanUser

- type: entity
  parent: [OrganHumanHeart, BaseSyndicateContraband]
  id: SyndicateBerserkerHeart
  name: cœur berserker
  description: Un noyau circulatoire de combat de nouvelle génération qui permet à l'utilisateur d'entrer en état de berserker, augmentant considérablement sa vitesse et ses réflexes pour un court moment au détriment de l'endurance et d'une partie de la résistance à la douleur. Hautement illégal.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/berserker_heart.rsi
    state: icon
    scale: 0.5, 0.5
  - type: OrganActions
    actions:
    - ActionActivateBerserkerImplant

- type: entity
  parent: [OrganHumanHeart, BaseSyndicateContraband]
  id: SyndicateJumpstarterHeart
  name: cœur propulseur
  description: Un noyau circulatoire de combat de nouvelle génération qui injecte une grande quantité d'omnizine dans le flux sanguin de l'utilisateur lorsqu'il est gravement blessé, le sauvant de la mort. Hautement illégal.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/jumpstarter_heart.rsi
    state: icon
    scale: 0.5, 0.5
  - type: Organ
    onAdd:
    - type: InjectOnMobState
      reagents:
        Omnizine: 75
        TranexamicAcid: 5
        DexalinPlus: 15
