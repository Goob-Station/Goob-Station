- type: entity
  id: ActionHasturDevour
  name: Dévorer
  description: Dévorez instantanément un humain...
  components:
  - type: Action
    useDelay: 150
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: devour
  - type: TargetAction
    range: 2
    deselectOnMiss: true
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - HumanoidAppearance
      - Body
    event: !type:HasturDevourEvent

- type: entity
  id: ActionHasturLash
  name: Flageller
  description: Fouettez une cible à distance, la faisant tomber à genoux.
  components:
  - type: Action
    useDelay: 25
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: ranged_tentacle
  - type: TargetAction
    range: 10
    deselectOnMiss: true
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - HumanoidAppearance
    event: !type:HasturLashEvent

- type: entity
  id: ActionInsanityAura
  name: Aura d'Insanité
  description: Rend tout le monde légèrement fou autour de vous...
  components:
  - type: Action
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Misc/Hastur/Void_Song.ogg
    useDelay: 60
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: insanity_aura
  - type: InstantAction
    event: !type:InsanityAuraEvent

- type: entity
  id: ActionMassWhisper
  name: Chuchotement de Masse
  description: Pénétrez dans l'esprit de tous les êtres et chuchotez-les jusqu'à la folie...
  components:
  - type: Action
    useDelay: 360
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: mass_whisper
  - type: InstantAction
    event: !type:MassWhisperEvent

- type: entity
  id: ActionVeilOfTheVoid
  name: Voile du vide
  description: Disparaissez/Manifestez-vous depuis le vide pour traquer votre proie...
  components:
  - type: Action
    useDelay: 25
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: veil_void
  - type: InstantAction
    event: !type:VeilOfTheVoidEvent

- type: entity
  id: ActionOmnipresence
  name: Omniprésence
  description: Choisissez d'être partout à la fois.
  components:
  - type: Action
    useDelay: 60
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: omnipresence
  - type: InstantAction
    event: !type:OmnipresenceEvent

- type: entity
  id: ActionHasturClone
  name: Cloner
  description: Divisez-vous en deux, laissant derrière vous une ombre temporaire de votre présence.
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30
    icon:
      sprite: _Goobstation/Hastur/actions.rsi
      state: clone
  - type: TargetAction
    range: 5
  - type: WorldTargetAction
    event: !type:WorldSpawnSpellEvent
    prototypes:
    - id: MobHasturClone
      amount: 1
      offset: 0, 1
