- type: entity
  id: SprintAnimation
  categories: [ HideSpawnMenu ]
  name: nuage de poussière
  description: Attention, gare !
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _Goobstation/Effects/sprinting.rsi
    layers:
      - map: [ "enum.SprintVisualLayers.Base" ]
        sprite: _Goobstation/Effects/sprinting.rsi
        state: sprint_cloud
  - type: TimedDespawn
    lifetime: 0.48
  - type: Tag
    tags:
      - HideContextMenu
  - type: AnimationPlayer

