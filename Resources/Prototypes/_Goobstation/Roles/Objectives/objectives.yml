- type: entity
  parent: BaseObjective
  name: Protéger la maintenance.
  description: La maintenance de cette station est votre foyer depuis aussi longtemps que vous vous en souvenez. Vous vous cachez dans des casiers depuis toujours — jusqu'à maintenant. Ces envahisseurs ont violé votre domicile pour la dernière fois. Tuez quiconque ose perturber votre chez-vous.
  id: TunnelClownProtectMaintenanceObjective
  components:
  - type: Objective
    icon:
      sprite: Clothing/Mask/clown.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-unknown
  - type: RoleplayObjective

- type: entity
  parent: BaseObjective
  name: Prêcher la parole du Seigneur Singuloth !
  description: Tu dois trouver le département d'ingénierie de cette station et convertir ces gens en fidèles de Singuloth. S'ils refusent, ils doivent être exécutés sans merci.
  id: SingulothKnightPreachObjective
  components:
  - type: Objective
    icon:
      sprite: Objects/Specific/Chapel/bible.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-lord-singuloth
  - type: RoleplayObjective

- type: entity
  parent: BaseObjective
  name: Agrandir la singularité
  description: Tu dois honorer le seigneur Singuloth en agrandissant (sans lâcher) la singularité — plus c'est grand, mieux c'est !
  id: SingulothKnightSingularityObjective
  components:
  - type: Objective
    icon:
      sprite: Objects/Weapons/Melee/singularityhammer.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-lord-singuloth
  - type: RoleplayObjective

- type: entity
  parent: BaseObjective
  name: Supprimer tout tesla de la station
  description: Si cette station possède un tesla, tu dois le détruire par tous les moyens et exécuter son créateur pour cette offense au seigneur Singuloth !
  id: SingulothKnightTeslaObjective
  components:
  - type: Objective
    icon:
      sprite: _Goobstation/Clothing/Head/Hardsuits/singulothhelm.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-lord-singuloth
  - type: DestroyTheTeslaObjective

- type: entity
  parent: BaseObjective
  name: Avoir un duel épique !
  description: Ces autres agents du Syndicat ne te prennent pas au sérieux — prouve-leur le contraire en remportant un duel contre un adversaire digne !
  id: DarkLordDuelObjective
  components:
  - type: Objective
    icon:
      sprite: Objects/Weapons/Melee/e_sword.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-syndicate
  - type: RoleplayObjective

- type: entity
  parent: BaseObjective
  name: Tuer le Seigneur des Ténèbres
  description: Vous avez été envoyé sur cette station par Nanotrasen pour tuer un Seigneur des Ténèbres. Ne les décevez pas !
  id: ChosenOneKillDarkLordObjective
  components:
  - type: Objective
    icon:
      sprite: Objects/Weapons/Melee/e_sword.rsi
      state: icon
    difficulty: 1
    issuer: objective-issuer-nanotrasen
  - type: KillTheDarkLordObjective

- type: entity
  parent: BaseObjective
  name: Engager un apprenti
  description: Vous avez besoin d'un apprenti — engagez-en un ! Inutile que ce soit la personne que vous protégez !
