- type: entity
  id: BaseCarving
  name: gravure ancienne
  description: Une collection de symboles inconnus qui vous rappellent des jours depuis longtemps oubliés...
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    drawdepth: FloorEffects
    sprite: _Goobstation/Heretic/carvings.rsi
    color: '#FFFFFF14'
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        hard: false
        mask:
          - ItemMask
        layer:
          - SlipLayer
  - type: Physics
    bodyType: Static
  - type: WizardTrap # Wizard cuz yeah
    canReveal: false
    ignoredEntityWhitelist:
      components:
      - Ghoul
  - type: Tag
    tags:
    - HideContextMenu
    - HereticCarving
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Goobstation/Heretic/runebreak.ogg

- type: entity
  parent: BaseCarving
  id: GraspingCarving
  name: gravure tentaculaire
  description: Quand on marche dessus, inflige de lourds dégâts aux jambes et étourdit la victime pendant 5 secondes. Possède 1 charge.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: tentacle_rune
  - type: WizardTrap
    timeBetweenTriggers: 45
    triggerSound:
      path: /Audio/_Goobstation/Heretic/demon_attack1.ogg
    stunTime: 5
  - type: DamageTrap
    damage:
      types:
        Blunt: 20

- type: entity
  parent: BaseCarving
  id: MadCarving
  name: gravure folle
  description: Quand on marche dessus, inflige de lourds dégâts d'endurance, aveugle et rend muet la victime. Possède 2 charges.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: madness_rune
  - type: WizardTrap
    timeBetweenTriggers: 20
    charges: 2
    triggerSound:
      path: /Audio/_Goobstation/Heretic/blind.ogg
  - type: MadCarving

- type: entity
  parent: BaseCarving
  id: AlertCarving
  name: gravure d'alerte
  description: Une rune quasiment invisible qui, lorsqu'on marche dessus, alerte le sculpteur de son déclenchement et de sa localisation, et lui permet de se téléporter à l'emplacement de la gravure.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    color: '#FFFFFF0a'
    state: alert_rune
  - type: WizardTrap
    sparks: false
    silent: true
    stunTime: 0
    charges: 50
    ignoredEntityWhitelist:
      components: []
    targetedEntityWhitelist:
      components:
      - HumanoidAppearance
      - BorgChassis
  - type: AlertCarving

- type: runeCarving
  id: GraspingCarving
  desc: Grasping Carving. When stepped on, causes heavy damage leg damage and stuns the victim for 5 seconds. Has 1 charge.
  icon:
    sprite: _Goobstation/Heretic/carvings.rsi
    state: tentacle_rune
  protoId: GraspingCarving

- type: runeCarving
  id: MadCarving
  desc: Mad Carving. When stepped on, causes heavy stamina damage, blindness, and muteness the victim. Has 2 charges.
  icon:
    sprite: _Goobstation/Heretic/carvings.rsi
    state: madness_rune
  protoId: MadCarving

- type: runeCarving
  id: AlertCarving
  desc: Alert Carving. A nearly invisible rune that, when stepped on, alerts the carver who triggered it and where, also allowing them to teleport to rune location.
  icon:
    sprite: _Goobstation/Heretic/carvings.rsi
    state: alert_rune
  protoId: AlertCarving
