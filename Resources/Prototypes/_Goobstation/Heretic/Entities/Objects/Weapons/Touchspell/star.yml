- type: entity
  id: TouchSpellStar
  name: toucher des étoiles
  description: Une aura sinistre qui distord le flux de la réalité autour d'elle. Relie les personnes portant une marque stellaire à vous via un rayon cosmique et les force à dormir 8 secondes après une connexion suffisamment longue. Marque d'une étoile cosmique ceux qui n'en ont pas encore.
  categories: [ HideSpawnMenu ]
  components:
  - type: Unremoveable
  - type: Item
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/star_touch.rsi
    state: icon
  - type: PointLight
    enabled: true
    radius: 2
    energy: 1
    color: "#4E2952"
