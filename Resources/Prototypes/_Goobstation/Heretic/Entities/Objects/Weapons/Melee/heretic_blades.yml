- type: entity
  parent: [ BaseItem, BaseMagicalContraband ]
  id: HereticBladeBaseNoTeleport
  abstract: true
  name: lame eldritch
  description: Une lame en croissant d'un vert maladif, ornée d'un œil décoratif. Vous avez l'impression d'être observé...
  components:
  - type: UnholyItem
  - type: HereticBlade
  - type: Sharp
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/eldritch_blade.rsi
    state: icon
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
  - type: MeleeWeapon
    wideAnimationRotation: -125
    damage:
      types:
        Slash: 20
      armorPenetration: 0.3
      woundSeverityMultipliers:
        Slash: 1.5
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Normal
    sprite: _Goobstation/Heretic/Blades/eldritch_blade-inhands.rsi
  - type: Scalpel
    speed: 1.5
  - type: BoneSaw
    speed: 1.5
  - type: Tag
    tags:
    - HereticItem
    - HereticBlade

- type: entity
  id: BaseRandomTeleportBlade
  abstract: true
  components:
  - type: RandomTeleport
    radius:
      min: 10
      max: 100

- type: entity
  parent: [ HereticBladeBaseNoTeleport, BaseRandomTeleportBlade ]
  id: HereticBladeBase

- type: entity
  parent: HereticBladeBase
  id: HereticBladeAsh
  name: lame cendrée
  description: Fondue et informe, une masse de métal tordu en cendres et en scories. Inachevée, elle aspire à être plus qu'elle n'est, et taille des blessures pleines de suie avec un tranchant émoussé.
  suffix: Cendres
  components:
  - type: HereticBlade
    path: Ash
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_ash.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_ash-inhand.rsi
  - type: Cautery
    speed: 1.5

- type: entity
  parent: HereticBladeBase
  id: HereticBladeBlade
  name: lame brisée
  description: Une lame vaillante, brisée et déchirée. Furieusement, la lame taille. Des cicatrices d'argent la lient pour toujours à son sombre dessein.
  suffix: Lame
  components:
  - type: HereticBlade
    path: Blade
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_blade.rsi
    layers:
    - state: icon
      map: [ "base" ]
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_blade-inhand.rsi
  - type: Tag
    tags:
    - HereticItem
    - HereticBlade
    - HereticBladeBlade
  - type: Multihit
    damageMultiplier: 0.75
    multihitWhitelist:
      tags:
      - HereticBladeBlade
    conditions:
    - !type:MultihitUserHereticEvent
      requiredPath: Blade
      minPathStage: 7
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.InfusedBladeVisuals.Infused:
        base:
          False: { state: icon }
          True: { state: infused }

# Ghoul blade (cannot teleport)
- type: entity
  parent: HereticBladeBaseNoTeleport
  id: HereticBladeFleshGhoul
  name: lame goule
  description: Une lame en croissant née d'une créature corrompue par la chair. Pleinement consciente, elle cherche à répandre aux autres la souffrance qu'elle a endurée lors de ses terribles origines.
  suffix: Goule de Chair
  components:
  - type: HereticBlade
    path: Flesh
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_flesh.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_flesh-inhand.rsi

- type: entity
  parent: [HereticBladeFleshGhoul, BaseRandomTeleportBlade]
  id: HereticBladeFlesh
  name: lame sanglante
  suffix: Chair

- type: entity
  parent: HereticBladeBase
  id: HereticBladeLock
  name: lame-clé
  description: Une lame et une clé — clé de quoi ? Quelles grandes portes ouvre-t-elle ?
  suffix: Verrou
  components:
  - type: HereticBlade
    path: Lock
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_lock.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_lock-inhand.rsi

- type: entity
  parent: HereticBladeBase
  id: HereticBladeRust
  name: lame rouillée
  description: Cette lame en croissant est décrépite, rongée par la rouille. Pourtant elle mord encore, déchirant chair et os avec des dents dentelées et pourries.
  suffix: Rouille
  components:
  - type: HereticBlade
    path: Rust
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_rust.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_rust-inhand.rsi

- type: entity
  parent: HereticBladeBase
  id: HereticBladeVoid
  name: lame du vide
  description: Dépourvue de toute substance, cette lame ne reflète que le néant. C'est une véritable incarnation de la pureté — et du chaos qui s'ensuit après son utilisation.
  suffix: Vide
  components:
  - type: HereticBlade
    path: Void
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_void.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_void-inhand.rsi

- type: entity
  parent: HereticBladeBase
  id: HereticBladeCosmos
  name: lame cosmique
  description: Une parcelle de résonance céleste, façonnée en lame tissée d'étoiles. Un exilé iridescent qui trace des sillons radieux, cherchant désespérément l'unification.
  suffix: Cosmos
  components:
  - type: HereticBlade
    path: Cosmos
  - type: Sprite
    sprite: _Goobstation/Heretic/Blades/blade_cosmos.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Blades/blade_cosmos-inhand.rsi
