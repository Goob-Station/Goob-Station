- type: entity
  parent: [ ClothingNeckBase, BaseMagicalContraband ]
  id: ClothingNeckAmberFocus
  name: focalisant en ambre
  description: Un verre focalisant en ambre qui ouvre un lien avec le monde au-delà. Le collier semble tressaillir, mais seulement quand vous le regardez du coin de l'œil.
  suffix: ObjetMagique
  components:
  - type: UnholyItem
  - type: HereticMagicItem
  - type: Sprite
    sprite: _Goobstation/Heretic/amber_focus.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/amber_focus.rsi
  - type: Armor
    modifiers:
      coefficients:
        Holy: 1.25

- type: entity
  parent: ClothingNeckAmberFocus
  id: ClothingEldritchMedalion
  name: médaillon eldritch chaleureux
  description: Un médaillon étrange. En regardant à travers sa surface cristalline, le monde autour de vous se dissout. Vous voyez votre propre cœur qui bat, et les pulsations d'un millier d'autres.
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/eldritch_medalion.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/eldritch_medalion.rsi
  - type: ThermalVision
    thermalShader: null
    isEquipment: true
    isActive: true
    color: white
    drawOverlay: false
    lightRadius: 0
    toggleAction: null
  - type: HereticClothing
