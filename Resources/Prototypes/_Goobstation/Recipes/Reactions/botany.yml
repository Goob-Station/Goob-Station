- type: reaction
  id: OrganicPotash
  minTemp: 354
  reactants:
    Lye: # changed cause wiz added Lye. Apparently lye and potash are similar?
      amount: 2   # wikipedia tells me potash = 2KOH + CO2 -> K2CO3 + H2O . Potassium presumably in the Lye(?) so fuck it.
    CarbonDioxide:
      amount: 1
  products:
    Potash: 1 # todo, fuck chemistry? this is kind of a shit yield, but if you want to change it make up a good reason first.
    Water: 1

- type: reaction
  id: Potash
  reactants:
    Potassium:
      amount: 1
    Chlorine:
      amount: 1
    SulfuricAcid:
      amount: 1
  products:
    Potash: 2

- type: reaction
  id: Saltpeter
  reactants:
    EZNutrient:
      amount: 1
    Potash:
      amount: 1
    Nitrogen:
      amount: 1
  products:
    Saltpeter: 2 # Trauma - Can we all admit a 3:1 yield sucks? Also done to make nitric acid less painful to make
    Water: 1
