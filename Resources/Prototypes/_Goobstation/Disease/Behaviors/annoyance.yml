- type: entity
  id: DiseaseBehaviorVomit
  parent: DiseaseBehaviorBase
  name: Vomissements
  description: Vous fait vomir périodiquement.
  components:
  - type: DiseaseEffect
    complexity: 12 # can make you constantly hungry
  - type: DiseaseReagentEffect
    timeScale: false
    effects:
    - !type:ChemVomit
  # also a low-power infect
  - type: DiseaseSpreadEffect
    arc: 360
    range: 2
    timeScale: false
    spreadParams:
      power: 0.5
      chance: 0.5
      spreadType: Aerial
  - type: DiseasePeriodicCondition
    delayMin: 20
    delayMax: 60

- type: entity
  id: DiseaseBehaviorFeelUnwell
  parent: DiseaseBehaviorBase
  name: Malaise général
  description: Vous donne une sensation de malaise.
  components:
  - type: DiseaseEffect
    complexity: 4 # just an annoyance
  - type: DiseasePopupEffect
    string: disease-effect-popup-default
  - type: DiseasePeriodicCondition
    delayMin: 30
    delayMax: 60
  - type: DiseaseProgressCondition
    minProgress: 0.4

- type: entity
  id: DiseaseBehaviorHeadache
  parent: DiseaseBehaviorBase
  name: Maux de tête
  description: Vous donne des maux de tête qui peuvent rendre le travail plus difficile.
  components:
  - type: DiseaseEffect
    complexity: 8 # very annoying
  - type: DiseasePopupEffect
    string: disease-effect-popup-headache
  - type: DiseasePeriodicCondition
    delayMin: 3
    delayMax: 12
  - type: DiseaseFlashEffect
    timeScale: false

- type: entity
  id: DiseaseBehaviorGravitosisA
  parent: DiseaseBehaviorBase
  name: Gravitose A
  description: Symptôme de maladie rare et exotique qui fait tourbillonner des objets autour de vous.
  components:
  - type: DiseaseEffect
    complexity: 14 # doesn't do that much but very annoying
  - type: DiseaseGenericEffect
    timeScale: false
    component: GravityWell
    defaults:
      BaseTangentialAcceleration: 6
  - type: GravityWell
    maxRange: 4

- type: entity
  id: DiseaseBehaviorGravitosisB
  parent: DiseaseBehaviorBase
  name: Gravitose B
  description: Symptôme de maladie rare et exotique qui attire des objets vers vous.
  components:
  - type: DiseaseEffect
    complexity: 14 # doesn't do that much but very annoying
  - type: DiseaseGenericEffect
    timeScale: false
    component: GravityWell
    defaults:
      BaseRadialAcceleration: 6
  - type: GravityWell
    maxRange: 4

- type: entity
  id: DiseaseBehaviorGravitosisC
  parent: DiseaseBehaviorBase
  name: Gravitose C
  description: Symptôme de maladie rare et exotique qui repousse des objets loin de vous.
  components:
  - type: DiseaseEffect
    complexity: 14 # doesn't do that much but very annoying
  - type: DiseaseGenericEffect
    timeScale: false
    component: GravityWell
    defaults:
      BaseRadialAcceleration: -6
  - type: GravityWell
    maxRange: 4

- type: entity
  id: DiseaseBehaviorOwO
  parent: DiseaseBehaviorBase
  name: OwOification
  description: Symptôme de maladie rare et exotique qui vous fait vocaliser comme un chat.
  components:
  - type: DiseaseEffect
    complexity: 14 # doesn't do that much but very annoying
  - type: DiseaseGrantComponentEffect
    components:
    - type: OwOAccent
