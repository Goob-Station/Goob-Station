- type: entity
  id: DiseaseBehaviorCough
  parent: DiseaseBehaviorBase
  name: Cough
  description: Makes you cough. Infective.
  components:
  - type: DiseaseEffect
    complexity: 6
  - type: DiseasePeriodicCondition
    delayMin: 5
    delayMax: 20
  - type: DiseaseEmoteEffect
    emote: Cough
  - type: DiseaseSpreadEffect
    arc: 180
    range: 3.5
    timeScale: false
    spreadParams:
      power: 1
      chance: 0.5
      spreadType: Aerial

- type: entity
  id: DiseaseBehaviorSpreadOnContact
  parent: DiseaseBehaviorBase
  name: collide spread
  description: can now transmit on contact
  components:
  - type: DiseaseEffect
    complexity: 20 # incresed spread
  - type: DiseaseOnCollide
    whitelist:
      components:
      - DiseaseCarrier # standard target
    spreadParams:
      chance: 1
      power: 1
      spreadType: Blood

- type: entity
  id: DiseaseBehaviorSpreadOnContactIgnorePuddles
  parent: DiseaseBehaviorSpreadOnContact
  name: collide spread
  description: can now transmit on contact
  components:
  - type: DiseaseOnCollide
    blacklist:
      components:
      - puddle
