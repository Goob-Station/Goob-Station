- type: entity
  id: DiseaseBehaviorCancer
  parent: DiseaseBehaviorBase
  name: Cancer
  description: Deals genetic damage over time.
  components:
  - type: DiseaseEffect
    complexity: 40
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Cellular: 0.2

- type: entity
  id: DiseaseBehaviorPoison
  parent: DiseaseBehaviorBase
  name: Poison
  description: Deals poison damage over time.
  components:
  - type: DiseaseEffect
    complexity: 20
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Poison: 0.3

- type: entity
  id: DiseaseBehaviorBlunt
  parent: DiseaseBehaviorBase
  name: Tissue degradation
  description: Deals blunt damage over time.
  components:
  - type: DiseaseEffect
    complexity: 15
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Blunt: 0.5

- type: entity
  id: DiseaseBehaviorNecrosis
  parent: DiseaseBehaviorBase
  name: Necrosis
  description: In the final stages, it deals heavy poison and blood loss damage over time.
  components:
  - type: DiseaseEffect
    complexity: 40
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Poison: 1.5
          Bloodloss: 5
  - type: DiseaseProgressCondition
    minProgress: 0.8

- type: entity
  id: DiseaseBehaviorPulmonaryEdema
  parent: DiseaseBehaviorBase
  name: Pulmonary edema
  description: Deals asphyxiation damage over time.
  components:
  - type: DiseaseEffect
    complexity: 14
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Asphyxiation: 3
  - type: DiseaseProgressCondition
    minProgress: 0.5

- type: entity
  id: DiseaseBehaviorInternalBleeding
  parent: DiseaseBehaviorBase
  name: Internal bleeding
  description: In the final stages, deals piercing damage over time and reduces the amount of blood in the body.
  components:
  - type: DiseaseEffect
    complexity: 14
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Piercing: 0.5
    - !type:ModifyBloodLevel
      amount: -8
  - type: DiseaseProgressCondition
    minProgress: 0.8

- type: entity
  id: DiseaseBehaviorAnemia
  parent: DiseaseBehaviorBase
  name: Anemia
  description: In the final stages, deals heavy asphyxiation damage over time.
  components:
  - type: DiseaseEffect
    complexity: 40
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Asphyxiation: 8
    - !type:ModifyBloodLevel
      amount: -3
  - type: DiseaseProgressCondition
    minProgress: 0.9

- type: entity
  id: DiseaseBehaviorOrganFailure
  parent: DiseaseBehaviorBase
  name: Organ Failure
  description: In the final stage, there is a chance of instant death
  components:
  - type: DiseaseEffect
    complexity: 40
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      useTargeting: false
      probability: 0.01
      damage:
        types:
          Bloodloss: 200
  - type: DiseaseProgressCondition
    minProgress: 1

# this is broken and hits the owning entity but i'm leaving it here so someone can fix it
- type: entity
  id: DiseaseBehaviorGunemia
  parent: DiseaseBehaviorBase
  name: Gunemia
  description: Makes you cough bullets. Mechanism unknown.
  components:
  - type: DiseaseEffect
    complexity: 30
  - type: DiseaseGenericEffect
    component: Gun
    timeScale: false
    defaults:
      FireRate: 0.2
  - type: HTN
    rootTask:
      task: TurretCompound
    blackboard:
      RotateSpeed: !type:Single
        3.141
  - type: CombatMode
    toggleMouseRotator: false
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Gun
    fireRate: 0.1
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Voice/Human/male_cough_1.ogg
  - type: BallisticAmmoProvider
    proto: CartridgeCaselessRifle
    capacity: 1000000
