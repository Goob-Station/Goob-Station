- type: diseaseSpread
  id: Debug
  name: Débogage

- type: entity
  abstract: true
  id: DiseaseBehaviorDebug
  parent: DiseaseBehaviorBase
  components:
  - type: DiseaseEffect

- type: entity
  id: DiseaseBehaviorTurboCancer
  parent: DiseaseBehaviorDebug
  name: turbocancer
  description: Inflige des dégâts génétiques et contondants dans le temps. En peu de temps.
  components:
  - type: DiseaseEffect
    complexity: 1000
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      scaleByQuantity: false
      damage:
        types:
          Cellular: 50
          Blunt: 50

- type: entity
  id: DiseaseBehaviorSpreadDebug
  parent: DiseaseBehaviorDebug
  name: propagation debug
  description: La peste.
  components:
  - type: DiseaseEffect
    complexity: 1000
  - type: DiseasePeriodicCondition
    delayMin: 1
    delayMax: 2
  - type: DiseaseVomitEffect
    severityScale: false
    progressScale: false
    timeScale: false
  - type: DiseaseSpreadEffect
    arc: 180
    range: 4

- type: entity
  id: DiseaseBehaviorForceSpreadDebug
  parent: DiseaseBehaviorDebug
  name: propagation oméga
  description: Les mondes vont pourrir. # [x] sufficiently edgy description
  components:
  - type: DiseaseEffect
    complexity: 1000
  - type: DiseaseChanceCondition # mostly for performance concerns
    chance: 1
    timeScale: false
  - type: DiseaseForceSpreadEffect
    range: 1.5
    chance: 1
    severityScale: false
    spreadParams:
      chance: 1
      power: 1
      spreadType: Debug

- type: entity
  id: DiseaseBehaviorTurboBlunt
  parent: DiseaseBehaviorBase
  name: poison
  description: Inflige beaucoup de dégâts contondants dans le temps.
  components:
  - type: DiseaseEffect
    complexity: 1000
  - type: DiseaseReagentEffect
    effects:
    - !type:HealthChange
      scaleByQuantity: false
      damage:
        types:
          Blunt: 50

- type: entity
  id: DiseaseBehaviorDeconstructFloor
  parent: DiseaseBehaviorBase
  name: arrachage de tuile
  description: Déconstruit le sol.
  components:
  - type: DiseaseEffect
    complexity: 80
  - type: DiseaseChanceCondition
    chance: 1
  - type: DiseasePryTileEffect
    range: 2

- type: entity
  id: DiseaseTurboCancer
  parent: DiseaseBase
  name: turbo cancer
  description: Inflige beaucoup de dégâts génétiques à l'infecté. Mieux vaut préparer les funérailles.
  components:
  - type: Disease
    infectionRate: 0.1
    affectsDead: true
    canGainImmunity: false
    genotype: 42069
    effects:
      DiseaseBehaviorTurboCancer: 1
      DiseaseBehaviorFightImmunity: 1
      DiseaseBehaviorSpreadDebug: 1

- type: entity
  id: DiseaseTheRot
  parent: DiseaseBase
  name: la pourriture
  description: Si vous lisez ceci, vous avez invoqué la colère des dieux.
  components:
  - type: Disease
    infectionRate: 0.003
    immunityGainRate: 0
    mutationRate: 0
    affectsDead: true
    canGainImmunity: false
    genotype: 9001
    effects:
      DiseaseBehaviorTurboBlunt: 0.5
      DiseaseBehaviorFightImmunity: 1
      DiseaseBehaviorForceSpreadDebug: 0.5
      DiseaseBehaviorDeconstructFloor: 0.25

- type: entity
  id: MeleeDebugInfectTurboCancer
  parent: MeleeDebugGib
  name: bâton de turbocancer
  description: Besoin d'un avant-goût de Tchernobyl ?
  components:
  - type: Tag
    tags:
      - Debug
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: DiseaseOnHit
    disease: DiseaseTurboCancer

- type: entity
  id: MeleeDebugInfectTheRot
  parent: MeleeDebugGib
  name: bâton de la pourriture
  description: Détruit tout. Non, vraiment.
  components:
  - type: Tag
    tags:
      - Debug
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: DiseaseOnHit
    disease: DiseaseTheRot

- type: entity
  id: MeleeDebugInfectFlu
  parent: MeleeDebugGib
  name: bâton de grippe
  description: Vous donne la grippe. Et les gens se demandent d'où ça vient.
  components:
  - type: Tag
    tags:
      - Debug
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: DiseaseOnHit
    disease: DiseaseFlu

- type: entity
  id: MeleeDebugInfectGravitosisA
  parent: MeleeDebugGib
  name: bâton de gravitose
  description: Vous donne la gravitose A.
  components:
  - type: Tag
    tags:
      - Debug
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: DiseaseOnHit
    disease: DiseaseGravitosisA

- type: entity
  id: MeleeDebugInfectGunemia
  parent: MeleeDebugGib
  name: bâton de gunémie
