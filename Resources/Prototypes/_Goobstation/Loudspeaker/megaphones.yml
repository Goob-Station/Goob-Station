- type: entity
  parent: BaseItem
  id: Megaphone
  name: mégaphone
  description: Test !
  components:
  - type: Loudspeaker
    isActive: true
    worksInHand: true
    affectChat: true
    speechSounds: Loudspeaker
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/megaphones/generic.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Objects/Tools/megaphones/generic.rsi

- type: entity
  parent: Megaphone
  id: CargoMegaphone
  name: mégaphone du cargo
  description: Faites de l'argent en silence et laissez l'effort faire le bruit. Ou quelque chose comme ça.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/megaphones/cargo.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Objects/Tools/megaphones/cargo.rsi

- type: entity
  parent: Megaphone
  id: CommandMegaphone
  name: mégaphone du commandement
  description: Transformez une autorité superficielle en autorité superficielle bruyante.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/megaphones/command.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Objects/Tools/megaphones/command.rsi

- type: entity
  parent: Megaphone
  id: SecurityMegaphone
  name: mégaphone de la sécurité
  description: Utilisez-le pour avertir les suspects que vous les pourchassez. Ou pour crier sur les prisonniers que vous n'appréciez pas.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/megaphones/security.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Objects/Tools/megaphones/security.rsi

- type: entity
  parent: Megaphone
  id: ClownMegaphone
  name: mégaphone du clown
  description: Un comédien doit se faire entendre.
  components:
  - type: Loudspeaker
    affectRadio: true # :trollface:
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/megaphones/clown.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Objects/Tools/megaphones/clown.rsi
