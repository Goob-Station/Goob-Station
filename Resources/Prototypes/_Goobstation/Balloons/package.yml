- type: entity
  parent: BaseItem
  id: BalloonPackageBasic
  name: paquet de ballons
  description: Un paquet contenant un ballon aléatoire.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Fun/balloon_package.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    items:
    - id: RedBalloon
      orGroup: BalloonRandom
      prob: 0.33 # Lower tier rarer
    - id: BlueBalloon
      orGroup: BalloonRandom
      prob: 0.4
    - id: GreenBalloon
      orGroup: BalloonRandom
    - id: YellowBalloon
      orGroup: BalloonRandom
    - id: PinkBalloon
      orGroup: BalloonRandom
    - id: WhiteBalloon
      orGroup: BalloonRandom # higher tier balloons are rarer
      prob: 0.4
    - id: BlackBalloon
      orGroup: BalloonRandom
      prob: 0.4
    - id: SteelBalloon
      orGroup: BalloonRandom
      prob: 0.33
    - id: ZebraBalloon
      orGroup: BalloonRandom
      prob: 0.33
    - id: RainbowBalloon
      orGroup: BalloonRandom
      prob: 0.2
    - id: CeramicBalloon
      orGroup: BalloonRandom
      prob: 0.1
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: BaseItem
  id: BalloonPackagePremium
  name: paquet de ballons premium
  description: Un paquet contenant un ballon aléatoire.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Fun/balloon_package.rsi
    state: gold
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    items:
    - id: BlackBalloon
      orGroup: BalloonRandom
    - id: WhiteBalloon
      orGroup: BalloonRandom
    - id: SteelBalloon
      orGroup: BalloonRandom
      prob: 0.7
    - id: ZebraBalloon
      orGroup: BalloonRandom
      prob: 0.65 #65 chance 65 65 65
    - id: RainbowBalloon
      orGroup: BalloonRandom
      prob: 0.5
    - id: CeramicBalloon
      orGroup: BalloonRandom # higher tier balloons are rarer
      prob: 0.4
    # This fucking kills server performance
    # - id: MoabBalloon
    #   orGroup: BalloonRandom
    #   prob: 0.10
    # - id: BfbBalloon
    #   orGroup: BalloonRandom
    #   prob: 0.05
    # - id: ZomgBalloon
    #   orGroup: BalloonRandom
    #   prob: 0.01
    sound:
      path: /Audio/Effects/unwrap.ogg


- type: entity
  name: boîte de paquets de ballons
  parent: BoxCardboard
  id: BoxBalloonPackage
  description: Une boîte pleine de futurs ballons.
  components:
  - type: StorageFill
    contents:
      - id: BalloonPackageBasic
        amount: 9
  - type: Sprite
    sprite: _Goobstation/Objects/Storage/boxes.rsi

- type: entity
  name: boîte de paquets de ballons premium
  parent: BoxCardboard
  id: PremiumBoxBalloonPackage
  description: Une boîte pleine de futurs ballons.
  components:
  - type: StorageFill
    contents:
      - id: BalloonPackagePremium
        amount: 9
  - type: Sprite
    sprite: _Goobstation/Objects/Storage/boxes.rsi


- type: entity
  id: CrateBalloonPackage
  parent: CratePlastic
  name: paquet du creveur de ballons
  description: Une caisse contenant 2 boîtes complètes de ballons et du matériel supplémentaire pour les crever.
  components:
  - type: StorageFill
    contents:
    - id: BoxBalloonPackage
      amount: 2
    - id: ClothingOuterSuitMonkey
      amount: 1
    - id: Dart
      amount: 1
    - id: MonkeyCube
      prob: 0.7
    # Extra
    - id: MonkeyCube
      prob: 0.4


- type: entity
  id: PremiumCrateBalloonPackage
  parent: CratePirate
  name: paquet du guerrier de ballons premium
  description: Contient les ballons les plus élites et du matériel supplémentaire pour les crever. ATTENTION ! PLUSIEURS BALLONS DE CLASSE MOAB EN APPROCHE !
  components:
  - type: StorageFill
    contents:
    - id: PremiumBoxBalloonPackage
      amount: 1
    - id: ClothingOuterSuitMonkey
      amount: 1
    - id: boomerang
      amount: 1
    - id: MonkeyCube
      prob: 0.7
    - id: ClothingOuterSuitMonkey   # Extra
      amount: 1
      prob: 0.4
    - id: MonkeyCube
      prob: 0.4
