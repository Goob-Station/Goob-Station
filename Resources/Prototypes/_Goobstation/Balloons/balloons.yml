- type: entity
  name: ballon de base
  parent: BaseStructureDynamic
  id: BaseBalloon       # Base balloon
  abstract: true # Make sure it doesn't appear
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Fun/balloons.rsi
    state: icon
    drawdepth: Overdoors # just so it renders above spesos
    noRot: True
  - type: Item
    size: Huge
  - type: Damageable
    damageContainer: RubberBalloon # default damage container
  - type: Physics # has dynamic physics
    bodyType: Dynamic
  - type: Penetratable # projectile Able to pierce balloons
    penetrateDamage: 1
    damagePenalty: 0.5
  - type: NpcFactionMember
    factions:
      - Balloon
  - type: InteractionOutline
  - type: Fixtures # give it locker collision
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        density: 75
        mask:
          - TabletopMachineMask
        layer:
          - TabletopMachineLayer    # No collision but still able to be shot

# Red Balloon
- type: entity
  name: ballon rouge
  parent: BaseBalloon
  description: Le ballon le plus faible.
  id: RedBalloon
  components:
  - type: Sprite
    state: red
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1           # balloon health
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Goobstation/BalloonEffect/balloon_pop.ogg
          params:
            variation: 0.125
            volume: -4
      - !type:SpawnEntitiesBehavior # Balloon Loot and spawn
        spawn:
          SpaceCash:
            min: 10
            max: 20
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

