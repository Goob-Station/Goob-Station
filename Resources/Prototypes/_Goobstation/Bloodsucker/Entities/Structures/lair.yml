- type: entity
  id: BloodsuckerVassalRack
  parent: BaseStructure
  name: Persuasion rack
  description: This is a Vassal rack, which allows Bloodsuckers to thrall crewmembers into loyal minions.
  components:
  - type: InteractionOutline
  - type: Sprite
    sprite: _Goobstation/Bloodsucker/Entities/Objects/vamp_obj.rsi
    state: vassalrack
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
  - type: Anchorable
  - type: Pullable
  - type: Appearance
  - type: BlockHandsOnBuckle
  - type: Strap
    position: Down
    rotation: -180
    buckleBreakOnDamage: false
    selfUnBuckleDelay: 30
    blacklist:
      components:
        - Bloodsucker
  - type: BloodsuckerVassalRack
  - type: Transform
    anchored: true
    noRot: true
  - type: AntiRotOnBuckle
  - type: Fixtures
    fixtures:
      spike:
        shape: !type:PhysShapeAabb { bounds: "-0.25,-0.25,0.25,0.25" }
        density: 5
        mask: []
        layer: []
