- type: entity
  parent: BaseBlob
  id: FactoryBlobTile
  name: Blob Usine
  description: Les BlobNacelles sortent de l'usine et attaquent les passants, puis zombifient leurs cadavres. Une usine en produit 3 ; elles ne peuvent pas être placées à moins de 7 tuiles l'une de l'autre ; une usine ne peut produire qu'un seul Blobbernaut.
  categories: [ HideSpawnMenu ]
  components:
    - type: Temperature
      heatDamage:
        types:
          Heat: 5
      coldDamage: {}
      coldDamageThreshold: 0
    - type: Flammable
      fireSpread: true
      damage:
        types:
          Heat: 1
    - type: BlobTile
      blobTileType: Factory
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 200
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: BlobFactory
    - type: Sprite
      sprite: _Goobstation/Blob/Mobs/blob.rsi
      drawdepth: BlobTiles
      layers:
        - map: [ "enum.DamageStateVisualLayers.Base" ]
          state: blob_special
        - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
          state: blob_glow_special
#          shader: unshaded

