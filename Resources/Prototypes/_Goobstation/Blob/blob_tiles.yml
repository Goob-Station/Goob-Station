- type: entity
  parent: BaseBlob
  id: StrongBlobTile
  name: Tuile Blob Renforcée
  description: La base des positions défensives possède non seulement une résistance six fois supérieure, mais cette tuile est aussi capable de résister à divers gaz pour protéger le noyau, par exemple du plasma que l'ennemi pourrait enflammer.
  categories: [ HideSpawnMenu ]
  components:
    - type: Airtight
    - type: BlobTile
      blobTileType: Strong
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 150
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: Sprite
      sprite: _Goobstation/Blob/Mobs/blob.rsi
      drawdepth: BlobTiles
      layers:
        - map: [ "enum.DamageStateVisualLayers.Base" ]
          state: blob_shield
        - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
          state: blob_glow
#          shader: unshaded

- type: entity
  parent: BaseBlob
  id: ReflectiveBlobTile
  name: Tuile Blob Réfléchissante
  description: Amélioration d'une cellule fortifiée qui sacrifie une partie de résistance contre la capacité de réfléchir projectiles énergétiques et lasers avec 90 % de chance.
  categories: [ HideSpawnMenu ]
  components:
    - type: Airtight
    - type: BlobTile
      blobTileType: Reflective
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: Damageable
      damageContainer: Blob
      damageModifierSet: BlobReflective
    - type: Reflect
      reflectProb: 1
      spread: 20
      reflects:
        - Energy
    - type: Sprite
      sprite: _Goobstation/Blob/Mobs/blob.rsi
      drawdepth: BlobTiles
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: blob_shield
      - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
        state: blob_glow
        shader: unshaded
