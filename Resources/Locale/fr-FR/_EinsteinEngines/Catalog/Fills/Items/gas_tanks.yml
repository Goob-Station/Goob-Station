- type: entity
  parent: EmergencyOxygenTank
  id: EmergencyPlasmaTank
  name: "réservoir de plasma d'urgence"
  description: Un réservoir facilement portable pour les urgences. Contient très peu de plasma, homologué pour un usage de survie uniquement.
  components:
  - type: Sprite
    sprite: _EinsteinEngines/Objects/Tanks/emergency.rsi
  - type: Item
    sprite: _EinsteinEngines/Objects/Tanks/emergency.rsi
  - type: Clothing
    sprite: _EinsteinEngines/Objects/Tanks/emergency.rsi
  - type: Tag
    tags:
    - GasTank
    - EmergencyOxygenTank

- type: entity
  id: EmergencyPlasmaTankFilled
  parent: EmergencyPlasmaTank
  suffix: Rempli
  components:
  - type: GasTank
    outputPressure: 5.325
    air:
      # 16 minutes with Plasmaman lungs
      volume: 0.66
      moles:
        - 0           # oxygen
        - 0           # nitrogen
        - 0           # CO2
        - 0.270782035 # nitrogen
      temperature: 293.15

