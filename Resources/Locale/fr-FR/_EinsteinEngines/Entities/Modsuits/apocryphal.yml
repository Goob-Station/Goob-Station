# The Modsuit Itself, This is just a Deathsquad modsuit
- type: entity
  parent: [ ClothingModsuitStandard, BaseCentcommContraband ]
  id: ClothingModsuitApocryphal
  name: unité de contrôle de combimod Apocryphe
  description: "Le contrôleur principal d'une combimod Apocryphe."
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/apocryphal.rsi
    - type: ToggleableClothing
      clothingPrototypes:
        head: ClothingModsuitHelmetApocryphal
        gloves: ClothingModsuitGauntletsApocryphal
        outerClothing: ClothingModsuitChestplateApocryphal
        shoes: ClothingModsuitBootsApocryphal
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellAntiqueProto
          whitelist:
            components:
              - PowerCell
    - type: Storage
      grid:
        - 0,0,7,6
    - type: ExplosionResistance
      damageCoefficient: 0.1
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        back:
        - state: equipped-BACKPACK-sealed

- type: entity
  parent: ClothingModsuitGauntletsStandard
  id: ClothingModsuitGauntletsApocryphal
  name: gantelets de combimod Apocryphe
  description: Une paire de gantelets conçus pour la combimod Apocryphe.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/apocryphal.rsi
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        gloves:
        - state: equipped-HAND-sealed
        - state: equipped-HAND-sealed-unshaded
          shader: unshaded
        gloves-vox:
        - state: equipped-HAND-sealed-vox
        - state: equipped-HAND-sealed-unshaded-vox
          shader: unshaded
    - type: Insulated # Goob Edit (WHY IS IT NOT INSULATED??)

- type: entity
  parent: [ClothingModsuitHelmetStandard, ShowSecurityIcons]
  id: ClothingModsuitHelmetApocryphal
  name: casque de combimod Apocryphe # Goob edit
  description: Un casque à la pointe de la technologie conçu par NanoTrasen pour la combimod Apocryphe. Il inclut un HUD intégré.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/apocryphal.rsi
    - type: PressureProtection
      highPressureMultiplier: 0.08
      lowPressureMultiplier: 1000
    - type: Armor
      traumaDeductions: # prevents traumas at all (kinda)
        Dismemberment: 1
        OrganDamage: 1
        BoneDamage: 1
        VeinsDamage: 1
        NerveDamage: 1
      modifiers:
        coefficients:
          Blunt: 0.1 # Best armor in the game - Yeah no shit.
          Slash: 0.1
          Piercing: 0.1
          Heat: 0.1
          Cold: 0.1
          Cellular: 0.1
          Radiation: 0.1
          Caustic: 0.1
    - type: ThermalVision
      isEquipment: true
      color: "#98EEFB"
      lightRadius: 15
    - type: FlashImmunity # Goobstation
    - type: FlashSoundSuppression # Goobstation
      protectionRange: 0
    - type: ShowHealthBars
      damageContainers:
        - Biological
    - type: PointLight
      color: "#FFDF00"
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        head:
        - state: equipped-HEAD-sealed
        - state: equipped-HEAD-sealed-unshaded
          shader: unshaded
        head-vox:
        - state: equipped-HEAD-sealed-vox
        - state: equipped-HEAD-sealed-unshaded-vox
          shader: unshaded
- type: entity
  parent: ClothingModsuitChestplateStandard
  id: ClothingModsuitChestplateApocryphal
  name: plastron de combimod Apocryphe
  description: "Un plastron à la pointe de la technologie conçu par NanoTrasen pour la combimod Apocryphe. Il intègre des servos motorisés pour réduire la charge de l'équipement."
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/apocryphal.rsi
    - type: ClothingSpeedModifier
      walkModifier: 1
      sprintModifier: 1
    - type: Armor
      traumaDeductions: # prevents traumas at all (kinda)
        Dismemberment: 1
        OrganDamage: 1
        BoneDamage: 1
        VeinsDamage: 1
        NerveDamage: 1
      modifiers:
        coefficients:
          Blunt: 0.1 # Best armor in the game - Yeah no shit.
          Slash: 0.1
          Piercing: 0.1
          Heat: 0.1
          Cold: 0.1
          Cellular: 0.1
          Radiation: 0.1
          Caustic: 0.1
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        outerClothing:
        - state: equipped-OUTERCLOTHING-sealed
        outerClothing-vox:
        - state: equipped-OUTERCLOTHING-sealed-vox
    - type: StaminaResistance
      damageCoefficient: 0 # 100%
    - type: PressureProtection
      highPressureMultiplier: 0.02
      lowPressureMultiplier: 1000
    - type: ExplosionResistance
      damageCoefficient: 0.1
    - type: FireProtection
      reduction: 1

- type: entity
  parent: ClothingModsuitBootsStandard
  id: ClothingModsuitBootsApocryphal
  name: bottes de combimod Apocryphe
  description: Une paire de magbottes à la pointe de la technologie pour la combimod Apocryphe. Tant que la combinaison est alimentée, celles-ci ne ralentiront pas le porteur.
  categories: [HideSpawnMenu]
  components:
    - type: Appearance
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/apocryphal.rsi
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        shoes:
        - state: equipped-FEET-sealed
        shoes-vox:
        - state: equipped-FEET-sealed-vox
    - type: ItemToggle
    - type: ToggleClothing
      action: ActionToggleMagboots
    - type: ComponentToggler
      components:
      - type: NoSlip
    - type: Magboots
      enabledPrefix: null
    - type: ClothingSpeedModifier
      walkModifier: 1.1
      sprintModifier: 1.1

- type: entity
  id: SuitStorageApocryphal
  parent: SuitStorageBase
  suffix: Combimod Apocryphe
  components:
    - type: StorageFill
      contents:
          - id: OxygenTankFilled
          - id: ClothingModsuitApocryphal
          - id: ClothingMaskBreath
