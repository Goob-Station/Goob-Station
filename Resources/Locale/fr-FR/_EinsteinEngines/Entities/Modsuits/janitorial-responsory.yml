# The Modsuit Itself, This is just a ERT modsuit
- type: entity
  parent: [ ClothingModsuitStandard, BaseCentcommContraband ]
  id: ClothingModsuitResponsoryJanitorial
  name: unité de contrôle de combimod Responsory de Conciergerie
  description: "Le contrôleur principal d'une combimod Responsory de Conciergerie."
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/janitorial-responsory.rsi
    - type: ToggleableClothing
      clothingPrototypes:
        head: ClothingModsuitHelmetResponsoryJanitorial
        gloves: ClothingModsuitGauntletsResponsoryJanitorial
        outerClothing: ClothingModsuitChestplateResponsoryJanitorial
        shoes: ClothingModsuitBootsResponsoryJanitorial
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellMicroreactor # Since this is used by ERT they shouldnt need to stop to recharge.
          whitelist:
            components:
              - PowerCell
    - type: Storage
      maxItemSize: Huge
      grid:
        - 0,0,10,3
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        back:
        - state: equipped-BACKPACK-sealed

- type: entity
  parent: ClothingModsuitGauntletsStandard
  id: ClothingModsuitGauntletsResponsoryJanitorial
  name: gantelets de combimod Responsory de Conciergerie
  description: Une paire de gantelets conçus pour la combimod Responsory de Conciergerie.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/janitorial-responsory.rsi
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        gloves:
        - state: equipped-HAND-sealed
        - state: equipped-HAND-sealed-unshaded
          shader: unshaded
        gloves-vox:
        - state: equipped-HAND-sealed-vox
        - state: equipped-HAND-sealed-unshaded-vox
          shader: unshaded
- type: entity
  parent: [ClothingModsuitHelmetStandard, ShowSecurityIcons]
  id: ClothingModsuitHelmetResponsoryJanitorial
  name: casque de combimod Responsory de Conciergerie
  description: Un casque à la pointe de la technologie conçu par NanoTrasen pour la combimod Responsory de Conciergerie. Il inclut un HUD intégré.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/janitorial-responsory.rsi
    - type: PressureProtection
      highPressureMultiplier: 0.08
      lowPressureMultiplier: 1000
    - type: Armor
      traumaDeductions:
        Dismemberment: 0.5
        OrganDamage: 0.5
        BoneDamage: 0.5
        VeinsDamage: 0
        NerveDamage: 0
      modifiers:
        coefficients:
          Blunt: 0.5
          Slash: 0.5
          Piercing: 0.5
          Heat: 0.5
          Radiation: 0.45
          Caustic: 0.45
    - type: FlashImmunity # Goobstation
    - type: FlashSoundSuppression # Goobstation
      protectionRange: 0
    - type: EyeProtection
    - type: ShowHealthBars
      damageContainers:
        - Biological
        - Inorganic
        - Silicon
    - type: PointLight
      color: "#FFDF00"
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        head:
        - state: equipped-HEAD-sealed
        - state: equipped-HEAD-sealed-unshaded
          shader: unshaded
        head-vox:
        - state: equipped-HEAD-sealed-vox
        - state: equipped-HEAD-sealed-unshaded-vox
          shader: unshaded
- type: entity
  parent: ClothingModsuitChestplateStandard
  id: ClothingModsuitChestplateResponsoryJanitorial
  name: plastron de combimod Responsory de Conciergerie
  description: "Un plastron à la pointe de la technologie conçu par NanoTrasen pour la combimod Responsory de Conciergerie. Il intègre des servos motorisés pour réduire la charge de l'équipement."
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/janitorial-responsory.rsi
    - type: ClothingSpeedModifier
      walkModifier: 0.95
      sprintModifier: 0.95
    - type: Armor
      traumaDeductions:
        Dismemberment: 0.5
        OrganDamage: 0.5
        BoneDamage: 0.5
        VeinsDamage: 0
        NerveDamage: 0
      modifiers:
        coefficients:
          Blunt: 0.45
          Slash: 0.45
          Piercing: 0.45
          Heat: 0.45
          Radiation: 0.45
          Caustic: 0.45
    - type: ExplosionResistance
      damageCoefficient: 0.45
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        outerClothing:
        - state: equipped-OUTERCLOTHING-sealed
        - state: equipped-OUTERCLOTHING-sealed-unshaded
          shader: unshaded
        outerClothing-vox:
        - state: equipped-OUTERCLOTHING-sealed-vox
    - type: StaminaResistance
      damageCoefficient: 0.45 # 50%

- type: entity
  parent: ClothingModsuitBootsStandard
  id: ClothingModsuitBootsResponsoryJanitorial
  name: bottes de combimod Responsory de Conciergerie
  description: Une paire de magbottes à la pointe de la technologie pour la combimod Responsory de Conciergerie. Tant que la combinaison est alimentée, celles-ci ne ralentiront pas le porteur.
  categories: [HideSpawnMenu]
  components:
    - type: Appearance
    - type: Sprite
      sprite: _EinsteinEngines/Clothing/NanoTrasen/Modsuits/janitorial-responsory.rsi
    - type: Tag
      tags:
        - WhitelistChameleon
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        shoes:
        - state: equipped-FEET-sealed
        shoes-vox:
        - state: equipped-FEET-sealed-vox
        - state: equipped-FEET-sealed-unshaded-vox
          shader: unshaded
    - type: ItemToggle
    - type: ToggleClothing
      action: ActionToggleMagboots
    - type: ComponentToggler
      components:
      - type: NoSlip
    - type: Magboots
      enabledPrefix: null
    - type: ClothingSpeedModifier
      walkModifier: 0.95
      sprintModifier: 0.95

- type: entity
  id: SuitStorageResponsoryJanitorial
  parent: SuitStorageBase
  suffix: Combimod Responsory de Conciergerie
  components:
    - type: StorageFill
      contents:
        - id: OxygenTankFilled
        - id: ClothingModsuitResponsoryJanitorial
        - id: ClothingMaskBreath
