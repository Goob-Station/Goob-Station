# Standard Combat Hardsuits
- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitCombatStandard
  name: combinaison de combat
  description: Une combinaison de combat spécialement conçue pour protéger son utilisateur contre toutes sortes de combattants ennemis dans des environnements à basse pression.
  components:
  - type: Sprite
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/standard.rsi
  - type: Clothing
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/standard.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.50
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.50
  - type: Armor # Good armour resistance across the board, comparable to the standard security hardsuit.
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.60
        Slash: 0.60
        Piercing: 0.60
        Radiation: 0.75
        Caustic: 0.75
        Heat: 0.75
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: ToggleableClothing
    clothingPrototypes: #goobstation change
      head: ClothingHeadHelmetHardsuitCombatStandard
  - type: AllowSuitStorage
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.6
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 3
    knockdownTimeDelta: -3

- type: entity
  parent: [ClothingOuterHardsuitCombatStandard,BaseSecurityContraband]
  id: ClothingOuterHardsuitCombatOfficer
  name: combinaison de combat sécurité
  description: Une combinaison de combat spécialement conçue pour protéger son utilisateur contre toutes sortes de combattants ennemis dans des environnements à basse pression. Celle-ci porte les insignes de la sécurité de la station.
  components:
  - type: Sprite
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/officer.rsi
  - type: Clothing
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/officer.rsi
  - type: ToggleableClothing
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitCombatOfficer #goobstation change

# Medical Combat Hardsuits
- type: entity
  parent: [ClothingOuterHardsuitBase,BaseSecurityContraband]
  id: ClothingOuterHardsuitCombatMedical
  name: combinaison de combat médical
  description: Une combinaison de combat spécialement conçue pour offrir à son utilisateur une plus grande mobilité pour un soutien supérieur des unités amies dans des zones de combat actives.
  components:
  - type: Sprite
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/medical.rsi
  - type: Clothing
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/medical.rsi
  - type: PressureProtection # Less protective from high pressure than a standard hardsuit due to less plating.
    highPressureMultiplier: 0.60
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.60
  - type: Armor # Slightly less armour than the standard hardsuit, but far higher mobility.
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.65
        Radiation: 0.80
        Caustic: 0.80
        Heat: 0.80
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: ToggleableClothing
    clothingPrototypes: #goobstation change
      head: ClothingHeadHelmetHardsuitCombatMedical
  - type: AllowSuitStorage
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.6
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 3
    knockdownTimeDelta: -3

# Riot Combat Hardsuits
- type: entity
  parent: [ClothingOuterHardsuitBase,BaseSecurityContraband]
  id: ClothingOuterHardsuitCombatRiot
  name: combinaison de combat anti-émeute
  description: Une combinaison de combat spécialement conçue pour le contrôle des foules contre des combattants armés dans des environnements à basse pression.
  components:
  - type: Sprite
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/riot.rsi
  - type: Clothing
    sprite: _DV/Clothing/OuterClothing/Hardsuits/Combat/riot.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.40
  - type: Armor # More protective than a standard security hardsuit, but far slower.
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.50
        Slash: 0.50
        Piercing: 0.40
        Radiation: 0.70
        Caustic: 0.70
        Heat: 0.40
  - type: ClothingSpeedModifier
    walkModifier: 0.60
    sprintModifier: 0.60
  - type: ToggleableClothing
    clothingPrototypes: #goobstation change
      head: ClothingHeadHelmetHardsuitCombatRiot
  - type: AllowSuitStorage
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.5
  - type: ModifyDelayedKnockdown # Goobstation
    cancel: true
