# All Abilities

# Pre-Hatch

- type: entity
  parent: BaseAction
  id: ActionHatch
  name: Éclore
  description: Lance le processus d'éclosion, il n'y a pas de retour en arrière après cela et vous serez vulnérable pendant un moment.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: engage_hatch
  - type: InstantAction
    event: !type:HatchEvent {}
  - type: ConfirmableAction
    popup: sling-hatch-engage-popup

# Post-Hatch
- type: entity
  parent: BaseAction
  id: ActionEnthrall
  name: Asservir
  description: Brise leur volonté, forgeant un serviteur. Pas assez puissant pour affecter les individus dotés d'un bouclier mental ou les IA asservies.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: enthrall
  - type: TargetAction
    range: 0.5
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:EnthrallEvent { }

- type: entity
  parent: BaseAction
  id: ActionGlare
  name: Regard Obscur
  description: Un regard ténébreux qui étourdit, fait taire et ralentit une cible unique.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 30
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: glare
  - type: TargetAction
    interactOnMiss: false
    range: 10
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:GlareEvent { }

- type: entity
  parent: BaseAction
  id: ActionVeil
  name: Voile
  description: Une impulsion d'obscurité qui détruit les lumières électriques dans une large zone.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 30
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: veil
    checkCanInteract: false
    checkConsciousness: false
  - type: InstantAction
    event: !type:VeilEvent { }

- type: entity
  id: ActionRapidRehatch
  name: Rééclosion Rapide
  description: Dépouillez votre chair brisée et renaissez entier.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 60
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: rehatch
  - type: InstantAction
    event: !type:RapidRehatchEvent { }

- type: entity
  parent: BaseAction
  id: ActionShadowWalk
  name: Marche dans l'Ombre
  description: Entrez dans le vide, vous déplaçant sans être vu ni entravé.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 45
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: shadow_walk
  - type: InstantAction
    event: !type:ShadowWalkEvent { }

- type: entity
  id: ActionIcyVeins
  name: Veines Glacées
  description: Désarme et gèle les créatures à proximité dans une zone autour de vous.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 50
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: icy_veins
  - type: InstantAction
    event: !type:IcyVeinsEvent { }

- type: entity
  parent: BaseAction
  id: ActionDestroyEngines
  name: Détruire les Moteurs
  description: Détruisez les moteurs de la navette d'évacuation. Retarde la navette de 10 minutes.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
      state: destroy_engines
  - type: InstantAction
    event: !type:DestroyEnginesEvent { }

- type: entity
  id: ActionCollectiveMind
  name: Esprit Collectif
  description: Récoltez les esprits de vos Serviteurs et gagnez diverses capacités.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _EinsteinEngines/Shadowling/shadowling_abilities.rsi
